<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover"/>
  <title>Expense Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    :root {
      --bg:    #060608;
      --s1:    #0b0b0e;
      --s2:    #101013;
      --s3:    #161619;
      --s4:    #1c1c20;
      --b1:    rgba(255,255,255,.07);
      --b2:    rgba(255,255,255,.12);
      --text:  #f4f4f8;
      --sub:   #48485e;
      --dim:   #202030;
      --green: #00d68f;
      --yellow:#ffb020;
      --red:   #ff3d5a;
      --sgd:   #4ab8ff;
      --myr:   #ff9448;
      --gold:  #c08830;
      --gold2: #e8ae50;
      --gold3: #ffd878;
      --nav-h: 64px;
    }

    *, *::before, *::after { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html { touch-action:manipulation; }
    html, body { margin:0; padding:0; overflow-x:hidden; }
    body {
      font-family:'Inter',system-ui,sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height:100dvh;
      padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,0px) + 8px);
    }
    .wrap { max-width:480px; margin:0 auto; padding:0 14px 8px; }

    @keyframes shine { to { background-position:200% center; } }
    @keyframes glow-pulse { 0%,100%{box-shadow:0 0 5px #c08830,0 0 10px rgba(192,136,48,.3)} 50%{box-shadow:0 0 10px #e8ae50,0 0 20px rgba(232,174,80,.5)} }

    /* HEADER */
    .header {
      display:flex; align-items:center; justify-content:space-between;
      padding:22px 16px 14px; max-width:480px; margin:0 auto;
    }
    .header-title { font-size:22px; font-weight:900; letter-spacing:-.05em; color:#fff; }
    .header-title span {
      background:linear-gradient(105deg,#c08830 0%,#ffd878 38%,#e8ae50 62%,#c08830 100%);
      background-size:200% auto;
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      animation:shine 3s linear infinite;
    }
    .header-date { font-size:11px; color:var(--sub); margin-top:3px; font-weight:500; }

    .tab-section { display:none; }
    .tab-section.active { display:block; }

    /* CARD — crisp dark surface, single top-highlight line */
    .card {
      background: var(--s2);
      border-top: 1px solid rgba(255,255,255,.09);
      border-left: 1px solid rgba(255,255,255,.05);
      border-right: 1px solid rgba(255,255,255,.03);
      border-bottom: 1px solid rgba(255,255,255,.03);
      border-radius:22px; padding:16px; margin-bottom:10px;
    }
    .card-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.14em; color:var(--sub); margin-bottom:12px; }

    /* ADD FORM */
    .add-card {
      background: var(--s2);
      border-top: 1px solid rgba(192,136,48,.25);
      border-left: 1px solid rgba(192,136,48,.12);
      border-right: 1px solid rgba(192,136,48,.08);
      border-bottom: 1px solid rgba(192,136,48,.08);
      border-radius:18px; padding:10px 12px; margin-bottom:10px;
    }
    .add-card-title {
      font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.14em;
      margin-bottom:8px; display:flex; align-items:center; gap:6px;
      background:linear-gradient(105deg,#c08830,#e8ae50);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .add-card-title .dot {
      width:4px; height:4px; border-radius:50%; flex-shrink:0;
      background:radial-gradient(circle,#ffd878,#c08830);
      animation:glow-pulse 2s ease-in-out infinite;
    }
    .amount-wrap { position:relative; margin-bottom:8px; }
    .amount-prefix {
      position:absolute; left:12px; top:50%; transform:translateY(-50%);
      font-size:13px; font-weight:800; color:rgba(192,136,48,.55); pointer-events:none; z-index:1;
    }
    #amountInput {
      width:100%; height:44px; padding:0 100px 0 38px;
      background:var(--s1); border-top:1px solid rgba(192,136,48,.22); border-left:1px solid rgba(192,136,48,.12); border-right:1px solid rgba(0,0,0,.4); border-bottom:1px solid rgba(0,0,0,.4);
      border-radius:11px; color:#fff; font-size:22px; font-weight:900;
      font-family:'Inter',system-ui,sans-serif; letter-spacing:-.04em;
    }
    #amountInput:focus { outline:none; border-color:rgba(192,136,48,.5); box-shadow:0 0 0 3px rgba(192,136,48,.07); }
    #amountInput::placeholder { color:var(--dim); font-weight:900; }
    .ccy-inline { position:absolute; right:6px; top:50%; transform:translateY(-50%); display:flex; gap:4px; }
    .ccy-chip {
      height:26px; padding:0 8px; border-radius:7px; font-size:10px; font-weight:700;
      background:var(--s3); border:1px solid var(--b1); color:var(--sub);
      cursor:pointer; font-family:inherit; transition:all .2s;
    }
    .ccy-chip.active-sgd { background:rgba(74,184,255,.1); border-color:rgba(74,184,255,.3); color:#7dcfff; }
    .ccy-chip.active-myr { background:rgba(255,148,72,.1); border-color:rgba(255,148,72,.3); color:#ffb87a; }
    .form-row2 { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:6px; }
    .form-label { font-size:9px; font-weight:700; color:var(--sub); margin-bottom:3px; display:block; letter-spacing:.08em; text-transform:uppercase; }
    input:not(#amountInput), select {
      width:100%; height:36px; padding:0 10px;
      background:var(--s3); border-top:1px solid rgba(255,255,255,.07); border-left:1px solid rgba(255,255,255,.04); border-right:1px solid rgba(0,0,0,.3); border-bottom:1px solid rgba(0,0,0,.3);
      border-radius:10px; color:var(--text); font-size:16px;
      font-family:'Inter',system-ui,sans-serif; font-weight:500;
      -webkit-appearance:none; appearance:none; text-align:left;
    }
    .add-card input:not(#amountInput), .add-card select { text-align:center; background:var(--s1); border-top-color:rgba(192,136,48,.15); }
    input:not(#amountInput):focus, select:focus { outline:none; border-color:rgba(192,136,48,.4); box-shadow:0 0 0 3px rgba(192,136,48,.05); }
    input::placeholder { color:var(--dim); }
    input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(.25); }
    .btn-save {
      width:100%; height:36px; border-radius:10px;
      background:linear-gradient(105deg,#b07828 0%,#e8ae50 50%,#c08830 100%);
      background-size:200% auto;
      border:none; color:#0a0806;
      font-size:13px; font-weight:900; font-family:'Inter',system-ui,sans-serif;
      cursor:pointer; letter-spacing:.05em; text-transform:uppercase;
      box-shadow:0 2px 0 rgba(0,0,0,.5), 0 4px 16px rgba(192,136,48,.25);
      transition:background-position .4s, transform .1s, box-shadow .1s;
    }
    .btn-save:active { transform:translateY(1px); box-shadow:0 1px 0 rgba(0,0,0,.5), 0 2px 8px rgba(192,136,48,.15); }
    .btn-save.editing { background:linear-gradient(105deg,#009960,#00d68f); color:#020a06; box-shadow:0 2px 0 rgba(0,0,0,.5),0 4px 16px rgba(0,214,143,.2); }
    .status { font-size:11px; color:var(--green); min-height:14px; margin-top:6px; text-align:center; font-weight:700; letter-spacing:.04em; }

    /* RING CARD */
    .ring-card {
      background:var(--s2);
      border-top:1px solid rgba(255,255,255,.09);
      border-left:1px solid rgba(255,255,255,.05);
      border-right:1px solid rgba(255,255,255,.03);
      border-bottom:1px solid rgba(255,255,255,.03);
      border-radius:22px; padding:18px 16px; margin-bottom:10px;
      position:relative; overflow:hidden;
    }
    .ring-card::after {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,rgba(192,136,48,.5) 25%,rgba(255,216,120,.9) 50%,rgba(192,136,48,.5) 75%,transparent);
    }
    .ring-hero-row { display:flex; align-items:center; justify-content:center; gap:0; }
    .ring-stats-col { flex:0 0 80px; display:flex; flex-direction:column; gap:10px; align-items:flex-start; margin-right:8px; }
    .ring-wrap      { flex:0 0 160px; position:relative; width:160px; height:160px; }
    .ring-ccy-col   { flex:0 0 90px; display:flex; flex-direction:column; gap:7px; margin-left:12px; }
    #ringCanvas { position:absolute; top:0; left:0; width:160px !important; height:160px !important; background:transparent !important; border:none !important; box-shadow:none !important; }
    .ring-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; gap:1px; }
    .ring-label { font-size:8px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--sub); }
    .ring-amount { font-size:20px; font-weight:900; color:#fff; letter-spacing:-.04em; line-height:1.1; }
    .ring-sep { width:18px; height:1px; background:rgba(255,255,255,.08); margin:3px 0; }
    .ring-remain-label { font-size:7px; color:var(--dim); text-transform:uppercase; letter-spacing:.1em; }
    .ring-remain { font-size:13px; font-weight:800; line-height:1.2; }
    .ring-stat-label { font-size:8px; color:var(--sub); font-weight:600; margin-bottom:1px; text-transform:uppercase; letter-spacing:.06em; }
    .ring-stat-val { font-size:12px; font-weight:800; color:#fff; letter-spacing:-.02em; }
    .ring-ccy-col .ccy-card { padding:8px 10px; border-radius:14px; cursor:pointer; }
    .ring-ccy-col .ccy-val { font-size:12px; font-weight:800; letter-spacing:-.02em; line-height:1.1; }
    .ring-ccy-col .ccy-lbl { font-size:8px; margin-bottom:3px; letter-spacing:.06em; }

    /* CCY CARDS */
    .currency-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
    .ccy-card { border-radius:18px; padding:13px; background:var(--s3); border-top:1px solid rgba(255,255,255,.07); border-left:1px solid rgba(255,255,255,.04); border-right:1px solid rgba(0,0,0,.2); border-bottom:1px solid rgba(0,0,0,.2); cursor:pointer; transition:opacity .15s; }
    .ccy-card:active { opacity:.7; }
    .ccy-card.sgd { background:rgba(74,184,255,.06); border-top-color:rgba(74,184,255,.14); }
    .ccy-card.myr { background:rgba(255,148,72,.06); border-top-color:rgba(255,148,72,.14); }
    .ccy-lbl { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; margin-bottom:5px; opacity:.5; }
    .ccy-card.sgd .ccy-lbl { color:var(--sgd); }
    .ccy-card.myr .ccy-lbl { color:var(--myr); }
    .ccy-val { font-size:20px; font-weight:900; letter-spacing:-.04em; }
    .ccy-card.sgd .ccy-val { color:#7dcfff; }
    .ccy-card.myr .ccy-val { color:#ffb87a; }
    .ccy-hint { font-size:9px; color:var(--dim); margin-top:4px; }

    /* CATEGORY GRID */
    .cat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .cat-card { background:var(--s3); border-top:1px solid rgba(255,255,255,.07); border-left:1px solid rgba(255,255,255,.04); border-right:1px solid rgba(0,0,0,.2); border-bottom:1px solid rgba(0,0,0,.2); border-radius:16px; padding:11px; cursor:pointer; transition:opacity .15s; }
    .cat-card:active { opacity:.7; }
    .cat-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; gap:6px; }
    .cat-name { font-size:11px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0; }
    .cat-pct  { font-size:10px; font-weight:700; color:var(--sub); flex-shrink:0; white-space:nowrap; }
    .bar-track { height:2px; background:rgba(255,255,255,.06); border-radius:99px; overflow:hidden; margin-bottom:5px; }
    .bar-fill      { height:100%; border-radius:99px; background:var(--green); box-shadow:0 0 5px rgba(0,214,143,.6); }
    .bar-fill.warn { background:var(--yellow); box-shadow:0 0 5px rgba(255,176,32,.6); }
    .bar-fill.over { background:var(--red); box-shadow:0 0 5px rgba(255,61,90,.6); }
    .cat-amounts { font-size:10px; color:var(--sub); }

    /* CHART */
    .chart-wrap { background:var(--s1); border-radius:14px; padding:8px; overflow:hidden; border:1px solid rgba(255,255,255,.04); }
    canvas.trend { display:block; width:100% !important; height:auto !important; background:transparent; border:none; max-width:100%; }
    .chart-legend { display:flex; gap:14px; margin-top:8px; }
    .legend-dot  { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:4px; vertical-align:middle; }
    .legend-item { font-size:11px; color:var(--sub); font-weight:600; }
    .chart-badge { display:inline-block; padding:3px 10px; border-radius:99px; background:var(--s3); border:1px solid var(--b1); color:var(--sub); font-size:10px; font-weight:600; }

    /* RECENT */
    .txn-item { display:flex; align-items:center; gap:12px; padding:10px 8px; border-radius:14px; cursor:pointer; transition:background .12s; }
    .txn-item:active, .txn-item.expanded { background:var(--s3); }
    .txn-item.expanded { flex-wrap:wrap; }
    .txn-icon { width:40px; height:40px; border-radius:12px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:18px; background:var(--s3); }
    .txn-icon.sgd { background:rgba(74,184,255,.1); }
    .txn-icon.myr { background:rgba(255,148,72,.1); }
    .txn-main { flex:1; min-width:0; }
    .txn-cat  { font-size:13px; font-weight:700; }
    .txn-meta { font-size:11px; color:var(--sub); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .txn-amt  { font-size:14px; font-weight:800; letter-spacing:-.02em; text-align:right; flex-shrink:0; }
    .txn-amt.sgd { color:#7dcfff; }
    .txn-amt.myr { color:#ffb87a; }
    .txn-actions { display:none; padding:4px 8px 6px; gap:8px; flex:none; width:100%; }
    .txn-item.expanded .txn-actions { display:flex; }

    /* TXN ROWS */
    .row-item {
      display:flex; align-items:center; gap:12px;
      padding:13px; border-radius:18px; margin-bottom:7px;
      background:var(--s2);
      border-top:1px solid rgba(255,255,255,.07); border-left:1px solid rgba(255,255,255,.04);
      border-right:1px solid rgba(0,0,0,.3); border-bottom:1px solid rgba(0,0,0,.3);
      cursor:pointer; transition:background .12s; position:relative; flex-wrap:wrap;
    }
    .row-item.expanded { background:var(--s3); }
    .row-icon { width:42px; height:42px; border-radius:13px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:19px; background:var(--s3); }
    .row-icon.sgd { background:rgba(74,184,255,.09); }
    .row-icon.myr { background:rgba(255,148,72,.09); }
    .row-info { flex:1; min-width:0; }
    .row-cat  { font-size:14px; font-weight:700; }
    .row-sub  { font-size:11px; color:var(--sub); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .row-right { text-align:right; flex-shrink:0; }
    .row-amount { font-size:15px; font-weight:800; letter-spacing:-.02em; }
    .row-amount.sgd { color:#7dcfff; }
    .row-amount.myr { color:#ffb87a; }
    .row-date  { font-size:10px; color:var(--sub); margin-top:2px; }
    .row-actions { display:none; padding:6px 0 2px; gap:8px; width:100%; }
    .row-item.expanded .row-actions { display:flex; }
    .row-item > :not(.row-actions) { flex-shrink:0; }
    .row-item > .row-info { flex-shrink:1; }

    /* SMALL BUTTONS */
    .btn-sm { flex:1; height:34px; border-radius:10px; font-size:12px; font-weight:700; border:none; cursor:pointer; font-family:inherit; }
    .btn-sm.danger    { background:rgba(255,61,90,.09); color:#ff8090; border:1px solid rgba(255,61,90,.18); }
    .btn-sm.secondary { background:var(--s4); color:var(--sub); border:1px solid var(--b1); }
    .btn-sm.primary   { background:rgba(192,136,48,.1); color:var(--gold2); border:1px solid rgba(192,136,48,.2); }
    .btn-sm:active { opacity:.7; }

    /* FILTER / UTIL */
    .filter-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:10px; }
    .util-bar   { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:8px; }
    .util-btn { height:38px; border-radius:11px; font-size:12px; font-weight:600; border:1px solid var(--b1); background:var(--s3); color:var(--sub); cursor:pointer; font-family:inherit; }
    .util-btn:active { opacity:.7; }
    .util-btn.danger { background:rgba(255,61,90,.07); color:#ff8090; border-color:rgba(255,61,90,.14); }

    /* SETTINGS */
    .settings-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.14em; color:var(--sub); margin-bottom:16px; }
    .field-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
    .btn-full { width:100%; height:40px; border-radius:12px; font-size:13px; font-weight:800; cursor:pointer; font-family:inherit; border:none; transition:opacity .15s; }
    .btn-full.primary   { background:linear-gradient(105deg,#b07828,#e8ae50); color:#0a0806; box-shadow:0 2px 0 rgba(0,0,0,.4),0 4px 14px rgba(192,136,48,.2); }
    .btn-full.secondary { background:var(--s3); color:var(--sub); border:1px solid var(--b1); }
    .btn-full.success   { background:linear-gradient(105deg,#b07828,#e8ae50); color:#0a0806; box-shadow:0 2px 0 rgba(0,0,0,.4),0 4px 14px rgba(192,136,48,.2); }
    .btn-full.danger    { background:rgba(255,61,90,.07); color:#ff8090; border:1px solid rgba(255,61,90,.14); }
    .btn-full:active { opacity:.8; }
    .s-row { display:grid; gap:8px; align-items:center; margin-bottom:10px; }
    .s-row-2 { grid-template-columns:1fr 1fr; }
    .s-row-3 { grid-template-columns:1fr auto auto; }
    .s-row-4 { grid-template-columns:1fr 80px auto auto; }
    .s-row-4e { grid-template-columns:1fr 1fr 1fr auto; }
    .divider { border:none; border-top:1px solid rgba(255,255,255,.04); margin:14px 0; }
    .pill-list { display:flex; flex-wrap:wrap; gap:6px; }
    .pill { padding:5px 13px; border-radius:99px; background:rgba(192,136,48,.08); border:1px solid rgba(192,136,48,.18); color:var(--gold2); font-size:11px; font-weight:600; cursor:pointer; transition:all .18s; }
    .pill.pill-active { background:rgba(192,136,48,.22); border-color:rgba(232,174,80,.5); color:#fff; }
    .s-status { color:var(--green); font-size:11px; min-height:14px; margin-top:8px; font-weight:700; text-align:center; }
    .empty { padding:24px; text-align:center; color:var(--dim); font-size:13px; font-weight:500; }
    #catTrendCards .card { margin-bottom:10px; overflow:hidden; }
    #catTrendCards canvas { display:block; width:100% !important; height:auto !important; background:transparent; border:none; box-shadow:none; border-radius:8px; max-width:100%; }

    /* BOTTOM NAV */
    .bottom-nav {
      position:fixed; bottom:0; left:0; right:0; z-index:100;
      height:var(--nav-h); display:flex; align-items:stretch;
      background:rgba(6,6,8,.97);
      border-top:1px solid rgba(255,255,255,.06);
      padding-bottom:env(safe-area-inset-bottom,0);
    }
    .bottom-nav::before {
      content:''; position:absolute; top:0; left:8%; right:8%; height:1px;
      background:linear-gradient(90deg,transparent,rgba(192,136,48,.45) 25%,rgba(255,216,120,.85) 50%,rgba(192,136,48,.45) 75%,transparent);
    }
    .nav-btn {
      flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:4px; background:none; border:none; cursor:pointer;
      color:rgba(255,255,255,.18); font-size:9px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
      font-family:inherit; transition:color .2s; padding:0; position:relative;
    }
    .nav-btn svg { width:21px; height:21px; stroke:currentColor; fill:none; stroke-width:1.7; transition:transform .2s, filter .2s; }
    .nav-btn.active { color:var(--gold2); }
    .nav-btn.active svg { transform:scale(1.1); filter:drop-shadow(0 0 5px rgba(232,174,80,.8)); }
    .nav-btn:active { opacity:.5; }
  </style>

</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div>
      <div class="header-title">Expense <span>Tracker</span></div>
      <div id="headerDate" class="header-date"></div>
    </div>
    <div style="text-align:right">
      <div id="headerTime" style="font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.03em;line-height:1"></div>
      <div id="headerMonth" style="font-size:11px;color:var(--sub);font-weight:500;margin-top:3px"></div>
    </div>
  </div>

  <div class="wrap">

    <!-- ══════════════════════════════════
         DASHBOARD TAB
    ══════════════════════════════════ -->
    <div id="dashboardTab" class="tab-section active">

      <!-- Budget ring + currency + stats in one row -->
      <div class="ring-card">
        <div class="ring-hero-row">
          <!-- Stats on left -->
          <div class="ring-stats-col">

      Settings

<script>
(function(){
  const KEY='expense_tracker_sgd_myr_clean_v3';
  let records=[], categories=['Food & Drink','Transport','Grocery','Miscellaneous'], budgetSGD=0, categoryBudgets={}, editingId=null, selectedCategory='';

  const $=id=>document.getElementById(id);
  const today=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};
  const month=()=>today().slice(0,7);
  const money=(n,c='SGD')=>(c==='MYR'?'RM ':'S$ ')+Number(n||0).toFixed(2);
  const moneyShort=(n,c='SGD')=>(c==='MYR'?'RM':'S$')+Number(n||0).toFixed(2);
  const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const setStatus=msg=>{ $('statusBox').textContent=msg||''; $('statusBoxSettings').textContent=msg||''; };
  const catEmoji=c=>({'Food & Drink':'🍜','Transport':'🚗','Grocery':'🛒','Shopping':'🛍️','Entertainment':'🎬','Health':'💊','Travel':'✈️','Miscellaneous':'📦'}[c]||'💳');

  function load(){
    try{const raw=localStorage.getItem(KEY);if(raw){const d=JSON.parse(raw);records=Array.isArray(d.records)?d.records:[];categories=Array.isArray(d.categories)&&d.categories.length?d.categories:categories;budgetSGD=Number(d.budgetSGD||0);categoryBudgets=d.categoryBudgets||{};}}catch(e){}
    records=records.map(r=>({...r,currency:r.currency||'SGD'}));
  }
  function save(){localStorage.setItem(KEY,JSON.stringify({records,categories,budgetSGD,categoryBudgets}));}

  function refreshCategories(){
    const opts=categories.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
    ['categoryInput','budgetCategoryInput'].forEach(id=>{if($(id))$(id).innerHTML=opts;});
    $('filterCategory').innerHTML='<option value="">All</option>'+opts;
    $('categoryList').innerHTML=categories.map(c=>`<span class="pill cat-pill" data-cat="${esc(c)}">${esc(c)}</span>`).join('');
    $('categoryList').querySelectorAll('.cat-pill').forEach(pill=>{
      pill.addEventListener('click',()=>{
        selectedCategory=pill.dataset.cat;
        $('newCategoryInput').value=selectedCategory;
        $('categoryList').querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('pill-active'));
        pill.classList.add('pill-active');
      });
    });
  }

  function totals(c,cur=false){return records.filter(r=>(r.currency||'SGD')===c&&(!cur||r.date.startsWith(month()))).reduce((a,r)=>a+Number(r.amount||0),0);}
  function monthName(){return new Date().toLocaleDateString(undefined,{month:'long',year:'numeric'});}
  function catMap(c){const m={};records.forEach(r=>{if((r.currency||'SGD')!==c||!r.date.startsWith(month()))return;m[r.category]=(m[r.category]||0)+Number(r.amount||0);});return m;}

  /* ── Ring ── */
  function renderRing(){
    const canvas=$('ringCanvas');if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,r=W*0.38,thick=W*0.09;
    ctx.clearRect(0,0,W,H);
    const spent=records.filter(r=>(r.currency||'SGD')==='SGD'&&r.date.startsWith(month())).reduce((a,r)=>a+Number(r.amount||0),0);
    const budget=Number(budgetSGD||0),pct=budget>0?Math.min(spent/budget,1):0;
    function arcColor(t){
      const s=[[0,[52,211,153]],[0.65,[52,211,153]],[0.82,[251,191,36]],[1.0,[248,113,113]]];
      let a=s[0],b=s[s.length-1];
      for(let i=0;i<s.length-1;i++){if(t>=s[i][0]&&t<=s[i+1][0]){a=s[i];b=s[i+1];break;}}
      const tt=b[0]===a[0]?1:(t-a[0])/(b[0]-a[0]);
      return a[1].map((v,i)=>Math.round(v+(b[1][i]-v)*tt));
    }
    // Track
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=thick;ctx.stroke();
    // Arc
    if(budget>0&&pct>0){
      const start=-Math.PI/2,end=start+Math.PI*2*pct;
      const [rv,gv,bv]=arcColor(pct);
      ctx.shadowColor=`rgb(${rv},${gv},${bv})`;ctx.shadowBlur=W*0.06;
      ctx.beginPath();ctx.arc(cx,cy,r,start,end);
      ctx.strokeStyle=`rgb(${rv},${gv},${bv})`;ctx.lineWidth=thick;ctx.lineCap='round';ctx.stroke();
      ctx.shadowBlur=0;
    }
    // Health colors
    const remain=budget>0?budget-spent:null;
    const healthColor = remain===null ? 'var(--sub)' : remain<0 ? '#f87171' : remain<=budget*.2 ? '#fbbf24' : '#34d399';
    $('ringSpent').textContent=moneyShort(spent,'SGD');
    $('ringSpent').style.color=remain===null?'var(--text)':healthColor;
    const rEl=$('ringRemain');
    if(remain===null){rEl.textContent='—';rEl.style.color='var(--dim)';}
    else if(remain<0){rEl.textContent=moneyShort(Math.abs(remain),'SGD')+' over';rEl.style.color='#f87171';}
    else{rEl.textContent=moneyShort(remain,'SGD');rEl.style.color=healthColor;}
    const now=new Date(),d=now.getDate(),dm=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
    $('ringStat1').textContent=budget>0?moneyShort(budget,'SGD'):'—';
    $('ringStat2').textContent=d>0?moneyShort(spent/d,'SGD')+'/d':'—';
    $('ringStat2').style.color=healthColor;
    $('ringStat3').textContent=(dm-d)+'d';
    $('ringStat3').style.color=remain!==null&&remain<0?'#f87171':'var(--text)';
  }

  function renderDashboard(){
    renderRing();
    const mn=monthName(),sgd=totals('SGD',true),myr=totals('MYR',true);
    $('sgdMonthLabel').textContent='SGD';
    $('myrMonthLabel').textContent='MYR';
    $('monthSgdBox').textContent=money(sgd,'SGD');
    $('monthMyrBox').textContent=money(myr,'MYR');
    $('headerDate').textContent=new Date().toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short',year:'numeric'});
    // Update time every second
    if(!window._timerId){
      window._timerId=setInterval(()=>{
        const t=new Date();
        const time=t.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
        $('headerTime').textContent=time;
      },1000);
    }
    $('headerTime').textContent=new Date().toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
    $('headerMonth').textContent=mn;
    $('trendBudgetBadge').textContent='Budget: '+(budgetSGD>0?money(budgetSGD,'SGD'):'—');
    renderCategoryCards();
  }

  function renderCategoryCards(){
    const m=catMap('SGD');
    $('sgdCategoryCards').innerHTML=categories.map(cat=>{
      const sp=Number(m[cat]||0),bgt=Number(categoryBudgets[cat]||0),pct=bgt>0?sp/bgt*100:0,cls=pct>=100?'over':pct>=80?'warn':'';
      return `<div class="cat-card" data-cat="${esc(cat)}">
        <div class="cat-top"><div class="cat-name">${catEmoji(cat)} ${esc(cat)}</div><div class="cat-pct">${bgt>0?Math.round(pct)+'%':'—'}</div></div>
        <div class="bar-track"><div class="bar-fill ${cls}" style="width:${Math.min(pct,100)}%"></div></div>
        <div class="cat-amounts">${money(sp,'SGD')}${bgt>0?' / '+money(bgt,'SGD'):''}</div>
      </div>`;
    }).join('')||'<div class="empty">No categories.</div>';
    $('sgdCategoryCards').querySelectorAll('[data-cat]').forEach(c=>{
      c.addEventListener('click',()=>{$('filterCategory').value=c.dataset.cat;$('filterCurrency').value='SGD';$('filterMonth').value=month();renderTable();switchTab('addTab',true);});
    });
  }

  function renderTrendChart(){
    const cv=$('trendCanvas'),ctx=cv.getContext('2d');
    ctx.clearRect(0,0,cv.width,cv.height);
    const lbl=[],sgd=[],myr=[],now=new Date();
    for(let i=11;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1),k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');lbl.push(d.toLocaleString(undefined,{month:'short'}));sgd.push(records.filter(r=>(r.currency||'SGD')==='SGD'&&r.date.startsWith(k)).reduce((a,r)=>a+Number(r.amount||0),0));myr.push(records.filter(r=>(r.currency||'SGD')==='MYR'&&r.date.startsWith(k)).reduce((a,r)=>a+Number(r.amount||0),0));}
    const max=Math.max(budgetSGD,...sgd,...myr,1);
    const L=36,R=8,T=28,B=24,W=cv.width-L-R,H=cv.height-T-B;
    // Y-axis grid lines + labels
    ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1;
    for(let g=0;g<=3;g++){
      const y=T+H/3*g,val=Math.round(max*(1-g/3));
      ctx.beginPath();ctx.moveTo(L,y);ctx.lineTo(L+W,y);ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='8px Inter,system-ui';ctx.textAlign='right';
      ctx.fillText(val>=1000?(val/1000).toFixed(1)+'k':val,L-4,y+3);
    }
    if(budgetSGD>0){const y=T+H-(budgetSGD/max)*H;ctx.beginPath();ctx.setLineDash([5,5]);ctx.moveTo(L,y);ctx.lineTo(L+W,y);ctx.strokeStyle='rgba(167,139,250,.5)';ctx.lineWidth=1.5;ctx.stroke();ctx.setLineDash([]);}
    function drawLine(vals,color){
      const pts=vals.map((v,i)=>({x:L+W/(vals.length-1)*i,y:T+H-(v/max)*H,v}));
      ctx.beginPath();ctx.moveTo(pts[0].x,T+H);pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.lineTo(pts[pts.length-1].x,T+H);ctx.closePath();
      const gr=ctx.createLinearGradient(0,T,0,T+H);gr.addColorStop(0,color+'28');gr.addColorStop(1,color+'00');ctx.fillStyle=gr;ctx.fill();
      ctx.beginPath();pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.stroke();
      pts.forEach(p=>{
        // dot
        ctx.beginPath();ctx.arc(p.x,p.y,3.5,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
        // value label above dot (only if > 0)
        if(p.v>0){
          const label=p.v>=1000?(p.v/1000).toFixed(1)+'k':Math.round(p.v).toString();
          ctx.fillStyle=color;ctx.font='bold 8px Inter,system-ui';ctx.textAlign='center';
          ctx.fillText(label,p.x,p.y-7);
        }
      });
    }
    drawLine(sgd,'#60a5fa');drawLine(myr,'#fb923c');
    // X-axis month labels
    ctx.fillStyle='rgba(255,255,255,.28)';ctx.font='9px Inter,system-ui';ctx.textAlign='center';
    lbl.forEach((m,i)=>ctx.fillText(m,L+W/(lbl.length-1)*i,cv.height-7));
  }

  function renderRecent(){
    const area=$('recentArea');
    if(!records.length){area.innerHTML='<div class="empty">No transactions yet — add one above!</div>';return;}
    area.innerHTML=records.slice(0,6).map(r=>`
      <div class="txn-item" data-id="${r.id}">
        <div class="txn-icon ${(r.currency||'SGD')==='MYR'?'myr':'sgd'}">${catEmoji(r.category)}</div>
        <div class="txn-main">
          <div class="txn-cat">${esc(r.category)}</div>
          <div class="txn-meta">${esc(r.date)}${r.note?' · '+esc(r.note):''}</div>
        </div>
        <div class="txn-amt ${(r.currency||'SGD')==='MYR'?'myr':'sgd'}">${money(r.amount,r.currency||'SGD')}</div>
        <div class="txn-actions" style="display:none">
          <button class="btn-sm danger" data-del="${r.id}">Delete</button>
          <button class="btn-sm primary" data-edit="${r.id}">Edit</button>
        </div>
      </div>`).join('');
    area.querySelectorAll('.txn-item').forEach(item=>{
      item.addEventListener('click',e=>{
        if(e.target.closest('button'))return;
        const open=item.classList.contains('expanded');
        area.querySelectorAll('.txn-item').forEach(i=>{i.classList.remove('expanded');i.querySelector('.txn-actions').style.display='none';});
        if(!open){item.classList.add('expanded');item.querySelector('.txn-actions').style.display='flex';}
      });
    });
    area.querySelectorAll('[data-edit]').forEach(b=>b.onclick=e=>{e.stopPropagation();editRecord(Number(b.dataset.edit));});
    area.querySelectorAll('[data-del]').forEach(b=>b.onclick=e=>{e.stopPropagation();deleteRecord(Number(b.dataset.del));});
  }

  function filtered(){const fm=$('filterMonth').value,fc=$('filterCurrency').value,fcat=$('filterCategory').value;return records.filter(r=>(!fm||r.date.startsWith(fm))&&(!fc||(r.currency||'SGD')===fc)&&(!fcat||r.category===fcat)).sort((a,b)=>b.date.localeCompare(a.date));}

  function renderTable(){
    const data=filtered(),area=$('tableArea'),summary=$('summaryArea');
    if(!data.length){
      if(summary)summary.innerHTML='';
      area.innerHTML='<div class="empty">No transactions found.</div>';
      return;
    }
    const sgdTotal=data.filter(r=>(r.currency||'SGD')==='SGD').reduce((a,r)=>a+Number(r.amount),0);
    const myrTotal=data.filter(r=>(r.currency||'SGD')==='MYR').reduce((a,r)=>a+Number(r.amount),0);
    const avg=data.length?(sgdTotal+myrTotal)/data.length:0;
    const catTotals={};
    data.filter(r=>(r.currency||'SGD')==='SGD').forEach(r=>{catTotals[r.category]=(catTotals[r.category]||0)+Number(r.amount);});
    const topCats=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
    const grandSgd=sgdTotal||1;
    const catBars=topCats.map(([cat,val])=>{
      const pct=Math.round(val/grandSgd*100);
      return `<div style="margin-bottom:6px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
          <span style="font-size:11px;font-weight:600;color:var(--text)">${catEmoji(cat)} ${esc(cat)}</span>
          <span style="font-size:11px;color:var(--sub)">${money(val,'SGD')} · ${pct}%</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');
    if(summary) summary.innerHTML=`
      <div style="background:var(--s2);border:1px solid var(--b1);border-radius:18px;padding:14px;margin-bottom:12px">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;margin-bottom:${topCats.length&&sgdTotal>0?'12px':'0'}">
          <div style="text-align:center">
            <div style="font-size:10px;color:var(--sub);font-weight:500;margin-bottom:3px">SGD Total</div>
            <div style="font-size:14px;font-weight:800;color:#7dd3fc;letter-spacing:-.02em">${money(sgdTotal,'SGD')}</div>
          </div>
          <div style="text-align:center;border-left:1px solid var(--b0);border-right:1px solid var(--b0)">
            <div style="font-size:10px;color:var(--sub);font-weight:500;margin-bottom:3px">MYR Total</div>
            <div style="font-size:14px;font-weight:800;color:#fdba74;letter-spacing:-.02em">${money(myrTotal,'MYR')}</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:10px;color:var(--sub);font-weight:500;margin-bottom:3px">${data.length} Txn${data.length>1?'s':''}</div>
            <div style="font-size:14px;font-weight:800;color:var(--text);letter-spacing:-.02em">${data.length>1?'~'+money(avg,'SGD').replace('S$ ','S$'):''}</div>
          </div>
        </div>
        ${topCats.length&&sgdTotal>0?`<div style="border-top:1px solid var(--b0);padding-top:10px">${catBars}</div>`:''}
      </div>`;
    area.innerHTML=data.map(r=>`
      <div class="row-item" data-id="${r.id}">
        <div class="row-icon ${(r.currency||'SGD')==='MYR'?'myr':'sgd'}">${catEmoji(r.category)}</div>
        <div class="row-info">
          <div class="row-cat">${esc(r.category)}</div>
          <div class="row-sub">${esc(r.note||'—')}</div>
        </div>
        <div class="row-right">
          <div class="row-amount ${(r.currency||'SGD')==='MYR'?'myr':'sgd'}">${money(r.amount,r.currency||'SGD')}</div>
          <div class="row-date">${esc(r.date)}</div>
        </div>
        <div class="row-actions" style="display:none">
          <button class="btn-sm danger" data-del="${r.id}">Delete</button>
          <button class="btn-sm primary" data-edit="${r.id}">Edit</button>
        </div>
      </div>`).join('');
    area.querySelectorAll('.row-item').forEach(row=>{
      row.addEventListener('click',e=>{
        if(e.target.closest('button'))return;
        const open=row.classList.contains('expanded');
        area.querySelectorAll('.row-item').forEach(r=>{r.classList.remove('expanded');r.querySelector('.row-actions').style.display='none';});
        if(!open){row.classList.add('expanded');row.querySelector('.row-actions').style.display='flex';}
      });
    });
    area.querySelectorAll('[data-edit]').forEach(b=>b.onclick=e=>{e.stopPropagation();editRecord(Number(b.dataset.edit));});
    area.querySelectorAll('[data-del]').forEach(b=>b.onclick=e=>{e.stopPropagation();deleteRecord(Number(b.dataset.del));});
  }

  function renderCatBudgetChart(){
    const cont=$('catTrendCards');if(!cont)return;
    const now=new Date(),lbl=[],keys=[];
    for(let i=11;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);keys.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'));lbl.push(d.toLocaleString(undefined,{month:'short'}));}
    const pal=['#38bdf8','#fb923c','#a78bfa','#4ade80','#f472b6','#fbbf24','#34d399','#f87171'];
    const cats=categories.filter(cat=>categoryBudgets[cat]>0||records.some(r=>r.category===cat&&(r.currency||'SGD')==='SGD'));
    if(!cats.length){cont.innerHTML='';return;}

    // Build legend items
    const legendHtml=cats.map((cat,i)=>`
      <span style="display:inline-flex;align-items:center;gap:4px;margin-right:10px;font-size:11px;color:${pal[i%pal.length]};font-weight:600">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${pal[i%pal.length]}"></span>
        ${catEmoji(cat)} ${esc(cat)}${categoryBudgets[cat]>0?' ('+money(categoryBudgets[cat],'SGD')+')':''}
      </span>`).join('');

    cont.innerHTML=`
      <div class="card">
        <div class="card-title" style="margin-bottom:8px">Category Trends</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px">${legendHtml}</div>
        <div class="chart-wrap"><canvas id="catGroupCv" width="600" height="260"></canvas></div>
      </div>`;

    const cv=$('catGroupCv');if(!cv)return;
    const ctx=cv.getContext('2d');
    // Compute all series
    const series=cats.map(cat=>keys.map(k=>records.filter(r=>(r.currency||'SGD')==='SGD'&&r.date.startsWith(k)&&r.category===cat).reduce((a,r)=>a+Number(r.amount||0),0)));
    const allBudgets=cats.map(cat=>Number(categoryBudgets[cat]||0));
    const max=Math.max(...series.flat(),...allBudgets,1);
    const L=36,R=8,T=24,B=24,W=cv.width-L-R,H=cv.height-T-B;
    // Grid + Y labels
    for(let g=0;g<=4;g++){
      const y=T+H/4*g,val=Math.round(max*(1-g/4));
      ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(L,y);ctx.lineTo(L+W,y);ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,.28)';ctx.font='8px Inter,system-ui';ctx.textAlign='right';
      ctx.fillText(val>=1000?(val/1000).toFixed(1)+'k':val,L-4,y+3);
    }
    // Budget dashed lines
    cats.forEach((cat,i)=>{
      const bgt=allBudgets[i];if(!bgt)return;
      const y=T+H-(bgt/max)*H;
      ctx.beginPath();ctx.setLineDash([4,3]);ctx.moveTo(L,y);ctx.lineTo(L+W,y);
      ctx.strokeStyle=pal[i%pal.length]+'55';ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
    });
    // Lines + dots
    series.forEach((vals,i)=>{
      const col=pal[i%pal.length];
      const pts=vals.map((v,j)=>({x:L+W/(vals.length-1)*j,y:T+H-(v/max)*H,v}));
      ctx.beginPath();pts.forEach((p,j)=>j?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));
      ctx.strokeStyle=col;ctx.lineWidth=2;ctx.lineJoin='round';ctx.stroke();
      pts.forEach(p=>{
        ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
        if(p.v>0){
          const lbl2=p.v>=1000?(p.v/1000).toFixed(1)+'k':Math.round(p.v).toString();
          ctx.fillStyle=col;ctx.font='bold 8px Inter,system-ui';ctx.textAlign='center';
          ctx.fillText(lbl2,p.x,p.y-7);
        }
      });
    });
    // X labels
    ctx.fillStyle='rgba(255,255,255,.28)';ctx.font='9px Inter,system-ui';ctx.textAlign='center';
    lbl.forEach((m,j)=>ctx.fillText(m,L+W/(lbl.length-1)*j,cv.height-6));
  }

  function renderAll(){renderDashboard();renderTrendChart();renderRecent();renderTable();}

  /* ── Budget Alerts ── */
  let _lastAlertState={};
  function showAlert(type,icon,msg){
    const container=$('alertToast');if(!container)return;
    const el=document.createElement('div');
    el.className=`alert-item ${type}`;
    el.innerHTML=`<span class="alert-icon">${icon}</span><span class="alert-text">${msg}</span><span class="alert-close">✕</span>`;
    el.querySelector('.alert-close').onclick=()=>el.remove();
    setTimeout(()=>{if(el.parentNode)el.remove();},7000);
    container.appendChild(el);
  }
  function checkBudgetAlerts(){
    const spent=records.filter(r=>(r.currency||'SGD')==='SGD'&&r.date.startsWith(month())).reduce((a,r)=>a+Number(r.amount||0),0);
    // Overall budget
    if(budgetSGD>0){
      const pct=spent/budgetSGD;
      const prev=_lastAlertState['overall']||0;
      if(pct>=1&&prev<1) showAlert('over','🚨',`Monthly budget exceeded! Spent ${moneyShort(spent,'SGD')} of ${moneyShort(budgetSGD,'SGD')}`);
      else if(pct>=0.8&&prev<0.8) showAlert('warn','⚠️',`${Math.round(pct*100)}% of monthly budget used — ${moneyShort(budgetSGD-spent,'SGD')} left`);
      _lastAlertState['overall']=pct;
    }
    // Category budgets
    const m=catMap('SGD');
    categories.forEach(cat=>{
      const bgt=Number(categoryBudgets[cat]||0);if(!bgt)return;
      const sp=Number(m[cat]||0),pct=sp/bgt;
      const prev=_lastAlertState[cat]||0;
      if(pct>=1&&prev<1) showAlert('over','🚨',`${cat} budget exceeded! ${moneyShort(sp,'SGD')} of ${moneyShort(bgt,'SGD')}`);
      else if(pct>=0.8&&prev<0.8) showAlert('warn','⚠️',`${cat} at ${Math.round(pct*100)}% — ${moneyShort(bgt-sp,'SGD')} left`);
      _lastAlertState[cat]=pct;
    });
  }

  /* ── Currency toggle ── */
  function setCurrency(c){
    $('currencyInput').value=c;
    $('chipSGD').className='ccy-chip'+(c==='SGD'?' active-sgd':'');
    $('chipMYR').className='ccy-chip'+(c==='MYR'?' active-myr':'');
    $('amountPrefix').textContent=c==='MYR'?'RM':'S$';
  }

  /* ── Form ── */
  function clearForm(){
    editingId=null;
    $('saveBtn').textContent='Save Transaction';
    $('saveBtn').className='btn-save';
    $('dateInput').value=today();
    $('categoryInput').value=categories[0]||'';
    $('amountInput').value='';
    setCurrency('SGD');
    $('noteInput').value='';
    setStatus('');
  }

  function saveTxn(e){
    e.preventDefault();
    const date=$('dateInput').value,category=$('categoryInput').value,amount=parseFloat($('amountInput').value),currency=$('currencyInput').value||'SGD',note=$('noteInput').value;
    if(!date||!category||isNaN(amount)||amount<=0)return setStatus('Please fill in all required fields.');
    if(editingId){const r=records.find(x=>x.id===editingId);if(r)Object.assign(r,{date,category,amount,currency,note});}
    else records.unshift({id:Date.now(),date,category,amount,currency,note});
    save();clearForm();renderAll();checkBudgetAlerts();
    setStatus('✓ Saved!');
  }

  function editRecord(id){
    const r=records.find(x=>x.id===id);if(!r)return;
    editingId=id;
    $('saveBtn').textContent='Update Transaction';
    $('saveBtn').className='btn-save editing';
    $('dateInput').value=r.date;
    $('categoryInput').value=r.category;
    $('amountInput').value=r.amount;
    setCurrency(r.currency||'SGD');
    $('noteInput').value=r.note||'';
    // Switch to dashboard and scroll form into view
    switchTab('dashboardTab');
    setTimeout(()=>$('amountInput').scrollIntoView({behavior:'smooth',block:'center'}),100);
    $('amountInput').focus();
  }

  const _pd=new Set();
  function deleteRecord(id){
    if(!_pd.has(id)){
      _pd.add(id);
      document.querySelectorAll(`[data-del="${id}"],[data-recent-del="${id}"]`).forEach(b=>b.textContent='Confirm?');
      setTimeout(()=>{if(_pd.has(id)){_pd.delete(id);document.querySelectorAll(`[data-del="${id}"],[data-recent-del="${id}"]`).forEach(b=>b.textContent='Delete');}},3000);
      return;
    }
    _pd.delete(id);records=records.filter(r=>r.id!==id);save();renderAll();
  }

  function switchTab(id,keepFilters=false){
    ['dashboardTab','addTab','settingsTab'].forEach(t=>$(t).className=t===id?'tab-section active':'tab-section');
    ['navDashboard','navAdd','navSettings'].forEach(n=>{const el=$(n);if(el)el.classList.remove('active');});
    const m={'dashboardTab':'navDashboard','addTab':'navAdd','settingsTab':'navSettings'};
    const n=$(m[id]);if(n)n.classList.add('active');
    if(id==='addTab'&&!keepFilters){$('filterMonth').value='';$('filterCurrency').value='';$('filterCategory').value='';renderTable();}
    if(id==='settingsTab')renderCatBudgetChart();
    window.scrollTo({top:0,behavior:'smooth'});
  }

  function exportJson(){const b=new Blob([JSON.stringify({records,categories,budgetSGD,categoryBudgets},null,2)],{type:'application/json'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='expense-backup.json';a.click();URL.revokeObjectURL(u);}
  function importJson(e){const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=ev=>{try{const d=JSON.parse(ev.target.result);records=(d.records||d||[]).map(r=>({...r,currency:r.currency||'SGD'}));categories=Array.isArray(d.categories)&&d.categories.length?d.categories:categories;budgetSGD=Number(d.budgetSGD||0);categoryBudgets=d.categoryBudgets||{};save();refreshCategories();clearForm();renderAll();setStatus('Imported.');}catch{setStatus('Invalid file.');}};rd.readAsText(f);}

  /* ── Init ── */
  load();refreshCategories();clearForm();populateMonthFilter();renderAll();
  // Show alerts on load for existing overages (slight delay so UI renders first)
  setTimeout(checkBudgetAlerts, 800);

  /* ── Populate month filter ── */
  function populateMonthFilter(){
    const sel=$('filterMonth');
    const now=new Date();
    let opts='<option value="">All</option>';
    for(let i=0;i<24;i++){
      const d=new Date(now.getFullYear(),now.getMonth()-i,1);
      const val=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
      const lbl=d.toLocaleString(undefined,{month:'short',year:'numeric'});
      opts+=`<option value="${val}">${lbl}</option>`;
    }
    sel.innerHTML=opts;
  }
  let _savedScroll=0;
  document.querySelectorAll('#txnForm input, #txnForm select').forEach(el=>{
    el.addEventListener('focus',()=>{ _savedScroll=window.scrollY; }, {passive:true});
    el.addEventListener('blur',()=>{ requestAnimationFrame(()=>window.scrollTo({top:_savedScroll})); }, {passive:true});
  });

  /* ── Events ── */
  $('txnForm').addEventListener('submit',saveTxn);
  $('chipSGD').onclick=()=>setCurrency('SGD');
  $('chipMYR').onclick=()=>setCurrency('MYR');
  $('navDashboard').onclick=()=>switchTab('dashboardTab');
  $('navAdd').onclick=()=>switchTab('addTab');
  $('navSettings').onclick=()=>switchTab('settingsTab');
  $('filterMonth').onchange=renderTable;
  $('filterCurrency').onchange=renderTable;
  $('filterCategory').onchange=renderTable;
  $('resetFilterBtn').onclick=()=>{$('filterMonth').value='';$('filterCurrency').value='';$('filterCategory').value='';renderTable();};
  $('exportBtn').onclick=exportJson;
  $('importBtn').onclick=()=>$('importFile').click();
  $('importFile').onchange=importJson;
  $('clearAllBtn').onclick=()=>{if(confirm('Clear all data?')){records=[];save();renderAll();}};
  $('saveBudgetBtn').onclick=()=>{const a=parseFloat($('budgetAmountInput').value);if(isNaN(a)||a<0)return setStatus('Enter a valid amount.');budgetSGD=a;$('budgetAmountInput').value='';save();renderAll();setStatus('Budget saved.');};
  $('clearBudgetBtn').onclick=()=>{budgetSGD=0;save();renderAll();setStatus('Budget cleared.');};
  $('saveCategoryBudgetBtn').onclick=()=>{const cat=$('budgetCategoryInput').value,a=parseFloat($('categoryBudgetAmountInput').value);if(!cat||isNaN(a)||a<0)return setStatus('Fill both fields.');categoryBudgets[cat]=a;$('categoryBudgetAmountInput').value='';save();renderAll();setStatus('Category budget saved.');};
  $('clearCategoryBudgetsBtn').onclick=()=>{categoryBudgets={};save();renderAll();setStatus('Cleared.');};
  $('addCategoryBtn').onclick=()=>{
    const n=$('newCategoryInput').value.trim();
    if(!n)return setStatus('Enter a name.');
    if(selectedCategory&&selectedCategory!==n){
      categories=categories.map(c=>c===selectedCategory?n:c);
      records.forEach(r=>{if(r.category===selectedCategory)r.category=n;});
      if(categoryBudgets[selectedCategory]!==undefined){categoryBudgets[n]=categoryBudgets[selectedCategory];delete categoryBudgets[selectedCategory];}
    } else if(!categories.some(c=>c.toLowerCase()===n.toLowerCase())){
      categories.push(n);
    } else {
      return setStatus('Already exists.');
    }
    $('newCategoryInput').value='';selectedCategory='';
    save();refreshCategories();renderAll();setStatus('Saved.');
  };
  $('deleteCategoryBtn').onclick=()=>{
    const n=(selectedCategory||$('newCategoryInput').value.trim());
    if(!n)return setStatus('Tap a category pill first.');
    if(!categories.includes(n))return setStatus('"'+n+'" not found.');
    const affected=records.filter(r=>r.category===n).length;
    records.forEach(r=>{if(r.category===n)r.category='Miscellaneous';});
    categories=categories.filter(c=>c!==n);
    delete categoryBudgets[n];
    $('newCategoryInput').value='';
    selectedCategory='';
    save();refreshCategories();renderAll();
    setStatus('"'+n+'" deleted.'+(affected?` ${affected} transaction${affected>1?'s':''} moved to Miscellaneous.`:''));
  };

  document.querySelectorAll('.ccy-card[data-filter]').forEach(box=>{
    box.addEventListener('click',()=>{$('filterCurrency').value=box.dataset.filter;$('filterMonth').value=month();$('filterCategory').value='';renderTable();switchTab('addTab',true);});
  });

  // Swipe between tabs
  let sx=0,sy=0,st=0;
  document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();},{passive:true});
  document.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy,dt=Date.now()-st;
    if(dt>400||Math.abs(dy)>Math.abs(dx)||Math.abs(dx)<55)return;
    const tabs=['dashboardTab','addTab','settingsTab'],active=tabs.findIndex(t=>$(t).classList.contains('active'));
    if(dx<0&&active<tabs.length-1)switchTab(tabs[active+1]);
    else if(dx>0&&active>0)switchTab(tabs[active-1]);
  },{passive:true});

})();
</script>
</body>
