<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#02020a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PortfolioX</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#010108;
  --bg2:#030310;
  --bg3:#05050e;
  --bg4:#08081a;
  --b1:rgba(255,255,255,0.07);
  --b2:rgba(255,255,255,0.12);
  --b3:rgba(255,255,255,0.2);
  --t1:#eef2ff;
  --t2:rgba(255,255,255,0.45);
  --t3:rgba(255,255,255,0.2);
  --blue:#00d4ff;     --bd:rgba(0,212,255,0.07);  --bdd:rgba(0,212,255,0.03);
  --green:#00e676;    --gd:rgba(0,230,118,0.07);
  --red:#ff4d6d;      --rd:rgba(255,77,109,0.08);
  --amber:#ffaa00;
  --r:8px;--rl:14px;
  --card-border-top:1px solid rgba(255,255,255,0.18);
  --glow-gold:rgba(200,148,0,0.35);
  --glow-blue:rgba(0,180,255,0.25);
}
html{background:#010108;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;background:#010108;color:var(--t1);font-size:13px;min-height:100vh;min-height:-webkit-fill-available;height:100%;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
button,input,select,textarea{font-family:inherit}

/* ── Inputs & selects ── */
input,select{font-family:inherit;font-size:16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-top:1px solid rgba(255,255,255,0.12);border-radius:var(--r);color:var(--t1);padding:7px 10px;outline:none;width:100%;transition:all .2s;box-shadow:inset 0 1px 0 rgba(0,0,0,0.3);text-align:center;text-align-last:center}
input[type="date"]{-webkit-appearance:none;appearance:none;min-height:36px;color:var(--t1)}
input:focus,select:focus{border-color:rgba(0,212,255,0.5);box-shadow:0 0 0 1px rgba(0,212,255,0.15),inset 0 1px 0 rgba(0,0,0,0.3);background:rgba(0,212,255,0.03)}
select option{background:#08080f}

/* ── Buttons ── */
button{font-family:inherit;font-size:12px;cursor:pointer;border-radius:var(--r);border:1px solid rgba(255,255,255,0.08);padding:6px 14px;background:rgba(255,255,255,0.03);color:var(--t1);transition:all .15s}
button:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.15)}
button.pri{background:linear-gradient(135deg,rgba(0,212,255,0.08),rgba(0,180,255,0.04));border-color:rgba(0,212,255,0.4);color:var(--blue);font-weight:600;box-shadow:0 0 12px rgba(0,212,255,.1),inset 0 1px 0 rgba(0,212,255,.1)}
button.pri:hover{box-shadow:0 0 20px rgba(0,212,255,.25),inset 0 1px 0 rgba(0,212,255,.15)}
button.dng{background:var(--rd);border-color:rgba(255,77,109,0.4);color:var(--red)}
button.gdng{border-color:rgba(255,77,109,0.3);color:var(--red);background:transparent}
button.amb{border-color:rgba(255,170,0,0.3);color:var(--amber);background:transparent}
button.sm{padding:4px 10px;font-size:11px}
button.ghost{border-color:rgba(255,255,255,0.06);color:var(--t2);background:transparent}

/* ── Cards — premium sharp glass ── */
.card{
  position:relative;overflow:hidden;
  background:linear-gradient(160deg,rgba(12,12,20,0.97) 0%,rgba(8,8,14,0.99) 100%);
  border:1px solid rgba(255,255,255,0.09);
  border-top:1px solid rgba(255,255,255,0.22);
  border-radius:var(--rl);
  padding:1rem 1.125rem;
  margin-bottom:.875rem;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.1) inset,
    0 -1px 0 rgba(0,0,0,0.7) inset,
    0 8px 32px rgba(0,0,0,0.6),
    0 2px 8px rgba(0,0,0,0.8);
  -webkit-font-smoothing:antialiased;
}
.card::before{
  content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.45),transparent);
  pointer-events:none;
}
.card::after{
  content:'';position:absolute;inset:0;border-radius:var(--rl);
  background:linear-gradient(160deg,rgba(255,255,255,0.025) 0%,transparent 50%);
  pointer-events:none;
}

/* ── Tables ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl thead{background:rgba(255,255,255,0.02)}
.tbl th{padding:7px 10px;text-align:center;font-size:10px;font-weight:700;color:rgba(255,255,255,0.35);border-bottom:1px solid rgba(255,255,255,0.06);white-space:nowrap;letter-spacing:.5px;text-transform:uppercase}
.tbl td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle;white-space:nowrap;text-align:center}
.tbl th.r{text-align:center;white-space:nowrap}
.tbl td.r{text-align:center;white-space:nowrap}
.tbl th:first-child,.tbl td:first-child{text-align:left}
.tbl tbody tr:hover td{background:rgba(255,255,255,0.03)}
.tbl tbody tr.ck:hover td{background:rgba(255,255,255,0.04);cursor:pointer}
.tbl tfoot td{padding:7px 10px;border-top:1px solid rgba(255,255,255,0.08);font-weight:600;border-bottom:none;background:rgba(255,255,255,0.02);white-space:nowrap;color:rgba(255,255,255,0.7);text-align:center}
.tbl tfoot td.r{text-align:center}
.tbl tfoot td:first-child{text-align:left}

/* ── Colour utility ── */
.g{color:var(--green)}.rr{color:var(--red)}.m{color:var(--t2)}.am{color:var(--amber)}

/* ── Tabs (portfolio tabs) ── */
.tab{
  border:none;border-bottom:2px solid transparent;border-radius:0;
  padding:8px 14px;font-size:12px;color:rgba(255,255,255,0.3);background:transparent;white-space:nowrap;
  transition:all .2s;font-family:'Courier New',monospace;letter-spacing:.5px;
}
.tab:hover{color:rgba(255,255,255,0.6)}
.tab.on{color:#fff;border-bottom-color:rgba(255,255,255,0.7);font-weight:700;text-shadow:0 0 12px rgba(255,255,255,0.5)}

/* ── Misc UI ── */
.badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.ib{border:none;background:transparent;padding:3px 6px;font-size:13px;color:rgba(255,255,255,0.2);cursor:pointer;transition:all .15s}
.ib:hover{color:var(--t1);text-shadow:0 0 8px rgba(255,255,255,0.4)}

.stl{
  font-size:9px;font-weight:700;color:rgba(255,255,255,0.3);
  letter-spacing:1.5px;
  margin-bottom:.75rem;
  padding:.25rem .75rem;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:4px;
  display:inline-block;
  font-family:'Courier New',monospace;
  text-transform:uppercase;
}

.lbl{font-size:11px;color:var(--t2);margin-bottom:5px;display:block}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px} .full{grid-column:1/-1}

.ctag{
  font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;
  background:rgba(0,212,255,0.06);color:var(--blue);display:inline-block;
  border:1px solid rgba(0,212,255,0.2);
}

.pill{border-radius:20px;padding:5px 14px;font-size:12px;font-weight:500;transition:all .15s}
.hd-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  width:130px;height:34px;
  padding:0 10px;
  background:linear-gradient(160deg,rgba(255,255,255,0.04) 0%,rgba(255,255,255,0.01) 100%);
  border:1px solid rgba(255,255,255,0.08);
  border-top:1px solid rgba(255,255,255,0.18);
  border-radius:20px;
  font-size:12px;font-weight:600;color:var(--t1);
  cursor:pointer;white-space:nowrap;overflow:hidden;
  box-shadow:0 4px 14px rgba(0,0,0,0.5),0 1px 0 rgba(255,255,255,0.06) inset;
  flex-shrink:0;
}

/* Toast */
.toast{position:fixed;bottom:80px;right:16px;background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.3);color:var(--green);padding:8px 16px;border-radius:var(--r);font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;font-family:'Courier New',monospace;letter-spacing:.5px;box-shadow:0 0 16px rgba(0,230,118,.15),inset 0 1px 0 rgba(0,230,118,.1)}
.toast.show{opacity:1}

/* Overlay & modal */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;align-items:flex-start;justify-content:center;padding-top:40px;overflow-y:auto;backdrop-filter:blur(8px)}
#ov.open{display:flex}
.modal{
  position:relative;
  background:linear-gradient(160deg,#07070f,#05050c);
  border:1px solid rgba(255,255,255,0.08);
  border-top:1.5px solid rgba(255,255,255,0.35);
  border-radius:16px;padding:1.5rem;width:580px;max-width:96vw;max-height:90vh;overflow-y:auto;
  box-shadow:0 0 0 1px rgba(255,255,255,0.04),0 24px 60px rgba(0,0,0,0.8),inset 0 1px 0 rgba(255,255,255,0.1)
}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.5),transparent);pointer-events:none}
.modal h3{font-size:15px;font-weight:700;margin-bottom:1.25rem;color:var(--t1);font-family:'Courier New',monospace;letter-spacing:.5px}

/* Header */
#hd{
  background:linear-gradient(180deg,rgba(4,4,12,0.98) 0%,rgba(3,3,10,0.99) 100%);
  border-bottom:1px solid rgba(255,255,255,0.07);
  padding:0 16px;
  display:flex;flex-direction:column;justify-content:center;
  position:fixed;top:0;left:0;right:0;z-index:100;
  box-shadow:
    0 1px 0 rgba(200,148,0,0.12),
    0 6px 30px rgba(0,0,0,.9),
    0 1px 0 rgba(255,255,255,0.05) inset;
  -webkit-font-smoothing:antialiased;
}
#hd::after{
  content:'';position:absolute;bottom:-1px;left:15%;right:15%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,148,0,0.25),transparent);
  pointer-events:none;
}
#hd .logo{
  font-family:'Courier New',monospace;
  font-size:15px;font-weight:700;letter-spacing:.5px;white-space:nowrap;
  flex-shrink:0;display:flex;align-items:center;gap:3px;
}

/* Search bar */
.search-bar{display:flex;align-items:center;gap:8px;margin-bottom:.75rem;padding:6px 10px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:var(--r)}

/* kc = key card, kl = key label, kv = key value */
.kc{background:linear-gradient(135deg,#060609,#09090e);border:1px solid rgba(255,255,255,0.06);border-top:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:10px 14px;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04)}
.kl{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:.3px;margin-bottom:3px}
.kv{font-size:14px;font-weight:700}

/* ── Portfolio cards (dashboard/overview) ── */
@keyframes pricespin{to{transform:rotate(360deg)}}
@keyframes ptr-spin{to{transform:rotate(360deg)}}
#ptr-indicator{
  position:fixed;top:0;left:0;right:0;z-index:500;
  display:flex;align-items:center;justify-content:center;gap:8px;
  height:0;overflow:hidden;
  background:rgba(0,0,0,0.9);
  font-size:11px;color:rgba(0,200,255,0.6);letter-spacing:1.5px;text-transform:uppercase;
  transition:height .2s ease;
  pointer-events:none;
}
#ptr-indicator.visible{height:44px;}
#ptr-spinner{width:14px;height:14px;border:2px solid rgba(0,200,255,0.2);border-top-color:rgba(0,200,255,0.8);border-radius:50%;}
#ptr-spinner.spin{animation:ptr-spin .7s linear infinite;}
.pf-card{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#050508,#08080d);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:var(--rl);
  padding:.75rem 1rem;
  margin-bottom:.625rem;
  box-shadow:0 1px 0 rgba(255,255,255,0.05) inset,0 4px 16px rgba(0,0,0,0.4);
  transition:border-color .2s,box-shadow .2s;
}
.pf-card:hover{border-color:rgba(255,255,255,0.1);box-shadow:0 1px 0 rgba(255,255,255,0.08) inset,0 6px 20px rgba(0,0,0,0.5)}
.pf-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);pointer-events:none}

/* ── Section headers / dividers ── */
.sec-hdr{
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,0.25);font-family:'Courier New',monospace;
  display:flex;align-items:center;gap:10px;margin:1rem 0 .625rem;
}
.sec-hdr::before,.sec-hdr::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.06),transparent)}
.sec-hdr::before{background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06))}

/* ── Back button ── */
.bb{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;color:rgba(255,255,255,0.4);cursor:pointer;
  padding:4px 0;margin-bottom:.75rem;
  border:none;background:transparent;
  transition:color .15s;
}
.bb:hover{color:rgba(255,255,255,0.8)}

/* ── Date bar ── */
#date-bar{
  background:rgba(2,2,10,0.96)!important;
  border-bottom:1px solid rgba(255,255,255,0.05)!important;
  backdrop-filter:blur(10px);
}

/* ── Settings panel header ── */
#settings-panel > div:first-child{
  border-bottom:1px solid rgba(255,255,255,0.05);
}

/* ── Settings buttons ── */
.settings-btn{
  padding:8px 6px;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.07);
  border-top:1px solid rgba(255,255,255,0.12);
  border-radius:8px;color:var(--t1);font-size:11px;font-weight:500;
  cursor:pointer;font-family:inherit;text-align:center;min-height:34px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.04);
  transition:all .15s;
}
.settings-btn:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.15)}

/* ── Global ambient glow behind content ── */
#mn::before{
  content:'';
  position:fixed;top:30%;left:50%;
  width:600px;height:600px;
  transform:translate(-50%,-50%);
  background:radial-gradient(ellipse,rgba(80,40,255,0.03) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

/* ── Scrollbar styling ── */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.2)}

/* ── Selection color ── */
::selection{background:rgba(0,212,255,0.2);color:#fff}


@keyframes gemSpin{
  0%{filter:drop-shadow(0 0 6px #00fff0) drop-shadow(0 0 12px #0088ff);transform:rotate(0deg) scale(1)}
  25%{filter:drop-shadow(0 0 20px #00fff0) drop-shadow(0 0 40px #0088ff) drop-shadow(0 0 60px rgba(0,136,255,0.5));transform:rotate(90deg) scale(1.2)}
  50%{filter:drop-shadow(0 0 10px #6600ff) drop-shadow(0 0 25px #0088ff);transform:rotate(180deg) scale(1)}
  75%{filter:drop-shadow(0 0 20px #00fff0) drop-shadow(0 0 40px #0088ff) drop-shadow(0 0 60px rgba(0,136,255,0.5));transform:rotate(270deg) scale(1.2)}
  100%{filter:drop-shadow(0 0 6px #00fff0) drop-shadow(0 0 12px #0088ff);transform:rotate(360deg) scale(1)}
}
@keyframes xPulse{
  0%,100%{filter:drop-shadow(0 3px 0 #000) drop-shadow(0 0 8px rgba(255,140,0,0.5));transform:scale(1) skewX(0deg)}
  25%{filter:drop-shadow(0 3px 0 #000) drop-shadow(0 0 30px rgba(255,180,0,1)) drop-shadow(0 0 60px rgba(255,80,0,0.9));transform:scale(1.15) skewX(-4deg)}
  75%{filter:drop-shadow(0 3px 0 #000) drop-shadow(0 0 20px rgba(255,220,0,0.8));transform:scale(1.08) skewX(3deg)}
}
@keyframes portfolioShimmer{
  0%{background-position:200% center}
  100%{background-position:-200% center}
}
@keyframes logoFloat{
  0%,100%{transform:translateY(0px)}
  50%{transform:translateY(-4px)}
}
@keyframes holoBG{
  0%{opacity:0.4}
  50%{opacity:1}
  100%{opacity:0.4}
}
@keyframes particleDrift{
  0%{top:85%;opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{top:5%;opacity:0}
}
@keyframes scanLine{
  0%{transform:translateX(-100%);opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{transform:translateX(200%);opacity:0}
}
@keyframes scanLine2{
  0%,40%{transform:translateX(-100%);opacity:0}
  50%{opacity:0.7}
  90%{opacity:0.7}
  100%{transform:translateX(200%);opacity:0}
}
@keyframes cornerPulse{
  0%,100%{opacity:0.5;box-shadow:none}
  50%{opacity:1;box-shadow:0 0 8px rgba(255,255,255,0.6)}
}
@keyframes rodPulse{
  0%,100%{box-shadow:0 0 6px rgba(255,255,255,0.4),0 0 14px rgba(255,255,255,0.15)}
  50%{box-shadow:0 0 10px rgba(255,255,255,0.8),0 0 24px rgba(255,255,255,0.3),0 0 40px rgba(255,255,255,0.1)}
}
@keyframes barPulse{
  0%,100%{transform:scaleY(1);opacity:0.7}
  50%{transform:scaleY(0.3);opacity:1}
}
@keyframes iconPop{
  0%,100%{transform:scale(1);opacity:0.3}
  50%{transform:scale(1.8);opacity:1}
}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;border:none;cursor:pointer;padding:6px 6px;color:#2d3f5a;font-size:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-family:'Courier New',monospace;transition:all .2s;position:relative;flex:1}
.bnav-btn svg{transition:all .2s;opacity:0.45}
.bnav-btn:active svg{transform:scale(0.88)}

.settings-btn{padding:8px 6px;background:rgba(255,255,255,0.03);border:1px solid var(--b1);border-radius:8px;color:var(--t1);font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center;min-height:34px}
.bnav-btn:active svg{transform:scale(0.9)}
#bottom-nav button[data-nav].active{color:var(--blue)}
#mn{padding-bottom:80px!important;background:#010108;min-height:100vh}
#ct{padding:0;background:var(--bg)}
@keyframes borderPulse{
  0%,100%{opacity:0.6}
  50%{opacity:1}
}
@keyframes shimmerSweep{
  0%{left:-100%}
  60%,100%{left:150%}
}
@keyframes barShimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}

/* ── Architectural sphere animations ── */
/* Orb float — disabled per user request */

@keyframes coreBreath{0%,100%{opacity:0.7}50%{opacity:1}}
@keyframes orbRingScan{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes svgShine0{0%,100%{transform:translateX(-140%) rotate(38deg)}50%{transform:translateX(200%) rotate(38deg)}}
@keyframes svgShine1{0%,100%{transform:translateX(200%) rotate(38deg)}50%{transform:translateX(-140%) rotate(38deg)}}
@keyframes svgShine2{0%,60%{transform:translateX(-140%) rotate(38deg)}80%{transform:translateX(200%) rotate(38deg)}100%{transform:translateX(-140%) rotate(38deg)}}
/* ── Nav — champagne gold minimal ── */
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:transparent;border:none;cursor:pointer;padding:8px 4px;color:rgba(255,255,255,0.28);font-size:7.5px;font-weight:400;letter-spacing:.5px;text-transform:uppercase;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;transition:all 0.22s ease;position:relative;flex:1}
.bnav-btn svg{transition:all 0.22s ease;opacity:0.3}
.bnav-btn.active{color:rgba(200,160,60,0.9)}
.bnav-btn.active svg{opacity:1;transform:translateY(-1px);filter:drop-shadow(0 0 4px rgba(200,144,30,0.5))}
.bnav-btn.active::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:rgba(200,160,60,0.8);box-shadow:0 0 6px rgba(200,144,30,0.6)}
.bnav-btn:active svg{transform:scale(0.88)}

/* ── Metric card shine ── */
.metric-card-premium{
  position:relative;overflow:hidden;
  background:rgba(255,255,255,0.025);

.pv-hide{display:none}

.pv-networth-wrap{position:relative;display:block;min-height:1.05em}
.pv-networth-wrap .pv-val{visibility:visible;display:block}
.pv-networth-wrap .pv-hide{display:block!important;position:absolute;top:0;left:0;visibility:hidden;white-space:nowrap;pointer-events:none}
body.privacy-on .pv-networth-wrap .pv-val{visibility:hidden}
body.privacy-on .pv-networth-wrap .pv-hide{visibility:visible}

/* ── PRIVACY MODE ── */
body.privacy-on .pv-val:not(.pv-networth-wrap .pv-val){visibility:hidden!important}
body.privacy-on .pv-hide:not(.pv-networth-wrap .pv-hide){visibility:visible!important}
body.privacy-on span.pv-hide:not(.pv-networth-wrap .pv-hide){visibility:visible!important}

/* pv-hide always takes up space but is invisible by default */
.pv-hide{visibility:hidden;height:0;overflow:hidden;margin:0;padding:0}
body.privacy-on .pv-hide{height:auto;overflow:visible}
/* orb-num pv-hide sits in place */
.orb-num.pv-hide{visibility:hidden;position:absolute;top:0;left:0;right:0;height:auto;overflow:visible}
.orb-num.pv-val{position:relative}
/* SVG text privacy */
body.privacy-on svg .pv-val{display:block!important;visibility:hidden!important}
body.privacy-on svg .pv-hide{display:block!important;visibility:visible!important}

/* Privacy: numbers/percentages masked via pv-val, pv-num, pv-hide classes */

body.privacy-on .pv-num,

let _fx={SGD:3.45,USD:4.45,HKD:0.57,GBP:5.90}; // loaded from S.fx after load()
async function fetchFXAndFill(){
  const btn=document.getElementById('fx-fetch-btn');
  const status=document.getElementById('fx-fetch-status');
  if(btn)btn.disabled=true;
  if(status)status.textContent='Fetching…';
  // Get which currencies have visible inputs in the modal
  const toFetch=[];
  ['SGD','USD','GBP','HKD','AUD','EUR'].forEach(function(c){
    if(document.getElementById('fx-'+c))toFetch.push(c);
  });
  if(!toFetch.length){if(btn)btn.disabled=false;return;}
  let success=false;
  // Try Google Finance via allorigins (USDMYR, SGDMYR etc)
  try{
    await Promise.all(toFetch.map(async function(ccy){
      const pair=ccy+'MYR';
      const url='https://www.google.com/finance/quote/'+pair;
      const proxy='https://api.allorigins.win/get?url='+encodeURIComponent(url);
      const r=await fetch(proxy);
      const d=await r.json();
      const match=(d.contents||'').match(/data-last-price="([\d.]+)"/);
      if(match&&+match[1]>0){
        _fx[ccy]=+match[1];
        const el=document.getElementById('fx-'+ccy);
        if(el)el.value=(+match[1]).toFixed(4);
        success=true;
      }
    }));
  }catch(e){}
  // Fallback to frankfurter if Google didn't work
  if(!success){
    try{
      const r=await fetch('https://api.frankfurter.app/latest?from=MYR&to='+toFetch.join(','));
      if(r.ok){
        const d=await r.json();
        Object.entries(d.rates||{}).forEach(function([ccy,rate]){
          if(rate>0){
            _fx[ccy]=Math.round((1/rate)*10000)/10000;
            const el=document.getElementById('fx-'+ccy);
            if(el)el.value=_fx[ccy].toFixed(4);
            success=true;
          }
        });
      }
    }catch(e){}
  }
  if(status)status.textContent=success?'✓ Updated':'⚠ Failed — enter manually';
  if(btn)btn.disabled=false;
}

async function fetchFX(){
  try{
    const ccys=Object.keys(_fx).filter(function(c){return c!=='MYR';});
    if(!ccys.length)return;
    // Use open.er-api.com with MYR base — supports MYR natively, free, no key
    const url='https://open.er-api.com/v6/latest/MYR';
    const proxies=[
      url,
      'https://corsproxy.io/?'+encodeURIComponent(url),
      'https://api.allorigins.win/raw?url='+encodeURIComponent(url),
    ];
    let updated=false;
    for(const p of proxies){
      try{
        const r=await fetch(p,{cache:'no-store',signal:AbortSignal.timeout(8000)});
        if(!r.ok)continue;
        const d=await r.json();
        // d.rates gives MYR-per-X, so 1 USD = d.rates.USD MYR
        const rates=d.rates||{};
        ccys.forEach(function(ccy){
          if(rates[ccy]&&rates[ccy]>0){
            // rates[ccy] = how many of that ccy per 1 MYR
            // So 1 ccy = 1/rates[ccy] MYR
            _fx[ccy]=Math.round((1/rates[ccy])*10000)/10000;
            const el=document.getElementById('sfx-'+ccy);
            if(el)el.value=_fx[ccy].toFixed(4);
          }
        });
        updated=true;
        break;
      }catch(e2){continue;}
    }
    if(updated){
      if(S){S.fx=Object.assign({},_fx);save();}
      var ct=document.getElementById('ct');
      var scrollPos=ct?ct.scrollTop:0;
      render();
      if(ct)setTimeout(function(){ct.scrollTop=scrollPos;},50);
    }
  }catch(e){}
}

    if(tx.type==='Buy'&&tx.stock){if(!h[tx.stock])h[tx.stock]={qty:0,cost:0,ccy:tx.ccy,divs:0,realized:0,firstDate:tx.date};h[tx.stock].qty+=+tx.qty;h[tx.stock].cost+=(+tx.qty)*(+tx.price)+(+tx.fee||0);h[tx.stock].ccy=tx.ccy;}
    else if(tx.type==='Sell'&&tx.stock&&h[tx.stock]){const avg=h[tx.stock].qty>0?h[tx.stock].cost/h[tx.stock].qty:0;h[tx.stock].realized+=(+tx.qty)*(+tx.price)-(+tx.fee||0)-avg*(+tx.qty);h[tx.stock].cost-=avg*(+tx.qty);h[tx.stock].qty-=+tx.qty;}
    else if(tx.type==='Dividend'&&tx.stock){if(!h[tx.stock])h[tx.stock]={qty:0,cost:0,ccy:tx.ccy,divs:0,realized:0,firstDate:tx.date};h[tx.stock].divs+=tx.amount!=null?+tx.amount:0;}
  });
  // Build a global price lookup across ALL portfolios as fallback
  const globalPrices={};
  (S&&S.portfolios?S.portfolios:[]).forEach(function(pf0){
    if(pf0.prices)Object.entries(pf0.prices).forEach(function([stk,mp]){
      if(!globalPrices[stk])globalPrices[stk]=mp;
    });
  });
  return Object.entries(h).map(([stock,v])=>{
    const mp=p0.prices[stock]||globalPrices[stock];
    const mktP=mp?+mp.price:0,mktCcy=mp?mp.ccy:v.ccy,mktVal=v.qty*mktP,avg=v.qty>0?v.cost/v.qty:0,unreal=v.qty>0?mktVal-v.cost:0;
    return{stock,...v,avg,mktP,mktCcy,mktVal,unreal};
  }).filter(h=>ao?h.qty>0:(h.qty>0||h.divs!==0||h.realized!==0));
}
function getSummary(p0){

  p0.transactions.forEach(tx=>{
    if(tx.type==='Dividend')divs[tx.ccy]=(divs[tx.ccy]||0)+(+tx.amount||0);
    if(tx.type==='Platform Fee')platformFees[tx.ccy]=Math.round(((platformFees[tx.ccy]||0)+(+tx.amount||0))*100)/100;

  getHoldings(p0,false).filter(h=>h.qty<=0&&h.realized!==0).forEach(h=>{realized[h.ccy]=Math.round(((realized[h.ccy]||0)+Math.round(h.realized*100)/100)*100)/100;});

function journeyData(p0){
  const txs=[...p0.transactions].sort((a,b)=>a.date.localeCompare(b.date));
  if(!txs.length)return{};
  const firstYr=parseInt(txs[0].date.slice(0,4)),curYr=new Date().getFullYear();
  const ccys=[...new Set(txs.filter(t=>t.type==='Buy').map(t=>t.ccy))];
  const result={};
  ccys.forEach(ccy=>{
    result[ccy]=[];
    // Replay ALL transactions in chronological order per ccy to get correct avg cost
    const hh={};
    const realByYr={};
    txs.filter(t=>t.ccy===ccy&&t.stock).forEach(t=>{
      const yr=t.date.slice(0,4);
      if(t.type==='Buy'){
        if(!hh[t.stock])hh[t.stock]={qty:0,cost:0};
        hh[t.stock].qty+=+t.qty;
        hh[t.stock].cost+=(+t.qty)*(+t.price)+(+t.fee||0);
      } else if(t.type==='Sell'){
        const hs=hh[t.stock]||{qty:0,cost:0};
        const avg=hs.qty>0?hs.cost/hs.qty:0;
        const pnl=(+t.qty)*(+t.price)-(+t.fee||0)-avg*(+t.qty);
        realByYr[yr]=Math.round(((realByYr[yr]||0)+pnl)*100)/100;
        // Reduce holding after sell
        if(hh[t.stock]){hh[t.stock].cost-=avg*(+t.qty);hh[t.stock].qty-=+t.qty;}
      }
    });
    const divByYr={};
    txs.filter(t=>t.ccy===ccy&&t.type==='Dividend').forEach(t=>{
      const yr=t.date.slice(0,4);
      divByYr[yr]=(divByYr[yr]||0)+(t.amount!=null?+t.amount:0);
    });
    const pfByYr={};
    txs.filter(t=>t.ccy===ccy&&t.type==='Platform Fee').forEach(t=>{
      const yr=t.date.slice(0,4);
      pfByYr[yr]=Math.round(((pfByYr[yr]||0)+(+t.amount||0))*100)/100;
    });
    for(let yr=firstYr;yr<=curYr;yr++){
      const divYr=divByYr[String(yr)]||0;
      const realYr=realByYr[String(yr)]||0;
      const pfYr=pfByYr[String(yr)]||0;
      if(divYr>0||realYr!==0||pfYr!==0)result[ccy].push({yr,divYr,realYr,pfYr});
    }
  });
  return result;
}

function drawDashboardCharts(){
  const ct=document.getElementById('ct');
  if(!ct)return;
  if(window._dashRAF){cancelAnimationFrame(window._dashRAF);window._dashRAF=null;}

  // ── Donut arc draw-in (the circle) ──
  setTimeout(()=>{
    ct.querySelectorAll('.dash-arc-animate').forEach(c=>{
      const t=c.getAttribute('data-target-da');
      if(t){c.style.transition='stroke-dasharray 1s cubic-bezier(.4,0,.2,1)';c.setAttribute('stroke-dasharray',t);}
    });
  },300);

  // ── Allocation bar fill (the portfolio line bar) ──
  setTimeout(()=>{
    ct.querySelectorAll('.dash-bar').forEach(el=>{
      const t=parseFloat(el.dataset.w)||0;
      let c=0;
      (function f(){c+=(t-c)*.18;el.style.width=c.toFixed(2)+'%';if(Math.abs(c-t)>.05)requestAnimationFrame(f);else el.style.width=t+'%';})();
    });
  },250);

  // ── Net worth counter roll-up ──
  const nwEl=ct.querySelector('.dash-nw');
  if(nwEl){
    const target=parseFloat(nwEl.dataset.val)||0;
    let s=null;
    (function cu(ts){if(!s)s=ts;const p=Math.min((ts-s)/1200,1);const e=1-Math.pow(1-p,4);
    nwEl.textContent='RM '+(e*target).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
    if(p<1)requestAnimationFrame(cu);})(performance.now());
  }
}

function initOrbEffects(){
  const scene=document.getElementById('orb-scene');
  if(!scene)return;
  const orbEls=[...scene.querySelectorAll('.orb-float-0 > div,.orb-float-1 > div,.orb-float-2 > div')];
  if(!orbEls.length)return;
  const colorStr=scene.getAttribute('data-orb-colors')||'#e8a800,#00d864,#8888e0';
  const orbColors=colorStr.split(',');

  let canvas=document.getElementById('orb-canvas');
  if(!canvas){
    canvas=document.createElement('canvas');
    canvas.id='orb-canvas';
    canvas.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;';
    scene.appendChild(canvas);
  }
  scene.style.overflow='hidden';
  const dpr=window.devicePixelRatio||1;
  function resize(){
    const r=scene.getBoundingClientRect();
    canvas.width=r.width*dpr;canvas.height=r.height*dpr;
    canvas.style.width=r.width+'px';canvas.style.height=r.height+'px';
  }
  resize();
  const ctx=canvas.getContext('2d');

  function hex2rgb(hex){
    return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)];
  }
  function orbInfo(el,i){
    const sr=scene.getBoundingClientRect(),er=el.getBoundingClientRect();
    const col=orbColors[i%orbColors.length]||'#e8a800';
    return{x:(er.left+er.width/2-sr.left)*dpr,y:(er.top+er.height/2-sr.top)*dpr,r:er.width/2*dpr,col,rgb:hex2rgb(col)};
  }

  const LAYERS=[
    {n:12,rMin:0.60,rMax:0.82,sMin:0.25,sMax:0.55,szMin:1.0,szMax:2.0,opMin:0.08,opMax:0.28},
    {n:10,rMin:0.72,rMax:0.94,sMin:0.5,sMax:1.1,szMin:0.8,szMax:1.5,opMin:0.10,opMax:0.36},
    {n:5, rMin:0.88,rMax:0.99,sMin:1.2,sMax:2.2,szMin:0.5,szMax:1.0,opMin:0.15,opMax:0.50},
  ];

  let orbs=[],particles=[];
  function initParticles(){
    orbs=orbEls.map(orbInfo);
    particles=[];
    orbs.forEach(function(o,oi){
      LAYERS.forEach(function(lay){
        for(let i=0;i<lay.n;i++){
          const spd=(lay.sMin+Math.random()*(lay.sMax-lay.sMin))*(Math.random()<0.5?1:-1);
          particles.push({oi,angle:Math.random()*Math.PI*2,speed:spd,
            dist:o.r*(lay.rMin+Math.random()*(lay.rMax-lay.rMin)),
            size:(lay.szMin+Math.random()*(lay.szMax-lay.szMin))*dpr,
            opacity:lay.opMin+Math.random()*(lay.opMax-lay.opMin),
            phase:Math.random()*Math.PI*2,pulseSpeed:0.4+Math.random()*1.2});
        }
      });
    });
  }
  initParticles();

  // Equator shimmer angle per orb
  let shimmerAngles=orbs.map(function(_,i){return i*Math.PI*0.6;});

  let last=performance.now();
  let lastFrame=0;
  const TARGET_FPS=30;
  const FRAME_MS=1000/TARGET_FPS;

  function step(now){
    window._orbRaf=requestAnimationFrame(step);
    // Throttle to 30fps
    if(now-lastFrame<FRAME_MS)return;
    const dt=Math.min(now-last,66);last=now;lastFrame=now;
    const t=now*0.001;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    orbs.forEach(function(o,oi){
      const [r,g,b]=o.rgb;

      // Inner breathing glow
      const breath=Math.sin(t*0.7+oi*1.4)*0.5+0.5;
      ctx.save();
      ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.clip();
      const gGrad=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r*0.8);
      gGrad.addColorStop(0,'rgba('+r+','+g+','+b+','+(0.06+breath*0.12).toFixed(2)+')');
      gGrad.addColorStop(1,'transparent');
      ctx.fillStyle=gGrad;ctx.fillRect(o.x-o.r,o.y-o.r,o.r*2,o.r*2);
      ctx.restore();

      // Outer ambient halo
      const hPulse=Math.sin(t*0.4+oi*2.0)*0.4+0.6;
      const hGrad=ctx.createRadialGradient(o.x,o.y,o.r*0.8,o.x,o.y,o.r*1.5);
      hGrad.addColorStop(0,'rgba('+r+','+g+','+b+',0)');
      hGrad.addColorStop(0.5,'rgba('+r+','+g+','+b+','+(0.06*hPulse).toFixed(2)+')');
      hGrad.addColorStop(1,'transparent');
      ctx.fillStyle=hGrad;
      ctx.beginPath();ctx.arc(o.x,o.y,o.r*1.5,0,Math.PI*2);ctx.fill();

      // Rotating equator shimmer
      shimmerAngles[oi]+=dt*0.0006*(oi%2===0?1:-1);
      const sa=shimmerAngles[oi];
      const arcLen=Math.PI*0.55;
      ctx.save();
      ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.clip();
      ctx.beginPath();ctx.arc(o.x,o.y,o.r*0.97,sa,sa+arcLen);
      const mid=sa+arcLen*0.5;
      const shimGrad=ctx.createLinearGradient(
        o.x+Math.cos(sa)*o.r*0.97, o.y+Math.sin(sa)*o.r*0.97,
        o.x+Math.cos(mid)*o.r*0.97, o.y+Math.sin(mid)*o.r*0.97
      );
      shimGrad.addColorStop(0,'rgba('+r+','+g+','+b+',0)');
      shimGrad.addColorStop(0.5,'rgba(255,255,255,0.32)');
      shimGrad.addColorStop(1,'rgba('+r+','+g+','+b+',0)');
      ctx.strokeStyle=shimGrad;
      ctx.lineWidth=1.4*dpr;ctx.stroke();
      ctx.restore();
    });

    // Orbiting particles
    particles.forEach(function(p){
      const o=orbs[p.oi];const [r,g,b]=o.rgb;
      p.angle+=p.speed*dt*0.001;
      const pulse=Math.sin(t*p.pulseSpeed+p.phase)*0.4+0.6;
      const x=o.x+Math.cos(p.angle)*p.dist;
      const y=o.y+Math.sin(p.angle)*p.dist;
      ctx.beginPath();ctx.arc(x,y,p.size,0,Math.PI*2);
      ctx.fillStyle='rgba('+r+','+g+','+b+','+(p.opacity*pulse).toFixed(2)+')';
      ctx.fill();
    });
  }

  if(window._orbRaf)cancelAnimationFrame(window._orbRaf);
  last=performance.now();lastFrame=0;
  window._orbRaf=requestAnimationFrame(step);
}

// ── Pull-to-Refresh ──────────────────────────────────────────────────────────
(function(){
  var startY=0, pulling=false, threshold=70, ind, spinner, txt;
  function getInd(){ind=document.getElementById('ptr-indicator');spinner=document.getElementById('ptr-spinner');txt=document.getElementById('ptr-text');}
  document.addEventListener('touchstart',function(e){
    // Only trigger if scrolled to very top
    var ct=document.getElementById('ct');
    var scrollTop=(ct&&ct.scrollTop)||window.scrollY||0;
    if(scrollTop<=2){startY=e.touches[0].clientY;pulling=true;}
    else{pulling=false;}
  },{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!pulling)return;
    var dy=e.touches[0].clientY-startY;
    if(dy<0){pulling=false;return;}
    getInd();
    if(dy>20&&ind){
      ind.classList.add('visible');
      if(dy>threshold){
        if(txt)txt.textContent='Release to refresh prices';
        if(spinner)spinner.classList.add('spin');
      } else {
        if(txt)txt.textContent='Pull down to refresh prices';
        if(spinner)spinner.classList.remove('spin');
      }
    }
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!pulling)return;
    pulling=false;
    var dy=e.changedTouches[0].clientY-startY;
    getInd();
    if(dy>threshold){
      if(txt)txt.textContent='Updating prices…';
      if(spinner)spinner.classList.add('spin');
      fetchLivePrices(true).then(function(){
        if(txt)txt.textContent='✓ Updated';
        if(spinner)spinner.classList.remove('spin');
        setTimeout(function(){if(ind)ind.classList.remove('visible');},1000);
      }).catch(function(){
        if(txt)txt.textContent='Failed — try again';
        if(spinner)spinner.classList.remove('spin');
        setTimeout(function(){if(ind)ind.classList.remove('visible');},1200);
      });
    } else {
      if(ind)ind.classList.remove('visible');
      if(spinner)spinner.classList.remove('spin');
    }
  },{passive:true});
})();

const LIVE_TICKERS = {
  // USD stocks
  'AMD':'AMD','CRM':'CRM','DRAM ETF':'DRAM','IBIT':'IBIT',
  'MSFT':'MSFT','NASA ETF':'ARKX','NOW':'NOW','NVDA':'NVDA',

};
const TICKER_CCY = {
  'AMD':'USD','CRM':'USD','DRAM ETF':'USD','IBIT':'USD','MSFT':'USD',
  'NASA ETF':'USD','NOW':'USD','NVDA':'USD','ORCL':'USD','Ondas':'USD',
  'Opendoor':'USD','PLTR':'USD','TSLA':'USD',
  'CapLand Ascendas':'SGD','MapleTree':'SGD','TopGlove SG':'SGD',

let _lastPriceFetch = 0;
let _priceUpdateStatus = 'idle'; // idle | fetching | done | error

async function fetchLivePrices(forceRefresh) {
  const now = Date.now();
  if (!forceRefresh && now - _lastPriceFetch < 30 * 1000) return;
  _lastPriceFetch = now; // claim slot immediately to prevent double-fetch
  _lastPriceFetch = now;
  _priceUpdateStatus = 'fetching';
  updatePriceStatusBar();

  const stocks = Object.keys(LIVE_TICKERS);
  let updated = 0, failed = [];
  const debugLog = [];

  await Promise.all(stocks.map(async function(name) {
    const ticker = LIVE_TICKERS[name];
    const ccy = TICKER_CCY[name];
    try {
      const ts2 = Date.now();
      // Use Yahoo Finance v8 chart endpoint - more reliable through proxies
      const url = 'https://query1.finance.yahoo.com/v8/finance/chart/' + ticker + '?interval=1d&range=5d&_=' + ts2;
      const proxies = [
        'https://corsproxy.io/?' + encodeURIComponent(url),
        'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
        'https://thingproxy.freeboard.io/fetch/' + url,
      ];
      let price = null;
      let lastErr = '';
      for (const p of proxies) {
        try {
          const r = await fetch(p, {signal: AbortSignal.timeout(8000), cache:'no-store'});
          if (!r.ok){lastErr='HTTP'+r.status;continue;}
          const txt = await r.text();
          const d = JSON.parse(txt);
          const meta = d.chart && d.chart.result && d.chart.result[0] && d.chart.result[0].meta;
          if (meta && meta.regularMarketPrice > 0) {
            price = meta.regularMarketPrice;
            debugLog.push(name+'='+price+'✓');
            break;
          }
          lastErr='no price in response';
        } catch(e2){lastErr=String(e2).slice(0,40);continue;}
      }
      if (!price || price <= 0) throw new Error(lastErr||'no price');
      // Update price in ALL portfolios that have this stock
      S.portfolios.forEach(function(p) {
        const holdings = getHoldings(p, true);
        if (holdings.find(function(h) { return h.stock === name; })) {
          if (!p.prices) p.prices = {};
          p.prices[name] = {price: price, ccy: ccy};
        }
      });
      updated++;
    } catch(e) {
      failed.push(name);
    }
  }));

  if (updated > 0) {
    save();
    // Force re-render current view without resetting scroll
    var ct = document.getElementById('ct');
    var scrollPos = ct ? ct.scrollTop : 0;
    render();
    if (ct) setTimeout(function(){ ct.scrollTop = scrollPos; }, 50);
  }
  _priceUpdateStatus = failed.length === 0 ? 'done' : (updated > 0 ? 'partial' : 'error');
  _lastPriceFetch = Date.now();
  _lastDebugLog = debugLog.join(' | ') + (failed.length ? ' | FAIL:'+failed.join(',') : '');
  updatePriceStatusBar();
  setTimeout(function() { fetchLivePrices(true); }, 30 * 1000);
}
let _lastDebugLog = '';
function showPriceDebug(){alert(_lastDebugLog||'No debug log yet');}

function updatePriceStatusBar() {
  const bar = document.getElementById('price-status-bar');
  if (!bar) return;
  const t = new Date(_lastPriceFetch);
  const ts = _lastPriceFetch ? t.toLocaleTimeString('en', {hour:'2-digit', minute:'2-digit'}) : '';
  if (_priceUpdateStatus === 'fetching') {
    bar.innerHTML = '<span style="color:rgba(0,200,255,0.6);animation:spin 1s linear infinite;display:inline-block">↻</span> Fetching live prices…';
  } else if (_priceUpdateStatus === 'done') {
    bar.innerHTML = '✓ Prices updated · ' + ts + ' <span onclick="showPriceDebug()" style="cursor:pointer;color:rgba(0,200,255,0.3)">·detail</span> <span onclick="fetchLivePrices(true)" style="cursor:pointer;color:rgba(0,200,255,0.5)">↻</span>';
  } else if (_priceUpdateStatus === 'partial') {
    bar.innerHTML = '⚠ Partial · ' + ts + ' <span onclick="showPriceDebug()" style="cursor:pointer;color:rgba(255,200,0,0.5)">·detail</span> <span onclick="fetchLivePrices(true)" style="cursor:pointer;color:rgba(0,200,255,0.5)">↻ retry</span>';
  } else if (_priceUpdateStatus === 'error') {
    bar.innerHTML = '✕ Failed <span onclick="showPriceDebug()" style="cursor:pointer;color:rgba(255,100,100,0.5)">·detail</span> <span onclick="fetchLivePrices(true)" style="cursor:pointer;color:rgba(0,200,255,0.5)">↻ retry</span>';
  }
}


// ── Historical Price Cache ────────────────────────────────────────────────────
window._histCache = {}; // ticker -> [{date, close}]

async function fetchHistorical(ticker, fromDate) {
  if (window._histCache[ticker]) return window._histCache[ticker];
  const from = Math.floor(new Date(fromDate).getTime()/1000);
  const to   = Math.floor(Date.now()/1000);
  const url  = 'https://query1.finance.yahoo.com/v8/finance/chart/'+ticker+'?interval=1wk&period1='+from+'&period2='+to;
  const proxies = [
    'https://corsproxy.io/?'+encodeURIComponent(url),
    'https://api.allorigins.win/raw?url='+encodeURIComponent(url),
  ];
  for (var i=0;i<proxies.length;i++) {
    try {
      var r = await fetch(proxies[i],{cache:'no-store',signal:AbortSignal.timeout(10000)});
      if (!r.ok) continue;
      var d = await r.json();
      var res = d.chart&&d.chart.result&&d.chart.result[0];
      if (!res) continue;
      var times = res.timestamp||[];
      var closes = (res.indicators&&res.indicators.quote&&res.indicators.quote[0]&&res.indicators.quote[0].close)||[];
      var pts = [];
      for (var j=0;j<times.length;j++) {
        if (closes[j]!=null) pts.push({date:new Date(times[j]*1000).toISOString().slice(0,10), close:closes[j]});
      }
      if (pts.length) { window._histCache[ticker]=pts; return pts; }
    } catch(e2) { continue; }
  }
  return [];
}

// ── Portfolio Value History ────────────────────────────────────────────────────
async function buildPortfolioHistory(pf0) {
  // Get all stocks with tickers
  var holdings = getHoldings(pf0, false);
  var stocks = holdings.filter(function(h){ return LIVE_TICKERS[h.stock]; });
  if (!stocks.length) return [];

  // Get earliest tx date
  var allTxDates = pf0.transactions.map(function(t){return t.date;}).sort();
  var fromDate = allTxDates[0] || '2020-01-01';

  // Fetch historical for all stocks in parallel
  var histMap = {};
  await Promise.all(stocks.map(async function(h){
    var pts = await fetchHistorical(LIVE_TICKERS[h.stock], fromDate);
    histMap[h.stock] = pts;
  }));

  // Get all weekly dates across all stocks
  var dateSet = {};
  Object.values(histMap).forEach(function(pts){ pts.forEach(function(p){ dateSet[p.date]=1; }); });
  var dates = Object.keys(dateSet).sort();

  // For each date, calculate portfolio value
  var txSorted = pf0.transactions.filter(function(t){return ['Buy','Sell'].includes(t.type);}).sort(function(a,b){return a.date.localeCompare(b.date);});

  var results = [];
  dates.forEach(function(date){
    // Calculate holdings qty on this date
    var qtys = {};
    txSorted.forEach(function(tx){
      if (tx.date > date) return;
      if (!qtys[tx.stock]) qtys[tx.stock] = 0;
      if (tx.type==='Buy') qtys[tx.stock] += +tx.qty;
      else if (tx.type==='Sell') qtys[tx.stock] -= +tx.qty;
    });

    // Calculate value in MYR
    var totalMYR = 0;
    Object.keys(qtys).forEach(function(stock){
      var qty = qtys[stock];
      if (qty <= 0) return;
      var hist = histMap[stock];
      if (!hist||!hist.length) return;
      // Find closest price on or before this date
      var price = null;
      for (var i=hist.length-1;i>=0;i--) {
        if (hist[i].date <= date) { price=hist[i].close; break; }
      }
      if (!price) return;
      var ccy = TICKER_CCY[stock]||'MYR';
      totalMYR += price * qty * (_fx[ccy]||1);
    });

    if (totalMYR > 0) results.push({date:date, value:Math.round(totalMYR)});
  });
  return results;
}

// ── Stock Price History ────────────────────────────────────────────────────────
async function buildStockHistory(stock, ccy) {
  var ticker = LIVE_TICKERS[stock];
  if (!ticker) return [];
  // Get earliest buy date for this stock
  var earliest = '2020-01-01';
  S.portfolios.forEach(function(pf0){
    pf0.transactions.filter(function(t){return t.stock===stock&&t.type==='Buy';}).forEach(function(t){
      if (t.date < earliest) earliest = t.date;
    });
  });
  return await fetchHistorical(ticker, earliest);
}

// ── Draw Chart on Canvas ──────────────────────────────────────────────────────
function drawLineChart(canvasId, pts, color, labelPrefix) {
  var canvas = document.getElementById(canvasId);
  if (!canvas||!pts||!pts.length) return;
  var ctx2 = canvas.getContext('2d');
  var W2 = canvas.width, H2 = canvas.height;
  var pad = {t:10,r:10,b:24,l:50};
  var cw = W2-pad.l-pad.r, ch = H2-pad.t-pad.b;

  ctx2.clearRect(0,0,W2,H2);

  var vals = pts.map(function(p){return p.value||p.close;});
  var minV = Math.min.apply(null,vals), maxV = Math.max.apply(null,vals);
  if (minV===maxV) { minV*=0.95; maxV*=1.05; }
  var range = maxV-minV;

  function toX(i){ return pad.l + (i/(pts.length-1))*cw; }
  function toY(v){ return pad.t + ch - ((v-minV)/range)*ch; }

  // Gradient fill
  var grad = ctx2.createLinearGradient(0,pad.t,0,pad.t+ch);
  grad.addColorStop(0, color+'44');
  grad.addColorStop(1, color+'00');
  ctx2.beginPath();
  pts.forEach(function(p,i){ i===0?ctx2.moveTo(toX(i),toY(vals[i])):ctx2.lineTo(toX(i),toY(vals[i])); });
  ctx2.lineTo(toX(pts.length-1),pad.t+ch);
  ctx2.lineTo(toX(0),pad.t+ch);
  ctx2.closePath();
  ctx2.fillStyle=grad;
  ctx2.fill();

  // Line
  ctx2.beginPath();
  pts.forEach(function(p,i){ i===0?ctx2.moveTo(toX(i),toY(vals[i])):ctx2.lineTo(toX(i),toY(vals[i])); });
  ctx2.strokeStyle=color;
  ctx2.lineWidth=1.5;
  ctx2.stroke();

  // Y axis labels
  ctx2.fillStyle='rgba(255,255,255,0.25)';
  ctx2.font='9px system-ui';
  ctx2.textAlign='right';
  [minV, (minV+maxV)/2, maxV].forEach(function(v){
    var y=toY(v);
    var lbl = (labelPrefix||'')+(v>=1000000?(v/1000000).toFixed(1)+'M':v>=1000?(v/1000).toFixed(0)+'k':v.toFixed(2));
    ctx2.fillText(lbl, pad.l-4, y+3);
  });

  // X axis labels (first, mid, last)
  ctx2.textAlign='center';
  [[0,pts[0]],[Math.floor(pts.length/2),pts[Math.floor(pts.length/2)]]].forEach(function(pair){
    var i=pair[0],p=pair[1];
    if(!p)return;
    ctx2.fillText(p.date.slice(0,7), toX(i), H2-6);
  });
  ctx2.fillText(pts[pts.length-1].date.slice(0,7), toX(pts.length-1), H2-6);

  // End dot
  var lastX=toX(pts.length-1), lastY=toY(vals[vals.length-1]);
  ctx2.beginPath();
  ctx2.arc(lastX,lastY,3,0,Math.PI*2);
  ctx2.fillStyle=color;
  ctx2.fill();
}

// ── roundRect polyfill for older Safari ──────────────────────────────────────
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);
    this.arcTo(x+w,y,x+w,y+r,r);this.lineTo(x+w,y+h-r);
    this.arcTo(x+w,y+h,x+w-r,y+h,r);this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);
    this.arcTo(x,y,x+r,y,r);this.closePath();
  };
}

// ── Chart Engine with Tabs + Pan/Zoom ────────────────────────────────────────
var CHART_RANGES=[
  {key:'1D',label:'1D',days:1},
  {key:'1M',label:'1M',days:30},
  {key:'6M',label:'6M',days:180},
  {key:'1Y',label:'1Y',days:365},
  {key:'ALL',label:'All',days:9999},
];
window._chartState={};

function filterByRange(pts,rangeKey){
  if(rangeKey==='ALL')return pts;
  var days=(CHART_RANGES.find(function(r){return r.key===rangeKey;})||{days:9999}).days;
  var cutoff=new Date(Date.now()-days*24*60*60*1000).toISOString().slice(0,10);
  var f=pts.filter(function(p){return(p.date||'')>=cutoff;});
  return f.length?f:pts;
}

function initChartWidget(containerId,allPts,color,labelPrefix,canvasH){
  var el=document.getElementById(containerId);if(!el)return;
  if(!window._chartState[containerId])window._chartState[containerId]={range:'ALL',offsetPct:0,scalePct:1};
  var st=window._chartState[containerId];
  st.allPts=allPts;st.color=color||'#d4a847';st.labelPrefix=labelPrefix||'';st.canvasH=canvasH||130;

  var tabsHtml='<div id="'+containerId+'-tabs" style="display:flex;gap:3px;margin-bottom:8px">'
    +CHART_RANGES.map(function(r){
      var a=st.range===r.key;
      return '<div data-range="'+r.key+'" style="flex:1;text-align:center;font-size:11px;font-weight:'+(a?'700':'400')+';padding:6px 0;border-radius:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;color:'+(a?'#fff':'rgba(255,255,255,0.28)')+';background:'+(a?'rgba(255,255,255,0.1)':'transparent')+';border:1px solid '+(a?'rgba(255,255,255,0.18)':'transparent')+'">'+r.label+'</div>';
    }).join('')+'</div>';

  el.innerHTML=tabsHtml
    +'<div id="'+containerId+'-wrap" style="position:relative;overflow:hidden;border-radius:8px;background:rgba(255,255,255,0.02)">'
    +'<canvas id="'+containerId+'-cv" style="display:block;width:100%;height:'+st.canvasH+'px"></canvas>'
    +'<div id="'+containerId+'-tip" style="display:none;position:absolute;top:6px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:4px 10px;font-size:10px;color:#fff;white-space:nowrap;pointer-events:none"></div>'
    +'</div>'
    +'<div style="text-align:center;font-size:8px;color:rgba(255,255,255,0.1);margin-top:3px;letter-spacing:1px">Drag to pan · Pinch to zoom</div>';

  requestAnimationFrame(function(){
    var cv=document.getElementById(containerId+'-cv');
    if(!cv)return;
    cv.width=cv.offsetWidth||300;cv.height=st.canvasH;

    attachChartEvents(containerId);
  });

  // Tab clicks via delegation
  var tabsEl=document.getElementById(containerId+'-tabs');
  if(tabsEl){
    tabsEl.addEventListener('click',function(e){
      var t=e.target.closest('[data-range]');
      if(!t)return;
      var rk=t.getAttribute('data-range');
      var s2=window._chartState[containerId];if(!s2)return;
      s2.range=rk;s2.offsetPct=0;s2.scalePct=1;
      tabsEl.querySelectorAll('[data-range]').forEach(function(d){
        var a=d.getAttribute('data-range')===rk;
        d.style.fontWeight=a?'700':'400';
        d.style.color=a?'#fff':'rgba(255,255,255,0.28)';
        d.style.background=a?'rgba(255,255,255,0.1)':'transparent';
        d.style.border='1px solid '+(a?'rgba(255,255,255,0.18)':'transparent');
      });
      redrawChart(containerId);
    });

}

function redrawChart(containerId){
  var st=window._chartState[containerId];if(!st||!st.allPts)return;
  var cv=document.getElementById(containerId+'-cv');if(!cv)return;
  var allF=filterByRange(st.allPts,st.range);if(!allF.length)return;

  var total=allF.length;
  var scale=Math.max(1,st.scalePct||1);
  var visible=Math.max(2,Math.round(total/scale));
  var maxOff=Math.max(0,total-visible);
  var off=Math.round((st.offsetPct||0)*maxOff);
  off=Math.max(0,Math.min(maxOff,off));
  var pts=allF.slice(off,off+visible);

  var ctx2=cv.getContext('2d');
  var W2=cv.width,H2=cv.height;
  var pad={t:16,r:12,b:28,l:58};
  var cw=W2-pad.l-pad.r,ch=H2-pad.t-pad.b;
  ctx2.clearRect(0,0,W2,H2);

  var vals=pts.map(function(p){return p.value||p.close||0;});
  var minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);
  if(minV===maxV){minV*=0.97;maxV*=1.03;}
  var rng=maxV-minV;

  function toX(i){return pad.l+(pts.length<2?cw/2:(i/(pts.length-1))*cw);}
  function toY(v){return pad.t+ch-((v-minV)/rng)*ch;}

  // Grid
  ctx2.strokeStyle='rgba(255,255,255,0.04)';ctx2.lineWidth=1;
  [0,0.25,0.5,0.75,1].forEach(function(f){
    var y=pad.t+ch*f;
    ctx2.beginPath();ctx2.moveTo(pad.l,y);ctx2.lineTo(pad.l+cw,y);ctx2.stroke();
  });

  // Fill
  var grad=ctx2.createLinearGradient(0,pad.t,0,pad.t+ch);
  grad.addColorStop(0,st.color+'55');grad.addColorStop(0.7,st.color+'11');grad.addColorStop(1,st.color+'00');
  ctx2.beginPath();
  pts.forEach(function(p,i){i===0?ctx2.moveTo(toX(i),toY(vals[i])):ctx2.lineTo(toX(i),toY(vals[i]));});
  ctx2.lineTo(toX(pts.length-1),H2-pad.b);ctx2.lineTo(toX(0),H2-pad.b);ctx2.closePath();
  ctx2.fillStyle=grad;ctx2.fill();

  // Line
  ctx2.beginPath();
  pts.forEach(function(p,i){i===0?ctx2.moveTo(toX(i),toY(vals[i])):ctx2.lineTo(toX(i),toY(vals[i]));});
  ctx2.strokeStyle=st.color;ctx2.lineWidth=1.8;ctx2.lineJoin='round';ctx2.stroke();

  // End dot
  var lx=toX(pts.length-1),ly=toY(vals[vals.length-1]);
  ctx2.beginPath();ctx2.arc(lx,ly,4,0,Math.PI*2);ctx2.fillStyle='#000';ctx2.fill();
  ctx2.beginPath();ctx2.arc(lx,ly,3,0,Math.PI*2);ctx2.fillStyle=st.color;ctx2.fill();
  ctx2.beginPath();ctx2.arc(lx,ly,5,0,Math.PI*2);ctx2.strokeStyle=st.color+'66';ctx2.lineWidth=2;ctx2.stroke();

  // Y labels
  ctx2.fillStyle='rgba(255,255,255,0.3)';ctx2.font='9px system-ui';ctx2.textAlign='right';
  [minV,(minV+maxV)/2,maxV].forEach(function(v){
    var lbl=(st.labelPrefix||'')+(v>=1000000?(v/1000000).toFixed(1)+'M':v>=1000?(v/1000).toFixed(0)+'k':v.toFixed(2));
    ctx2.fillText(lbl,pad.l-4,toY(v)+3);
  });

  // X labels
  ctx2.textAlign='center';ctx2.fillStyle='rgba(255,255,255,0.25)';
  [[0,pts[0]],[Math.floor(pts.length/2),pts[Math.floor(pts.length/2)]],[pts.length-1,pts[pts.length-1]]].forEach(function(pair){
    if(!pair[1])return;
    ctx2.fillText(pair[1].date.slice(0,7),toX(pair[0]),H2-8);
  });

  // % change
  if(vals.length>1){
    var chg=(vals[vals.length-1]-vals[0])/vals[0]*100;
    ctx2.font='bold 10px system-ui';ctx2.textAlign='left';
    ctx2.fillStyle=chg>=0?'#00e676':'#ff5566';
    ctx2.fillText((chg>=0?'+':'')+chg.toFixed(2)+'%',pad.l+4,pad.t+12);
  }
}

function attachChartEvents(containerId){
  var wrap=document.getElementById(containerId+'-wrap');
  var cv=document.getElementById(containerId+'-cv');
  var tip=document.getElementById(containerId+'-tip');
  if(!wrap||!cv)return;
  var st=window._chartState[containerId];
  var dragStartX=0,dragStartOffset=0,pinchStartDist=0,pinchStartScale=1;
  var touchMode='none'; // 'pan' | 'crosshair' | 'pinch'
  var longPressTimer=null;
  var crosshairActive=false;

  function getVisiblePts(){
    var allF=filterByRange(st.allPts,st.range);
    var scale=Math.max(1,st.scalePct||1);
    var visible=Math.max(2,Math.round(allF.length/scale));
    var maxOff=Math.max(0,allF.length-visible);
    var off=Math.round((st.offsetPct||0)*maxOff);
    return allF.slice(Math.max(0,off),Math.min(allF.length,off+visible));
  }

  function drawCrosshair(touchX){
    var rect=wrap.getBoundingClientRect();
    var pts=getVisiblePts();
    if(!pts.length)return;
    var pad={t:16,r:12,b:28,l:58};
    var W2=cv.width,H2=cv.height;
    var cw=W2-pad.l-pad.r,ch=H2-pad.t-pad.b;
    // Map touch X to canvas X
    var relX=(touchX-rect.left)/rect.width*W2;
    var frac=Math.max(0,Math.min(1,(relX-pad.l)/cw));
    var idx=Math.round(frac*(pts.length-1));
    idx=Math.max(0,Math.min(pts.length-1,idx));
    var p=pts[idx];
    if(!p)return;
    var val=p.value||p.close||0;
    var vals=pts.map(function(q){return q.value||q.close||0;});
    var minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);
    if(minV===maxV){minV*=0.97;maxV*=1.03;}
    var xPos=pad.l+(pts.length<2?cw/2:(idx/(pts.length-1))*cw);
    var yPos=pad.t+ch-((val-minV)/(maxV-minV))*ch;

    // Redraw base chart then overlay crosshair
    redrawChart(containerId);
    var ctx2=cv.getContext('2d');

    // Vertical line
    ctx2.save();
    ctx2.setLineDash([4,4]);
    ctx2.strokeStyle='rgba(255,255,255,0.5)';
    ctx2.lineWidth=1;
    ctx2.beginPath();ctx2.moveTo(xPos,pad.t);ctx2.lineTo(xPos,H2-pad.b);ctx2.stroke();
    // Horizontal line
    ctx2.beginPath();ctx2.moveTo(pad.l,yPos);ctx2.lineTo(W2-pad.r,yPos);ctx2.stroke();
    ctx2.setLineDash([]);
    ctx2.restore();

    // Dot at intersection
    ctx2.beginPath();ctx2.arc(xPos,yPos,5,0,Math.PI*2);
    ctx2.fillStyle='#000';ctx2.fill();
    ctx2.beginPath();ctx2.arc(xPos,yPos,4,0,Math.PI*2);
    ctx2.fillStyle=st.color;ctx2.fill();
    ctx2.beginPath();ctx2.arc(xPos,yPos,7,0,Math.PI*2);
    ctx2.strokeStyle=st.color+'88';ctx2.lineWidth=2;ctx2.stroke();

    // Y axis price label
    var lblV=(st.labelPrefix||'')+(val>=1000000?(val/1000000).toFixed(2)+'M':val>=1000?(val/1000).toFixed(1)+'k':val.toFixed(3));
    var yLblH=16,yLblW=ctx2.measureText(lblV).width+12;
    ctx2.fillStyle=st.color;
    ctx2.beginPath();ctx2.roundRect(pad.l-yLblW-2,yPos-yLblH/2,yLblW,yLblH,3);ctx2.fill();
    ctx2.fillStyle='#000';ctx2.font='bold 9px system-ui';ctx2.textAlign='left';
    ctx2.fillText(lblV,pad.l-yLblW+2,yPos+3.5);

    // X axis date label
    var dateLbl=p.date;
    var xLblW=ctx2.measureText(dateLbl).width+12,xLblH=16;
    var xLblX=Math.max(pad.l,Math.min(W2-pad.r-xLblW,xPos-xLblW/2));
    ctx2.fillStyle=st.color;
    ctx2.beginPath();ctx2.roundRect(xLblX,H2-pad.b+1,xLblW,xLblH,3);ctx2.fill();
    ctx2.fillStyle='#000';ctx2.font='bold 9px system-ui';ctx2.textAlign='center';
    ctx2.fillText(dateLbl,xLblX+xLblW/2,H2-pad.b+11);

    // Tooltip box top-right
    if(tip){
      var chgPct=vals.length>1?((val-vals[0])/vals[0]*100):null;
      tip.innerHTML='<span style="color:rgba(255,255,255,0.5);font-size:9px">'+p.date+'</span><br>'
        +'<span style="font-size:13px;font-weight:700">'+lblV+'</span>'
        +(chgPct!==null?'<br><span style="color:'+(chgPct>=0?'#00e676':'#ff5566')+';font-size:10px">'+(chgPct>=0?'+':'')+chgPct.toFixed(2)+'%</span>':'');
      tip.style.display='block';
      tip.style.left='auto';tip.style.right='6px';tip.style.transform='none';
    }
  }

  wrap.addEventListener('touchstart',function(e){
    if(e.touches.length===1){
      dragStartX=e.touches[0].clientX;
      dragStartOffset=st.offsetPct||0;
      touchMode='pan';
      crosshairActive=false;
      // Long press = crosshair mode
      longPressTimer=setTimeout(function(){
        touchMode='crosshair';
        crosshairActive=true;
        // Haptic if available
        if(navigator.vibrate)navigator.vibrate(30);
        drawCrosshair(dragStartX);
      },350);
    } else if(e.touches.length===2){
      clearTimeout(longPressTimer);
      touchMode='pinch';crosshairActive=false;
      var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
      pinchStartDist=Math.sqrt(dx*dx+dy*dy);
      pinchStartScale=st.scalePct||1;
    }
    e.stopPropagation();
  },{passive:true});

  wrap.addEventListener('touchmove',function(e){
    e.stopPropagation();
    if(e.touches.length===1){
      var dx=Math.abs(e.touches[0].clientX-dragStartX);
      // Cancel long press if finger moves too much
      if(dx>8&&touchMode==='pan'){clearTimeout(longPressTimer);}
      if(touchMode==='crosshair'){
        drawCrosshair(e.touches[0].clientX);
      } else if(touchMode==='pan'){
        clearTimeout(longPressTimer);
        var dxPan=dragStartX-e.touches[0].clientX;
        var W2=cv.offsetWidth||300;
        var allF=filterByRange(st.allPts,st.range);
        var visible=Math.max(2,Math.round(allF.length/Math.max(1,st.scalePct||1)));
        var maxOff=Math.max(1,allF.length-visible);
        st.offsetPct=Math.max(0,Math.min(1,dragStartOffset+(dxPan/W2)));
        redrawChart(containerId);
      }
    } else if(e.touches.length===2&&touchMode==='pinch'){
      var dx2=e.touches[0].clientX-e.touches[1].clientX,dy2=e.touches[0].clientY-e.touches[1].clientY;
      var dist=Math.sqrt(dx2*dx2+dy2*dy2);
      st.scalePct=Math.max(1,Math.min(30,pinchStartScale*(dist/pinchStartDist)));
      redrawChart(containerId);
    }
  },{passive:true});

  wrap.addEventListener('touchend',function(e){
    clearTimeout(longPressTimer);
    if(crosshairActive){redrawChart(containerId);}
    crosshairActive=false;touchMode='none';
    if(tip)tip.style.display='none';
  },{passive:true});
}

function liveClock(){
  const el=document.getElementById('live-clock');
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const s=String(now.getSeconds()).padStart(2,'0');
  if(el)el.textContent=h+':'+m+':'+s;
  // Update equalizer date/time
  const eqDate=document.getElementById('eq-date');
  const eqTime=document.getElementById('eq-time');
  if(eqDate){
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    eqDate.textContent=now.getDate()+' '+months[now.getMonth()]+' '+now.getFullYear();
  }
  if(eqTime){
    let hr=now.getHours();
    const ampm=hr>=12?'PM':'AM';
    hr=hr%12||12;
    const min=String(now.getMinutes()).padStart(2,'0');
    const sec=String(now.getSeconds()).padStart(2,'0');
    eqTime.textContent=hr+':'+min+':'+sec+' '+ampm;
  }
}

  let assetRows='';

    </div>`;
  });

  const assetSummary=`<div style="margin:0;padding:0 0 8px">
    <div style="font-size:9px;font-weight:600;color:rgba(255,255,255,0.35);letter-spacing:2px;margin-bottom:10px;text-transform:uppercase;padding-top:14px;border-top:1px solid rgba(255,255,255,0.06)">Asset Summary</div>
    <div style="display:flex;justify-content:space-between;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:2px">
      <span style="font-size:9px;color:rgba(255,255,255,0.22);font-weight:600;letter-spacing:1px">ASSET</span>
      <span style="font-size:9px;color:rgba(255,255,255,0.22);font-weight:600;letter-spacing:1px">NET P&L <span style="font-weight:400;opacity:0.6">(excl. cash)</span></span>

  // ── ALL HOLDINGS TABLE ────────────────────────────────
  const allHoldings=[...holdings].sort((a,b)=>toMYR(b.mktVal,b.ccy)-toMYR(a.mktVal,a.ccy));
  const LOGO_COLORS=['#3b82f6','#22c55e','#a78bfa','#f59e0b','#f43f5e','#06b6d4','#8b5cf6','#ec4899'];

    holdingRows+=`<div onclick="drillStock('${h.stock.replace(/'/g,"\\'")}','${h.ccy}')" style="display:flex;align-items:center;padding:11px 0;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;gap:10px">

      <div style="width:34px;height:34px;border-radius:50%;background:${col}18;border:1.5px solid ${col}55;display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <span style="font-size:11px;font-weight:700;color:${col}">${h.stock.charAt(0).toUpperCase()}</span>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;color:#fff;margin-bottom:2px;display:flex;align-items:center;gap:6px">${h.stock} <span style="font-size:9px;font-weight:700;color:${col};background:${col}1f;border:1px solid ${col}55;border-radius:8px;padding:2px 6px;white-space:nowrap">${ofTotalPct.toFixed(2)}%</span></div>
        <div style="display:flex;align-items:center;gap:5px;margin-bottom:1px;flex-wrap:wrap">
          <span style="font-size:9px;color:rgba(255,255,255,0.3)">Avg</span>
          <span class="pv-val" style="font-size:10px;font-weight:500;color:rgba(255,255,255,0.55);white-space:nowrap">${h.avg>0?fc(h.avg,h.mktCcy||h.ccy):'—'}</span>
          <span class="pv-hide" style="font-size:10px;color:rgba(255,255,255,0.3)">••</span>
          <span style="font-size:9px;color:rgba(255,255,255,0.2)">·</span>
          <span style="font-size:9px;color:rgba(255,255,255,0.3)">Last</span>
          <span class="pv-val" style="font-size:10px;font-weight:500;color:rgba(255,255,255,0.55);white-space:nowrap">${h.mktP>0?fc(h.mktP,h.mktCcy||h.ccy):'—'}</span>
          <span class="pv-hide" style="font-size:10px;color:rgba(255,255,255,0.3)">••</span>
        </div>
        <div class="pv-val" style="font-size:10px;color:${tCol};white-space:nowrap">${sgn(tot2,h.ccy)}${pct2!==null?' ('+pct2.toFixed(1)+'%)':''}</div>
        <div class="pv-hide" style="font-size:10px;color:${tCol}">••••</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="pv-val" style="font-size:10px;color:rgba(255,255,255,0.35);white-space:nowrap;margin-bottom:1px">${(+h.qty).toLocaleString()} shares</div>
        <div class="pv-hide" style="font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:1px">••</div>
        <div class="pv-val" style="font-size:13px;font-weight:600;color:#fff;white-space:nowrap">${fc(h.mktVal,h.mktCcy||h.ccy)}</div>
        <div class="pv-hide" style="font-size:13px;color:#fff">••••</div>
        ${h.ccy!=='MYR'?`<div class="pv-val" style="font-size:10px;color:rgba(255,255,255,0.35);margin-top:1px;white-space:nowrap">≈ RM ${myrVal.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}</div><div class="pv-hide" style="font-size:10px;color:rgba(255,255,255,0.35)">••••</div>`:''}
      </div>
      <div style="color:rgba(255,255,255,0.2);font-size:14px;flex-shrink:0">›</div>
    </div>`;
  });

  const viewAll=allHoldings.length>10?`<div onclick="drillStock('','MYR')" style="text-align:right;padding:10px 0;font-size:12px;font-weight:600;color:#3b82f6;cursor:pointer">View All Holdings ›</div>`:'';

  const holdingsCard=`<div style="margin:0;padding:0 0 4px">
    <div style="font-size:9px;font-weight:600;color:rgba(255,255,255,0.35);letter-spacing:2px;margin-bottom:12px;text-transform:uppercase;padding-top:20px;border-top:1px solid rgba(255,255,255,0.06)">Holdings (by Market Value — MYR Equivalent)</div>
    <div style="display:flex;justify-content:space-between;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.07)">
      <span style="font-size:9px;font-weight:600;color:rgba(255,255,255,0.25);letter-spacing:1px">#&nbsp;&nbsp;STOCK</span>
      <span style="font-size:9px;font-weight:600;color:rgba(255,255,255,0.25);letter-spacing:1px">HOLDING VALUE</span>
    </div>
    ${holdingRows}
    ${viewAll}
  </div>`;

  const pfColor=p.color||'#d4a847';
  const chartSection='<div style="margin-bottom:14px"><div style="font-size:8px;font-weight:600;letter-spacing:2px;color:rgba(255,255,255,0.2);text-transform:uppercase;margin-bottom:6px">Portfolio Value · All Time</div><div id="ov-chart-'+p.id+'" style="background:rgba(255,255,255,0.02);border-radius:10px;overflow:hidden;min-height:30px"></div></div>';
  return `<div style="padding:14px 16px 0;min-height:100vh;background:radial-gradient(ellipse at 25% 58%,rgba(120,80,10,0.06) 0%,transparent 42%),radial-gradient(ellipse at 72% 42%,rgba(8,80,40,0.04) 0%,transparent 38%),#020202">${topCard}${chartSection}${assetSummary}<div style="height:12px"></div>${holdingsCard}</div>`;
}

// ── Breakdown overlay — global scope ─────────────────────────────────────────
function showBreakdown(type, portfolioId, ccy){
  const p = S.portfolios.find(x=>x.id===portfolioId);
  if(!p) return;
  const allH=getHoldings(p,false).filter(h=>h.ccy===ccy);
  const activeH=getHoldings(p,true).filter(h=>h.ccy===ccy);
  const fc2=(v,c)=>{try{return fc(v,c);}catch(e){return v;}};
  let title='',rows='',total=0;

  // ── shared row builder ───────────────────────────────────────────────────────
  function bdRow(avatarLetter,avatarBg,avatarBorder,title,sub1,sub2,amountStr,amountCol,onclick,pctStr){
    return '<div'+(onclick?' onclick="'+onclick+'" style="display:flex;align-items:center;gap:10px;padding:9px 12px;margin-bottom:4px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:9px;cursor:pointer"':' style="display:flex;align-items:center;gap:10px;padding:9px 12px;margin-bottom:4px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:9px"')+'>'
      +'<div style="width:36px;height:36px;border-radius:50%;background:'+avatarBg+';border:1.5px solid '+avatarBorder+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0">'+avatarLetter+'</div>'
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+title+'</div>'
      +(sub1?'<div style="font-size:10px;color:rgba(255,255,255,0.32);margin-top:1px">'+sub1+'</div>':'')
      +(sub2?'<div style="font-size:10px;color:rgba(255,255,255,0.22);margin-top:1px">'+sub2+'</div>':'')
      +'</div>'
      +'<div style="text-align:right;flex-shrink:0">'
      +'<div style="font-size:13px;font-weight:700;color:'+amountCol+';white-space:nowrap">'+amountStr+'</div>'
      +(pctStr?'<div style="font-size:11px;font-weight:600;color:'+amountCol+';opacity:0.75;margin-top:2px;white-space:nowrap">'+pctStr+'</div>':'')
      +'</div>'
      +'</div>';
  }
  function bdSectionHeader(label){
    return '<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.28);letter-spacing:1px;text-transform:uppercase;padding:0 2px;margin:10px 0 6px">'+label+'</div>';
  }

  if(type==='realized'){
    title='Realized P&L';
    const stocks=allH.filter(h=>h.realized!==0).sort((a,b)=>b.realized-a.realized);
    const sellMap={};
    p.transactions.filter(t=>t.type==='Sell'&&t.ccy===ccy).sort((a,b)=>b.date.localeCompare(a.date)).forEach(t=>{if(!sellMap[t.stock])sellMap[t.stock]=[];sellMap[t.stock].push(t);});
    if(!stocks.length){rows='<div style="text-align:center;padding:2rem;color:rgba(255,255,255,0.35);font-size:13px">No realized trades yet.</div>';}
    else{
      stocks.forEach(h=>{
        total+=h.realized;
        const col=h.realized>=0?'#00e676':'#ff4d6d';
        const bg=h.realized>=0?'rgba(0,230,118,0.06)':'rgba(255,77,109,0.06)';
        const border=h.realized>=0?'rgba(0,230,118,0.18)':'rgba(255,77,109,0.18)';
        const pct=h.cost>0?(h.realized/h.cost*100):null;
        const sells=sellMap[h.stock]||[];
        const letter=(h.stock||'?').charAt(0).toUpperCase();
        // Stock summary row
        rows+='<div style="margin-bottom:12px">';
        rows+=bdSectionHeader(h.stock+(pct!==null?' · '+(pct>=0?'+':'')+pct.toFixed(2)+'%':'')+(sells.length?' · '+sells.length+' sell'+(sells.length>1?'s':''):' · still held'));
        // Each sell trade
        if(sells.length){
          sells.forEach(s=>{
            const proc=(+s.qty)*(+s.price)-(+s.fee||0);
            rows+=bdRow(letter,'#7f1d1d','#ef4444',
              h.stock,
              s.date+' · '+(+s.qty).toLocaleString()+' shares @ '+fc2(s.price,ccy),
              s.fee>0?'fee −'+fc2(s.fee,ccy):null,
              (h.realized>=0?'+':'')+fc2(h.realized,ccy), col, null);
          });
        } else {
          // Partially realized, still held
          rows+=bdRow(letter,'#1e40af','#3b82f6',
            h.stock, 'Still held · partial realization', null,
            (h.realized>=0?'+':'')+fc2(h.realized,ccy), col, null);
        }
        rows+='</div>';
      });
    }

  } else if(type==='unrealized'){
    title='Unrealized P&L';
    const stocks=activeH.sort((a,b)=>b.unreal-a.unreal);
    if(!stocks.length){rows='<div style="text-align:center;padding:2rem;color:rgba(255,255,255,0.35);font-size:13px">No open positions.</div>';}
    else{
      stocks.forEach(h=>{
        total+=h.unreal;
        const col=h.unreal>=0?'#00e676':'#ff4d6d';
        const pct=h.cost>0?(h.unreal/h.cost*100):null;
        const letter=(h.stock||'?').charAt(0).toUpperCase();
        const avatarBg=h.unreal>=0?'#1a3a2a':'#3a1a1a';
        const avatarBorder=h.unreal>=0?'#00e676':'#ff4d6d';
        const amtStr=(h.unreal>=0?'+':'')+fc2(h.unreal,ccy);
        const pctStr=pct!==null?(pct>=0?'+':'')+pct.toFixed(2)+'%':'';
        const safeStock=h.stock.replace(/'/g,"\'");
        rows+=bdRow(letter, avatarBg, avatarBorder,
          h.stock+' <span style="font-size:10px;font-weight:400;color:rgba(255,255,255,0.3)">'+h.qty.toLocaleString()+' shares</span>',
          'Avg '+fc2(h.avg,ccy)+' · Now '+fc2(h.mktP,ccy),
          'Value '+fc2(h.mktVal,ccy),
          amtStr, col,
          'closeBreakdownOv();drillStock(\'' +safeStock+ '\',\'' +ccy+ '\')',
          pctStr);
      });
    }

  } else if(type==='dividends'){
    title='Dividends';
    const divTxns=p.transactions.filter(t=>t.type==='Dividend'&&t.ccy===ccy).sort((a,b)=>b.date.localeCompare(a.date));
    const divMap={};
    divTxns.forEach(t=>{
      if(!divMap[t.stock])divMap[t.stock]={stock:t.stock,total:0,txns:[]};
      divMap[t.stock].total+=(+t.amount||0);
      divMap[t.stock].txns.push(t);
    });
    const stocks=Object.values(divMap).sort((a,b)=>b.total-a.total);
    if(!stocks.length){rows='<div style="text-align:center;padding:2rem;color:rgba(255,255,255,0.35);font-size:13px">No dividends received yet.</div>';}
    else{
      stocks.forEach(h=>{
        total+=h.total;
        const letter=(h.stock||'?').charAt(0).toUpperCase();
        rows+='<div style="margin-bottom:12px">';
        rows+=bdSectionHeader(h.stock+' · '+h.txns.length+' payment'+(h.txns.length>1?'s':'')+' · +'+fc2(h.total,ccy));
        h.txns.forEach(t=>{
          rows+=bdRow('D','#78350f','#f59e0b',
            h.stock,
            t.date+(t.note?' · '+t.note:''),
            null,
            '+'+fc2(t.amount,ccy),'#f59e0b', null);
        });
        rows+='</div>';
      });
    }
  } else if(type==='fees'){
    title='Platform Fees';
    const feeTxns=p.transactions.filter(t=>t.type==='Platform Fee'&&t.ccy===ccy).sort((a,b)=>b.date.localeCompare(a.date));
    // Also collect per-transaction buy fees from regular trades
    const buyFees=p.transactions.filter(t=>['Buy','Sell'].includes(t.type)&&t.ccy===ccy&&(+t.fee||0)>0).sort((a,b)=>b.date.localeCompare(a.date));
    if(!feeTxns.length&&!buyFees.length){rows='<div style="text-align:center;padding:2rem;color:rgba(255,255,255,0.35);font-size:13px">No platform fees recorded.</div>';}
    else{
      // Platform fee charges section
      if(feeTxns.length){
        // Group by platform
        const pfMap={};
        feeTxns.forEach(t=>{const k=t.note||'Platform';if(!pfMap[k])pfMap[k]={label:k,total:0,txns:[]};pfMap[k].total+=(+t.amount||0);pfMap[k].txns.push(t);});
        Object.values(pfMap).sort((a,b)=>b.total-a.total).forEach(pf2=>{
          total+=pf2.total;
          rows+='<div style="margin-bottom:12px">'
            +'<div style="font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;padding:0 2px">'+pf2.label+' · '+pf2.txns.length+' charge'+(pf2.txns.length>1?'s':'')+' · −'+fc2(pf2.total,ccy)+'</div>';
          pf2.txns.forEach(t=>{
            rows+='<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;margin-bottom:4px;background:rgba(255,77,109,0.04);border:1px solid rgba(255,77,109,0.12);border-radius:9px">'
              +'<div style="width:34px;height:34px;border-radius:50%;background:#1f1218;border:1.5px solid #6b7280;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#9ca3af;flex-shrink:0">P</div>'
              +'<div style="flex:1;min-width:0">'
              +'<div style="font-size:13px;font-weight:600;color:#fff">'+(t.note||'Platform Fee')+'</div>'

            +'<div style="font-size:9px;color:rgba(255,255,255,0.25);margin-top:1px">brokerage</div>'
            +'</div>'
            +'</div>';
        });
        rows+='</div>';
      }
    }
  }

  const totalCol=type==='fees'?'#ff4d6d':type==='dividends'?'#00e676':(total>=0?'#00e676':'#ff4d6d');
  const totalLabel=type==='fees'?'−'+fc2(total,ccy):(total>=0?'+':'')+fc2(total,ccy);

  // Header

  const header=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">

      <span style="font-size:13px;font-weight:700;color:${col}">${ccy}</span>
    </div>
    <div>
      <div style="font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px">${p.name} · ${ccy} Portfolio</div>

      <div class="pv-hide" style="font-size:22px;font-weight:700;color:#fff">••••••</div>
      ${ccy!=='MYR'?`<div class="pv-val" style="font-size:12px;color:rgba(255,255,255,0.35);margin-top:3px;letter-spacing:.3px">≈ RM ${mvWithCashMYR.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>

  const grid=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">

    ${mkCard('Total Holdings Value',fc(mv,ccy),'rgba(255,255,255,0.88)')}
    ${mkCard('Unrealized P&L',
      (u>=0?'+':'')+fc(u,ccy), unrealCol,
      totPct!==null?(u>=0?'+':'')+totPct.toFixed(2)+'%':null, unrealCol, false, `showBreakdown('unrealized','${p.id}','${ccy}')`)}
    ${mkCard('Realized P&L',(r>=0?'+':'')+fc(r,ccy),realCol,null,null,false,`showBreakdown('realized','${p.id}','${ccy}')`)}
    ${mkCard('Dividends',d>0?fc(d,ccy):'—',d>0?'#00e676':'rgba(255,255,255,0.55)',null,null,false,d>0?`showBreakdown('dividends','${p.id}','${ccy}')`:'')}
    ${(()=>{
      const hasBroker=p.transactions.some(t=>['Buy','Sell'].includes(t.type)&&t.ccy===ccy&&(+t.fee||0)>0);
      const hasFees=pf2>0||hasBroker;
      const feeLabel=pf2>0?fc(pf2,ccy):(hasBroker?fc(0,ccy):'—');
      const feeCol=pf2>0?'#ff4d6d':hasBroker?'rgba(255,255,255,0.55)':'rgba(255,255,255,0.55)';
      return mkCard('Platform Fees',feeLabel,feeCol,null,null,false,hasFees?`showBreakdown('fees','${p.id}','${ccy}')`:null);

    ${cb>0

  return `<div style="padding:14px 14px 8px">${back}${header}${grid}${holdCard}</div>`;
}

function renderHoldings(p){
  const h=getHoldings(p,true);
  if(!h.length)return'<div class="card m" style="text-align:center;padding:2rem">No active holdings.</div>';
  const byCcy={};
  h.forEach(hh=>{if(!byCcy[hh.ccy])byCcy[hh.ccy]=[];byCcy[hh.ccy].push(hh);});
  let tables='';
  for(const [ccy,rows] of Object.entries(byCcy)){
    let tbody='';
    for(const hh of rows){
      const tot=Math.round((Math.round(hh.unreal*100)/100+Math.round(hh.divs*100)/100+Math.round(hh.realized*100)/100)*100)/100;
      const pct=hh.cost>0?tot/hh.cost*100:null;
      tbody+=`<tr class="ck hld-row" data-s="${hh.stock.toLowerCase()} ${hh.ccy.toLowerCase()}" onclick="drillStock('${hh.stock.replace(/'/g,"\\'")}','${hh.ccy}')">`
        +`<td style="font-weight:600">${hh.stock}</td>`
        +`<td class="r m">${(+hh.qty).toLocaleString()}</td>`
        +`<td class="r m" style="font-size:11px">${hh.avg>0?fc(hh.avg,ccy,3):'—'}</td>`
        +`<td class="r">${fc(hh.cost,ccy)}</td>`
        +`<td class="r m" style="font-size:11px">${hh.mktP>0?hh.mktCcy+' '+hh.mktP.toFixed(3):'—'}</td>`
        +`<td class="r" style="font-weight:600">${hh.mktVal>0?fc(hh.mktVal,hh.mktCcy):'—'}</td>`
        +`<td class="r ${sc(hh.unreal)}">${sgn(hh.unreal,ccy)}</td>`
        +`<td class="r ${hh.divs>0?'g':''}">${hh.divs>0?fc(hh.divs,ccy):'—'}</td>`
        +`<td class="r ${sc(tot)}" style="font-weight:600">${tot>=0?'+':''}${fc(Math.abs(tot),ccy)}</td>`
        +`<td class="r">${pct!==null?'<span style="color:'+(pct>=0?'var(--green)':'var(--red)')+';font-weight:600">'+fp(pct)+'</span>':'—'}</td>`
        +'</tr>';
    }
    const sumMkt=rows.reduce((s,h)=>s+h.mktVal,0);
    const sumU=rows.reduce((s,h)=>s+h.unreal,0);
    const sumD=rows.reduce((s,h)=>s+h.divs,0);
    const sumT=rows.reduce((s,h)=>s+h.unreal+h.divs+h.realized,0);
    const sumC=rows.reduce((s,h)=>s+h.cost,0);
    const fp2=sumC>0?sumT/sumC*100:null;
    tables+=`<div class="hld-grp" style="margin-bottom:1.5rem">`
      +ccyTag(ccy,'margin-bottom:.5rem')
      +`<div style="overflow-x:auto;margin-top:.5rem"><table class="tbl"><thead><tr>`
      +`<th>Stock</th><th class="r">Qty</th><th class="r">Avg Cost</th><th class="r">Cost Basis</th>`
      +`<th class="r">Current Price</th><th class="r">Holding Value</th><th class="r">Unrealized</th><th class="r">Dividends</th><th class="r">Total P&L</th><th class="r">P&L %</th>`
      +`</tr></thead><tbody>${tbody}</tbody>`
      +`<tfoot><tr><td>Total (${ccy})</td><td colspan="4"></td>`
      +`<td class="r">${fc(sumMkt,ccy)}</td>`
      +`<td class="r ${sc(sumU)}">${sumU>=0?'+':''}${fc(Math.abs(sumU),ccy)}</td>`
      +`<td class="r g">${fc(sumD,ccy)}</td>`
      +`<td class="r ${sc(sumT)}">${sumT>=0?'+':''}${fc(Math.abs(sumT),ccy)}</td>`
      +`<td class="r">${fp2!==null?'<span style="color:'+(fp2>=0?'var(--green)':'var(--red)')+';font-weight:600">'+fp(fp2)+'</span>':'—'}</td>`
      +`</tr></tfoot></table></div></div>`;
  }
  return `<div class="search-bar">`
    +`<input id="hld-search" placeholder="Search stock…" oninput="filterHoldings()" style="max-width:300px">`
    +`<span class="m" style="font-size:12px" id="hld-cnt">${h.length} holding${h.length!==1?'s':''}</span>`
    +`</div><div id="hld-wrap">${tables}</div>`;
}
