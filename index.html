function drillStock(stock,ccy){
  const prevView=VIEW?{...VIEW}:null;
  if(window.pushNav)window.pushNav(function(){VIEW=prevView;renderContent();});
  VIEW={type:'stock',stock,ccy};
  renderContent();
}
function renderStockDetail(p,stock,ccy){
  const h=getHoldings(p,false).find(h=>h.stock===stock)||{};
  let txs=p.transactions.filter(t=>t.stock===stock&&['Buy','Sell','Dividend'].includes(t.type));
  const tot=Math.round(((h.unreal||0)+(h.divs||0)+(h.realized||0))*100)/100;
  const closed=h.qty<=0;
  const pct=h.cost>0?tot/h.cost*100:null;

  // Rolling avg cost for yearly summary
  const byYr={},hh2={qty:0,cost:0};
  [...txs].sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=>{
    const yr=t.date.slice(0,4);
    if(!byYr[yr])byYr[yr]={divs:0,realized:0};
    if(t.type==='Dividend'){byYr[yr].divs+=t.amount!=null?+t.amount:0;}
    else if(t.type==='Buy'){hh2.qty+=+t.qty;hh2.cost+=(+t.qty)*(+t.price)+(+t.fee||0);}
    else if(t.type==='Sell'){
      const avg=hh2.qty>0?hh2.cost/hh2.qty:0;
      byYr[yr].realized+=(+t.qty)*(+t.price)-(+t.fee||0)-avg*(+t.qty);
      hh2.cost-=avg*(+t.qty);hh2.qty-=+t.qty;
    }
  });
  const allYrs=Object.keys(byYr).sort();

  // ── Stock chart ──────────────────────────────────────────────────────────────
  const stockColor=(function(){for(var i=0;i<S.portfolios.length;i++){if(S.portfolios[i].id===S.activeId)return S.portfolios[i].color||'#6aa3c8';}return'#6aa3c8';})();
  const chartDiv='<div style="margin-bottom:14px"><div style="font-size:8px;font-weight:600;letter-spacing:2px;color:rgba(255,255,255,0.2);text-transform:uppercase;margin-bottom:6px">Price History · All Time</div><div id="sd-chart-'+stock.replace(/[^a-z0-9]/gi,'_')+'" style="background:rgba(255,255,255,0.02);border-radius:10px;overflow:hidden;min-height:30px"></div></div>';
  setTimeout(function(){renderStockChart('sd-chart-'+stock.replace(/[^a-z0-9]/gi,'_'),stock,ccy,stockColor);},300);

  // ── Header row 1: 2 per row ─────────────────────────────────────────────────
  const mkKc=(l,v,c)=>'<div class="kc"><div class="kl">'+l+'</div><div class="kv" style="color:'+c+'">'+v+'</div></div>';
  const g2='display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px';
  const row1=
    '<div style="'+g2+'">'+mkKc('Holdings',h.qty>0?(+h.qty).toLocaleString():'Closed','var(--t1)')+mkKc('Avg Cost',h.avg>0?fc(h.avg,ccy,3):'—','var(--t1)')+'</div>'
   +'<div style="'+g2+'">'+mkKc('Cost Basis',h.cost>0?fc(h.cost,ccy):'—','var(--t1)')+mkKc('Current Price',h.mktP>0?h.mktCcy+' '+(+h.mktP).toFixed(3):'—','var(--t1)')+'</div>'
   +'<div style="'+g2+'">'+mkKc('Holding Value',h.mktVal>0?fc(h.mktVal,h.mktCcy||ccy):'—','var(--t1)')+mkKc('Dividends',h.divs>0?fc(h.divs,ccy):'—','var(--green)')+'</div>';

  // ── Header row 2: Unrealized, Realized, Dividends, Total P&L, P&L% ──────────
  const row2=
    '<div style="'+g2+'">'+mkKc('Unrealized P&L',h.unreal!=null&&h.qty>0?sgn(h.unreal,ccy):'—',sc(h.unreal||0)==='g'?'var(--green)':sc(h.unreal||0)==='rr'?'var(--red)':'var(--t2)')+mkKc('Realized P&L',h.realized?sgn(h.realized,ccy):'—',sc(h.realized||0)==='g'?'var(--green)':sc(h.realized||0)==='rr'?'var(--red)':'var(--t2)')+'</div>'
   +'<div style="'+g2+'">'+mkKc('Total P&L',sgn(tot,ccy),tot>=0?'var(--green)':'var(--red)')+mkKc('P&L %',pct!==null?fp(pct):'—',pct!==null&&pct>=0?'var(--green)':'var(--red)')+'</div>';

  // ── Timeline-style transactions matching Transactions tab ──────────────────
  const TYPE_COL_SD={'Buy':'#3b82f6','Sell':'#00e676','Dividend':'#f59e0b','Platform Fee':'#888'};
  const TYPE_AV_SD={'Buy':{letter:'B',bg:'#1e40af',border:'#3b82f6'},'Sell':{letter:'S',bg:'#7f1d1d',border:'#ef4444'},'Dividend':{letter:'D',bg:'#78350f',border:'#f59e0b'},'Platform Fee':{letter:'P',bg:'#1f2937',border:'#6b7280'}};
  const MN_SD=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  function sdDayLabel(ds2){const d=new Date(ds2+'T00:00:00');return{day:d.getDate(),mon:MN_SD[d.getMonth()]};}
  function buildSdTimeline(filterType){
    const filtered=filterType?txs.filter(t=>t.type===filterType):txs;
    const sorted=[...filtered].sort((a,b)=>b.date.localeCompare(a.date));
    if(!sorted.length)return'<div class="m" style="text-align:center;padding:2rem;font-size:12px">No transactions found.</div>';
    const mons=[],monMap={};
    sorted.forEach(tx=>{const ym=tx.date.slice(0,7);if(!monMap[ym]){monMap[ym]=[];mons.push(ym);}monMap[ym].push(tx);});
    let out='';
    mons.forEach(ym=>{
      const[yr,mo]=ym.split('-');
      out+='<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:1.5px;padding:14px 0 8px;font-family:Courier New,monospace">'+MN_SD[parseInt(mo,10)-1]+' '+yr+'</div><div>';
      const items=monMap[ym];
      items.forEach((tx,idx)=>{
        const isLast=idx===items.length-1;
        const col=TYPE_COL_SD[tx.type]||'#888';
        const av=TYPE_AV_SD[tx.type]||{letter:'?',bg:'#1f2937',border:'#6b7280'};
        const amt=tx.amount!=null?+tx.amount:tx.type==='Sell'?(+tx.qty)*(+tx.price)-(+tx.fee||0):(+tx.qty)*(+tx.price)+(+tx.fee||0);
        const amtCol=tx.type==='Sell'?'#00e676':tx.type==='Dividend'?'#f59e0b':'rgba(255,255,255,0.88)';
        const amtPfx=tx.type==='Sell'||tx.type==='Dividend'?'+':'';
        const{day,mon}=sdDayLabel(tx.date);
        const hasQP=tx.qty>0&&tx.price>0;
        const sid=tx.id.replace(/'/g,"\\'");
        const ds_sd=((tx.stock||'').toLowerCase()+' '+tx.type.toLowerCase()+' '+(tx.note||'').toLowerCase()+' '+tx.date).replace(/"/g,'');
        out+='<div data-search="'+ds_sd+'" style="display:flex;align-items:stretch;gap:0;margin-bottom:6px">'
          +'<div style="display:flex;flex-direction:column;align-items:center;width:46px;flex-shrink:0;padding-top:6px">'
          +'<div style="font-size:16px;font-weight:700;color:rgba(255,255,255,0.85);line-height:1">'+day+'</div>'
          +'<div style="font-size:9px;font-weight:600;color:rgba(255,255,255,0.3);letter-spacing:.5px">'+mon+'</div>'
          +(!isLast?'<div style="flex:1;width:1px;background:rgba(255,255,255,0.08);margin-top:6px;min-height:12px"></div>':'')
          +'</div>'
          +'<div style="display:flex;flex-direction:column;align-items:center;width:38px;flex-shrink:0;padding-top:4px">'
          +'<div style="width:32px;height:32px;border-radius:50%;background:'+av.bg+';border:1.5px solid '+av.border+';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff">'+av.letter+'</div>'
          +'</div>'
          +'<div style="flex:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-top:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;min-width:0;margin-left:4px;margin-bottom:2px">'
          +'<div style="min-width:0;flex:1">'
          +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">'
          +'<span style="font-size:13px;font-weight:700;color:#fff">'+(tx.stock||'—')+'</span>'
          +'<span style="font-size:9px;font-weight:600;color:'+col+';background:'+col+'18;padding:1px 6px;border-radius:6px;border:1px solid '+col+'33;white-space:nowrap">'+tx.type+'</span>'
          +'</div>'
          +(hasQP?'<div style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:1px">'+(+tx.qty).toLocaleString()+' shares · '+fc(tx.price,tx.ccy,4)+'</div>':'')
          +(tx.note?'<div style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:1px;font-style:italic">'+tx.note+'</div>':'')
          +'</div>'
          +'<div style="text-align:right;flex-shrink:0;margin-left:10px">'
          +(amt>0?'<div style="font-size:13px;font-weight:700;color:'+amtCol+';white-space:nowrap">'+amtPfx+fc(amt,tx.ccy)+'</div>':'<div style="font-size:13px;color:rgba(255,255,255,0.3)">—</div>')
          +(tx.fee>0&&hasQP?'<div style="font-size:10px;color:rgba(255,255,255,0.25);margin-top:2px">fee '+fc(tx.fee,tx.ccy)+'</div>':'')
          +'<div style="display:flex;gap:2px;justify-content:flex-end;margin-top:6px">'
          +"<button class='ib' onclick='event.stopPropagation();oet("+'"'+sid+'"'+")'  style='font-size:12px;padding:2px 6px'>✎</button>"
          +"<button class='ib' onclick='event.stopPropagation();odt("+'"'+sid+'"'+")'  style='font-size:12px;padding:2px 6px;color:var(--red)'>✕</button>"
          +'</div>'
          +'</div>'
          +'</div>'
          +'</div>';
      });
      out+='</div>';
    });
    return out;
  }
  const typeOpts=['','Buy','Sell','Dividend','Platform Fee'].map(t=>'<option value="'+t+'">'+( t||'All types')+'</option>').join('');
  const txSection='<div style="display:flex;align-items:center;gap:8px;margin-bottom:.75rem;flex-wrap:wrap">'
    +'<span class="stl" style="margin:0">All transactions</span>'
    +'<span class="m" style="font-size:12px">'+txs.length+' transactions</span>'
    +'</div>'
    +'<div style="display:flex;gap:8px;margin-bottom:.75rem">'
    +'<input id="sd-tx-search" placeholder="Search stock, note…" oninput="filterSdTxTimeline()" style="flex:1;font-size:13px">'
    +'<select id="sd-tx-type" onchange="filterSdTxTimeline()" style="width:130px">'+typeOpts+'</select>'
    +'</div>'
    +'<div id="sd-tx-timeline">'+buildSdTimeline()+'</div>'
    +'</div>';

  return'<div class="bb" onclick="if(window._navStack&&window._navStack.length){window.goBack();}else{VIEW=null;renderContent();}">← Back</div>'
    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap">'
    +'<span style="font-size:20px;font-weight:700">'+stock+'</span>'
    +'<span class="ctag">'+ccy+'</span>'
    +'<span class="badge" style="color:'+(closed?'rgba(255,255,255,0.3)':'var(--green)')+';background:'+(closed?'rgba(255,255,255,0.04)':'rgba(0,230,118,0.06)')+';border:1px solid '+(closed?'rgba(255,255,255,0.1)':'rgba(0,230,118,0.2)')+'">'+(closed?'Closed':'Active')+'</span>'
    +(pct!==null?pnlPill(pct):'')
    +(h.firstDate?'<span class="m" style="font-size:12px">since '+h.firstDate+'</span>':'')
    +'</div>'
    +chartDiv
    +row1
    +'<div style="margin-bottom:.5rem"></div>'
    +row2
    +(allYrs.length?'<div class="card"><div class="stl">Yearly summary</div>'
      +'<table class="tbl"><thead><tr><th>Year</th><th class="r">Dividends</th><th class="r">Realized P&L</th></tr></thead>'
      +'<tbody>'+allYrs.map(yr=>'<tr><td style="font-weight:600">'+yr+'</td>'
        +'<td class="r '+(byYr[yr].divs>0?'g':'')+'">'+(byYr[yr].divs>0?fc(byYr[yr].divs,ccy):'—')+'</td>'
        +'<td class="r '+sc(byYr[yr].realized)+'">'+(byYr[yr].realized?sgn(byYr[yr].realized,ccy):'—')+'</td>'
        +'</tr>').join('')+'</tbody>'
      +'<tfoot><tr><td>Total</td>'
      +'<td class="r g">'+fc(Object.values(byYr).reduce((a,b)=>a+b.divs,0),ccy)+'</td>'
      +'<td class="r '+sc(Object.values(byYr).reduce((a,b)=>a+b.realized,0))+'">'+sgn(Object.values(byYr).reduce((a,b)=>a+b.realized,0),ccy)+'</td>'
      +'</tr></tfoot></table></div>'
      :'')
    +txSection;
}

// ── Transactions tab with search ─────────────────────────────────────────────────
function renderTransactions(p){
  return`<div style="background:radial-gradient(ellipse at 25% 58%,rgba(120,80,10,0.06) 0%,transparent 42%),radial-gradient(ellipse at 72% 42%,rgba(8,80,40,0.04) 0%,transparent 38%),#020202;min-height:100vh">${renderTx(p)}</div>`;
}

function renderTx(p,filterYrCcy){
  let txs=[...p.transactions].filter(t=>['Buy','Sell','Dividend','Platform Fee'].includes(t.type));
  if(filterYrCcy){txs=txs.filter(t=>t.type==='Dividend'&&t.date.slice(0,4)===String(filterYrCcy.yr)&&t.ccy===filterYrCcy.ccy);}
  txs.sort((a,b)=>b.date.localeCompare(a.date));
  const isFiltered=!!filterYrCcy;
  let html='';

  if(isFiltered){
    html+='<div class="bb" onclick="TAB=\'journey\';journeyFilter=null;renderContent()">← Back to Journey</div>';
    html+='<div style="margin-bottom:.75rem;padding:.5rem .75rem;background:var(--bd);border-radius:var(--r);font-size:12px;color:var(--blue)">Dividends for '+filterYrCcy.ccy+' in '+filterYrCcy.yr+'</div>';
  } else {
    const typeFilterOpts=['','Buy','Sell','Dividend','P&L','Platform Fee','Closed Trades','Cash Flow'].map(t=>'<option value="'+t+'">'+(t||'All types')+'</option>').join('');
    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:.75rem">'
      +'<input id="tx-search" placeholder="Search stock, note…" oninput="_debounceTx()" style="flex:1">'
      +'<select id="tx-type-filter" onchange="filterTxTable()" style="flex:1">'+typeFilterOpts+'</select>'
      +'<button class="pri sm" id="bat" onclick="omm(\'at\')" style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;padding:0;font-size:18px;line-height:1;border-radius:50%;flex-shrink:0">+</button>'
      +'</div>'
      +'<div style="font-size:10px;color:rgba(255,255,255,0.25);margin-bottom:.75rem;letter-spacing:.5px;font-family:Courier New,monospace" id="tx-count">'+(txs.length+(p.deposits||[]).length)+' TRANSACTIONS</div>';
  }

  // Closed trades view (unchanged, hidden by default)
  const _closedAll=getHoldings(p,false).filter(h=>(h.realized!==0||h.divs!==0));
  const _closedByCcy={};
  _closedAll.forEach(h=>{
    if(!_closedByCcy[h.ccy])_closedByCcy[h.ccy]={r:0,d:0};
    _closedByCcy[h.ccy].r+=Math.round(h.realized*100)/100;
    _closedByCcy[h.ccy].d+=Math.round(h.divs*100)/100;
  });
  const _closedSummary=Object.entries(_closedByCcy).map(([ccy,v])=>
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:.75rem">'
    +'<div style="padding:10px 12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px">'
    +'<div style="font-size:9px;color:rgba(255,255,255,0.3);margin-bottom:3px">P&L Realized ('+ccy+')</div>'
    +'<div class="pv-val '+sc(v.r)+'" style="font-size:13px;font-weight:700">'+sgn(v.r,ccy)+'</div></div>'
    +'<div style="padding:10px 12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px">'
    +'<div style="font-size:9px;color:rgba(255,255,255,0.3);margin-bottom:3px">Dividends ('+ccy+')</div>'
    +'<div style="font-size:13px;font-weight:700;color:'+(v.d>0?'var(--green)':'var(--t3)')+'">'+( v.d>0?fc(v.d,ccy):'—')+'</div></div>'
    +'</div>'
  ).join('');
  // Build timeline for closed trades — grouped by first-buy month
  const _clMonths=[], _clMonthMap={};
  _closedAll.forEach(function(h){
    const ym=(h.firstDate||'0000-00').slice(0,7);
    if(!_clMonthMap[ym]){_clMonthMap[ym]=[];_clMonths.push(ym);}
    _clMonthMap[ym].push(h);
  });
  const _MN=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  function _clMonthLabel(ym){const[y,m]=ym.split('-');return _MN[parseInt(m,10)-1]+' '+y;}
  function _clDayLabel(d){if(!d||d==='—')return{day:'—',mon:''};const dt=new Date(d+'T00:00:00');return{day:dt.getDate(),mon:_MN[dt.getMonth()]};}

  let _clTimelineHtml='';
  _clMonths.forEach(function(ym){
    _clTimelineHtml+=`<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:1.5px;padding:14px 0 8px;font-family:'Courier New',monospace">${_clMonthLabel(ym)}</div>`;
    const items=_clMonthMap[ym];
    _clTimelineHtml+='<div>';
    items.forEach(function(h,idx){
      const isLast=idx===items.length-1;
      const tot=h.realized+h.divs;
      const pct=h.cost>0?tot/h.cost*100:null;
      const isPartial=h.qty>0;
      const pnlCol=tot>=0?'#4ade80':'#f87171';
      const statusCol=isPartial?'#4ade80':'rgba(255,255,255,0.35)';
      const statusBg=isPartial?'rgba(0,230,118,0.08)':'rgba(255,255,255,0.04)';
      const statusBorder=isPartial?'rgba(0,230,118,0.25)':'rgba(255,255,255,0.1)';
      const statusText=isPartial?'Partial':'Closed';
      const avatarText=(h.stock||'?').slice(0,3).toUpperCase();
      const avatarFontSize=avatarText.length<=2?'12px':'9px';
      const {day,mon}=_clDayLabel(h.firstDate);
      _clTimelineHtml+=`<div onclick="drillStock('${h.stock.replace(/'/g,"\\'")}','${h.ccy}')"
        style="display:flex;align-items:stretch;gap:0;cursor:pointer;margin-bottom:6px">
        <div style="display:flex;flex-direction:column;align-items:center;width:46px;flex-shrink:0;padding-top:6px">
          <div style="font-size:16px;font-weight:700;color:rgba(255,255,255,0.85);line-height:1">${day}</div>
          <div style="font-size:9px;font-weight:600;color:rgba(255,255,255,0.3);letter-spacing:.5px">${mon}</div>
          ${!isLast?`<div style="flex:1;width:1px;background:rgba(255,255,255,0.08);margin-top:6px;min-height:12px"></div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;width:38px;flex-shrink:0;padding-top:4px">
          <div style="width:32px;height:32px;border-radius:50%;background:#1a1a2e;border:1.5px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:${avatarFontSize};font-weight:800;color:#fff;flex-shrink:0;letter-spacing:-0.5px">${avatarText}</div>
        </div>
        <div style="flex:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-top:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;min-width:0;margin-left:4px;margin-bottom:2px">
          <div style="min-width:0;flex:1">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
              <span style="font-size:13px;font-weight:700;color:#fff">${h.stock}</span>
              <span style="font-size:9px;font-weight:600;color:${statusCol};background:${statusBg};padding:1px 6px;border-radius:6px;border:1px solid ${statusBorder};white-space:nowrap">${statusText}</span>
            </div>
            <div style="font-size:10px;color:rgba(255,255,255,0.25)">${h.ccy}${h.divs>0?' · Div: '+fc(h.divs,h.ccy):''}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;margin-left:8px">
            <div class="pv-val" style="font-size:13px;font-weight:700;color:${pnlCol};white-space:nowrap">${sgn(tot,h.ccy)}</div>
            <div style="font-size:13px;color:${pnlCol}" class="pv-hide">••••</div>
            ${pct!==null?`<div style="font-size:10px;color:${pnlCol};opacity:0.8" class="pv-val">${pct>=0?'+':''}${fp(pct)}</div>`:''}
          </div>
        </div>
      </div>`;
    });
    _clTimelineHtml+='</div>';
  });

  html+='<div id="tx-closed-view" style="display:none">'
    +_closedSummary
    +'<div style="font-size:10px;color:rgba(255,255,255,0.25);margin-bottom:.5rem;letter-spacing:.5px;font-family:Courier New,monospace">'+_closedAll.length+' POSITION'+(_closedAll.length!==1?'S':'')+'</div>'
    +(_closedAll.length===0?'<div class="m" style="text-align:center;padding:2rem;font-size:12px">No realized P&L yet.</div>':_clTimelineHtml)
    +'</div>';

    // ── Timeline card list — grouped by month ──
  const TYPE_COL={'Buy':'#3b82f6','Sell':'#00e676','Dividend':'#f59e0b','Platform Fee':'#888','deposit':'#60a5fa','withdrawal':'#c084fc'};
  // Avatar letter + bg colour per type
  const TYPE_AVATAR={
    'Buy':    {letter:'B', bg:'#1e40af', border:'#3b82f6'},
    'Sell':   {letter:'S', bg:'#7f1d1d', border:'#ef4444'},
    'Dividend':{letter:'D', bg:'#78350f', border:'#f59e0b'},
    'Platform Fee':{letter:'P', bg:'#1f2937', border:'#6b7280'},
    'deposit':{letter:'↑', bg:'#1e3a5f', border:'#60a5fa'},
    'withdrawal':{letter:'↓', bg:'#3b0764', border:'#c084fc'},
  };

  // Build combined list
  const deps2=(p.deposits||[]).map(function(d,i){return{_isDep:true,_depIdx:i,date:d.date,type:d.type,ccy:d.ccy,amount:d.amount,note:d.note};});
  const combined=[...txs.map(tx=>({...tx,_isDep:false})),...deps2].sort((a,b)=>b.date.localeCompare(a.date));

  // Group by YYYY-MM

  html+='</div>'; // end tx-table-wrap
    _txCache={key:_ck,html:html.slice(_txStart)};

  if(txs.length===0)html+='<div class="m" style="text-align:center;padding:2rem;font-size:12px">No transactions found.</div>';

function _saveTxInline(txId){
  const p=pf();
  const tx=p.transactions.find(t=>t.id===txId);
  if(!tx)return;
  const type=(document.getElementById('ett')||{value:tx.type}).value;
  const isF=type==='Dividend'||type==='Platform Fee';
  const updated={
    ...tx,
    date:(document.getElementById('etd')||{value:tx.date}).value||tx.date,
    type,
    ccy:(document.getElementById('etc')||{value:tx.ccy}).value,
    stock:type==='Platform Fee'?'':(document.getElementById('ets')||{value:tx.stock||''}).value.trim(),
    qty:isF?0:+(document.getElementById('etq')||{value:0}).value||0,
    price:isF?0:+(document.getElementById('etp')||{value:0}).value||0,
    fee:+(document.getElementById('etf')||{value:0}).value||0,
    amount:isF?+(document.getElementById('eta')||{value:0}).value||0:null,
    note:(document.getElementById('etn')||{value:''}).value||'',
  };
  S.portfolios=S.portfolios.map(function(port){
    if(port.id!==S.activeId)return port;
    return{...port,transactions:port.transactions.map(function(t){return t.id===txId?updated:t;})};
  });
  save();
  cmm();
  render();
}
function filterSdTx(){filterSdTxTimeline();}
function filterSdTxTimeline(){
  const q=(document.getElementById('sd-tx-search')||{value:''}).value.toLowerCase();
  const type=(document.getElementById('sd-tx-type')||{value:''}).value; // keep original case for type match
  const wrap=document.getElementById('sd-tx-timeline');
  if(!wrap)return;
  const items=wrap.querySelectorAll('[data-search]');
  items.forEach(r=>{
    const ds=(r.dataset.search||'');
    const matchSearch=!q||ds.includes(q);
    const matchType=!type||ds.includes(type.toLowerCase());
    r.style.display=(matchSearch&&matchType)?'':'none';
  });
  // Hide month headers with no visible items
  wrap.querySelectorAll('div').forEach(el=>{
    if(el.style&&el.style.fontFamily&&el.style.fontFamily.includes('Courier')){
      const sib=el.nextElementSibling;
      if(sib){const anyVis=[...sib.children].some(c=>c.style.display!=='none');el.style.display=anyVis?'':'none';}
    }
  });
}

// Debounce tx search
let _txDebTimer=null;
function _debounceTx(){clearTimeout(_txDebTimer);_txDebTimer=setTimeout(filterTxTable,120);}

// Tx render cache — keyed by portfolio id + data hash
let _txCache={key:null,html:null};
function _txCacheKey(p){
  // Use txn count + last tx id + deposit count as a fast hash
  const txs=p.transactions||[];
  const deps=p.deposits||[];
  return p.id+'|'+txs.length+'|'+(txs[txs.length-1]||{}).id+'|'+deps.length;
}

function filterTxTable(){
  const type=(document.getElementById('tx-type-filter')||{value:''}).value;
  const ct=document.getElementById('tx-closed-view');
  const tt=document.getElementById('tx-table-wrap');
  const cnt=document.getElementById('tx-count');
  let cf=document.getElementById('tx-cashflow-view');

  // P&L inline view
  let pv=document.getElementById('tx-pnl-view');
  if(type==='P&L'){
    if(ct)ct.style.display='none';
    if(tt)tt.style.display='none';
    if(cnt)cnt.textContent='';
    if(cf)cf.style.display='none';
    let ds2=document.getElementById('tx-div-summary');
    if(ds2)ds2.style.display='none';
    if(!pv){
      pv=document.createElement('div');
      pv.id='tx-pnl-view';
      const wrap=document.getElementById('tx-table-wrap');
      if(wrap)wrap.parentNode.insertBefore(pv,wrap);
    }
    pv.innerHTML=renderPnlInline();
    pv.style.display='';
    return;
  }
  if(pv)pv.style.display='none';

  if(type==='Cash Flow'){
    if(ct)ct.style.display='none';
    if(tt)tt.style.display='none';
    if(cnt)cnt.textContent='';
    if(!cf){
      cf=document.createElement('div');
      cf.id='tx-cashflow-view';
      const wrap=document.getElementById('tx-table-wrap');
      if(wrap)wrap.parentNode.insertBefore(cf,wrap.nextSibling);
    }
    cf.innerHTML=renderCashFlowInline();
    cf.style.display='';
    return;
  }
  // Dividend summary panel
  let ds=document.getElementById('tx-div-summary');
  if(type==='Dividend'){
    if(!ds){
      ds=document.createElement('div');
      ds.id='tx-div-summary';
      const wrap=document.getElementById('tx-table-wrap');
      if(wrap)wrap.parentNode.insertBefore(ds,wrap);
    }
    ds.innerHTML=renderDividendSummaryInline();
    ds.style.display='';
  } else {
    if(ds)ds.style.display='none';
  }
  if(cf)cf.style.display='none';
  if(type==='Closed Trades'){
    if(ct)ct.style.display='';
    if(tt)tt.style.display='none';
    if(cnt)cnt.textContent='';
    return;
  }
  if(ct)ct.style.display='none';
  if(tt)tt.style.display='';
  const q=(document.getElementById('tx-search')||{value:''}).value.toLowerCase();
  const rows=document.querySelectorAll('#tx-table-wrap [data-search]');
  let visible=0;
  rows.forEach(r=>{
    const matchSearch=!q||(r.dataset.search||'').includes(q);
    const matchType=!type||(r.dataset.search||'').includes(type.toLowerCase());
    const show=matchSearch&&matchType;
    r.style.display=show?'flex':'none';
    if(show)visible++;
  });
  // Hide month headers with no visible rows — batch DOM reads
  const wrap=document.getElementById('tx-table-wrap');
  if(wrap){
    // Each month = header div + timeline div (pairs)
    const ch=wrap.children;
    for(let i=0;i<ch.length-1;i+=2){
      const hdr=ch[i],tl=ch[i+1];
      if(!tl||!tl.querySelector)continue;
      // Check if any row in this timeline container is visible
      let any=false;
      const trows=tl.children;
      for(let j=0;j<trows.length;j++){if(trows[j].style.display!=='none'){any=true;break;}}
      const v=any?'':'none';
      hdr.style.display=v;
      tl.style.display=v;
    }
  }
  if(cnt)cnt.textContent=visible+' TRANSACTIONS';
}

function renderDividendSummaryInline(){
  const p=pf();
  const divTxs=p.transactions.filter(t=>t.type==='Dividend'&&t.amount>0);
  if(!divTxs.length)return'';

  // Total by ccy
  const byCcy={};
  divTxs.forEach(function(t){
    if(!byCcy[t.ccy])byCcy[t.ccy]=0;
    byCcy[t.ccy]+=parseFloat(t.amount)||0;
  });

  // By year+ccy
  const byYear={};
  divTxs.forEach(function(t){
    const yr=t.date.slice(0,4);
    if(!byYear[yr])byYear[yr]={};
    if(!byYear[yr][t.ccy])byYear[yr][t.ccy]=0;
    byYear[yr][t.ccy]+=parseFloat(t.amount)||0;
  });
  const years=Object.keys(byYear).sort((a,b)=>b-a);
  const allCcys=[...new Set(divTxs.map(t=>t.ccy))].sort();

  // Summary minicards
  let summary='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px">';
  Object.entries(byCcy).forEach(function([ccy,tot]){
    summary+=`<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-top:1.5px solid rgba(245,158,11,0.4);border-radius:10px;padding:10px 12px">
      <div style="font-size:9px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">${ccy} Total Dividends</div>
      <div class="pv-val" style="font-size:14px;font-weight:700;color:#4ade80;white-space:nowrap">+${fc(tot,ccy)}</div>
      <div class="pv-hide" style="font-size:14px;color:#888">••••</div></div>`;
  });
  summary+='</div>';

  // Yearly breakdown cards — tap to drill
  let yrCards='<div style="font-size:9px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.06)">By Year</div>';
  const curYr=new Date().getFullYear();
  years.forEach(function(yr){
    const isCur=parseInt(yr)===curYr;
    allCcys.forEach(function(ccy){
      const amt=byYear[yr][ccy];
      if(!amt)return;
      yrCards+=`<div onclick="window._divDrillFrom='transactions';jDrill('div','${ccy}',${yr})"
        style="display:flex;align-items:center;background:${isCur?'rgba(245,158,11,0.06)':'rgba(255,255,255,0.03)'};border:1px solid ${isCur?'rgba(245,158,11,0.25)':'rgba(255,255,255,0.07)'};border-top:1px solid ${isCur?'rgba(245,158,11,0.45)':'rgba(255,255,255,0.12)'};border-radius:10px;padding:10px 14px;cursor:pointer;margin-bottom:8px;gap:12px">
        <div style="width:40px;flex-shrink:0">
          <div style="font-size:15px;font-weight:700;color:${isCur?'#f59e0b':'rgba(255,255,255,0.7)'}">${yr}</div>
          ${isCur?'<div style="font-size:8px;color:#f59e0b;letter-spacing:1px">NOW</div>':''}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:2px">${ccy} · Tap to see transactions</div>
          <div style="font-size:13px;font-weight:700;color:#4ade80 " class="pv-val">+${fc(amt,ccy)}</div>
          <div style="font-size:13px;color:#4ade80" class="pv-hide">••••</div>
        </div>
        <div style="color:rgba(255,255,255,0.15);font-size:12px;flex-shrink:0">›</div>
      </div>`;
    });
  });

  return summary+yrCards;
}

function renderPnlInline(){
  const p=pf();
  const d=journeyData(p);
  const ccys=Object.keys(d);
  if(!ccys.length)return'<p class="m" style="padding:2rem;text-align:center;font-size:12px">No realized P&L yet.</p>';

  let html='';
  ccys.forEach(function(ccy){
    const rows=d[ccy];
    const totalGross=Math.round(rows.reduce((s,r)=>s+r.realYr,0)*100)/100;
    const totalPf=Math.round(rows.reduce((s,r)=>s+(r.pfYr||0),0)*100)/100;
    const totalNet=Math.round((totalGross-totalPf)*100)/100;
    const hasReal=rows.some(r=>r.realYr!==0||r.pfYr>0);
    if(!hasReal)return;

    // Summary minicard
    html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
      <div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-top:1.5px solid rgba(0,212,255,0.4);border-radius:10px;padding:10px 12px">
        <div style="font-size:9px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">${ccy} Net Realized</div>
        <div class="pv-val" style="font-size:14px;font-weight:700;color:${totalNet>=0?'#4ade80':'#f87171'};white-space:nowrap">${sgn(totalNet,ccy)}</div>
        <div class="pv-hide" style="font-size:14px;color:#888">••••</div>
      </div>
      ${totalPf>0?`<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 12px">
        <div style="font-size:9px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">${ccy} Platform Fees</div>
        <div class="pv-val" style="font-size:14px;font-weight:700;color:#f87171;white-space:nowrap">−${fc(totalPf,ccy)}</div>
        <div class="pv-hide" style="font-size:14px;color:#888">••••</div>
      </div>`:''}
    </div>`;

    // Year cards
    html+='<div style="font-size:9px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.06)">By Year</div>';
    const curYr=new Date().getFullYear();
    rows.filter(r=>r.realYr!==0||r.pfYr>0).forEach(function(r){
      const isCur=r.yr===curYr;
      const net=Math.round((r.realYr-(r.pfYr||0))*100)/100;
      const netCol=net>=0?'#4ade80':'#f87171';
      html+=`<div onclick="window._divDrillFrom='transactions';window._drillType='pnl';jDrill('pnl','${ccy}',${r.yr})"
        style="display:flex;align-items:center;background:${isCur?'rgba(0,212,255,0.05)':'rgba(255,255,255,0.03)'};border:1px solid ${isCur?'rgba(0,212,255,0.2)':'rgba(255,255,255,0.07)'};border-top:1px solid ${isCur?'rgba(0,212,255,0.35)':'rgba(255,255,255,0.12)'};border-radius:10px;padding:10px 14px;cursor:pointer;margin-bottom:8px;gap:12px">
        <div style="width:40px;flex-shrink:0">
          <div style="font-size:15px;font-weight:700;color:${isCur?'#00d4ff':'rgba(255,255,255,0.7)'}">${r.yr}</div>
          ${isCur?'<div style="font-size:8px;color:#00d4ff;letter-spacing:1px">NOW</div>':''}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:2px">Realized${r.pfYr>0?' · Fees: −'+fc(r.pfYr,ccy):''}  </div>
          <div class="pv-val" style="font-size:12px;font-weight:600;color:${r.realYr>=0?'#4ade80':'#f87171'}">${r.realYr!==0?sgn(r.realYr,ccy):'—'}</div>
          <div style="font-size:12px;color:${r.realYr>=0?'#4ade80':'#f87171'}" class="pv-hide">••••</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:2px">Net P&L</div>
          <div class="pv-val" style="font-size:13px;font-weight:700;color:${netCol}">${sgn(net,ccy)}</div>
          <div style="font-size:13px;color:${netCol}" class="pv-hide">••••</div>
        </div>
        <div style="color:rgba(255,255,255,0.15);font-size:12px;flex-shrink:0">›</div>
      </div>`;
    });
  });
  return html||'<p class="m" style="padding:2rem;text-align:center;font-size:12px">No realized P&L yet.</p>';
}

function renderCashFlowInline(){
  const p=pf();
  if(!p.deposits)p.deposits=[];
  const deps=p.deposits.map((d,i)=>({...d,_oi:i})).sort((a,b)=>b.date.localeCompare(a.date));

  // Total by currency
  const byCcy={};
  deps.forEach(function(d){
    if(!byCcy[d.ccy])byCcy[d.ccy]={dep:0,wdr:0};
    const amt=parseFloat(d.amount)||0;
    if(d.type==='deposit')byCcy[d.ccy].dep+=amt;
    else byCcy[d.ccy].wdr+=amt;
  });

  // Summary minicards
  let summary='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px">';
  Object.entries(byCcy).forEach(function([ccy,v]){
    const net=v.dep-v.wdr;
    summary+='<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 12px">'
      +'<div style="font-size:9px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;white-space:nowrap">'+ccy+' Net Capital</div>'
      +'<div class="pv-val" style="font-size:14px;font-weight:700;color:'+('#fff')+';white-space:nowrap">'+fc(net,ccy)+'</div>'
      +'<div class="pv-hide" style="font-size:14px;color:#888">••••</div></div>';
  });
  summary+='</div>';

  // Yearly net flow — compact table
  const allCcys=[...new Set(deps.map(d=>d.ccy))].sort();
  const byYear={};
  deps.forEach(function(d){
    const yr=d.date.slice(0,4);
    if(!byYear[yr])byYear[yr]={};
    if(!byYear[yr][d.ccy])byYear[yr][d.ccy]={dep:0,wdr:0};
    const amt=parseFloat(d.amount)||0;
    if(d.type==='deposit')byYear[yr][d.ccy].dep+=amt;
    else byYear[yr][d.ccy].wdr+=amt;
  });
  const years=Object.keys(byYear).sort((a,b)=>b-a);

  let yearTable='<div style="margin-bottom:14px">'
    +'<div style="font-size:9px;font-weight:600;color:rgba(255,255,255,0.35);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">Yearly Net Flow</div>'
    +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px">'
    +'<thead><tr>'
    +'<th style="text-align:left;padding:5px 8px 5px 0;color:rgba(255,255,255,0.3);font-weight:600;border-bottom:1px solid rgba(255,255,255,0.08)">Year</th>';
  allCcys.forEach(function(ccy){
    yearTable+='<th style="text-align:right;padding:5px 6px;color:'+getCcyColor(ccy)+';font-weight:700;border-bottom:1px solid rgba(255,255,255,0.08)">'+ccy+'</th>';
  });
  yearTable+='</tr></thead><tbody>';
  years.forEach(function(yr){
    yearTable+='<tr>';
    yearTable+='<td style="padding:6px 8px 6px 0;color:rgba(255,255,255,0.5);font-weight:600;border-bottom:1px solid rgba(255,255,255,0.04)">'+yr+'</td>';
    allCcys.forEach(function(ccy){
      const v=byYear[yr][ccy];
      if(!v){yearTable+='<td style="padding:6px 6px;text-align:right;color:rgba(255,255,255,0.18);border-bottom:1px solid rgba(255,255,255,0.04)">—</td>';return;}
      const net=v.dep-v.wdr;
      const col='#fff';
      yearTable+='<td style="padding:6px 6px;text-align:right;font-weight:700;color:'+col+';border-bottom:1px solid rgba(255,255,255,0.04);white-space:nowrap" class="pv-val">'+(net>=0?'+':'')+fc(net,ccy)+'</td>'
        +'<td style="display:none" class="pv-hide"><td style="padding:6px 6px;text-align:right;color:'+col+'" class="pv-hide">••••</td>';
    });
    yearTable+='</tr>';
  });
  // Total row
  yearTable+='<tr><td style="padding:7px 8px 4px 0;color:rgba(255,255,255,0.65);font-weight:700;border-top:1px solid rgba(255,255,255,0.1)">Total</td>';
  allCcys.forEach(function(ccy){
    const v=byCcy[ccy];
    if(!v){yearTable+='<td style="padding:7px 6px 4px;text-align:right;border-top:1px solid rgba(255,255,255,0.1)">—</td>';return;}
    const net=v.dep-v.wdr;
    const col='#fff';
    yearTable+='<td style="padding:7px 6px 4px;text-align:right;font-weight:700;color:'+col+';border-top:1px solid rgba(255,255,255,0.1);white-space:nowrap" class="pv-val">'+(net>=0?'+':'')+fc(net,ccy)+'</td>';
  });
  yearTable+='</tr></tbody></table></div></div>';

  // Timeline rows grouped by month
  const _cfMN=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  function _cfMonthLabel(ym){const[y,m]=ym.split('-');return _cfMN[parseInt(m,10)-1]+' '+y;}
  function _cfDayLabel(d){const dt=new Date(d+'T00:00:00');return{day:dt.getDate(),mon:_cfMN[dt.getMonth()]};}
  const _cfMonths=[],_cfMonthMap={};
  deps.forEach(function(d){
    const ym=d.date.slice(0,7);
    if(!_cfMonthMap[ym]){_cfMonthMap[ym]=[];_cfMonths.push(ym);}
    _cfMonthMap[ym].push(d);
  });
  let _cfTimeline='<div style="font-size:9px;font-weight:600;color:rgba(255,255,255,0.35);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.06)">All Entries</div>';
  if(!deps.length){
    _cfTimeline+='<div style="text-align:center;padding:2rem;color:rgba(255,255,255,0.3);font-size:13px">No entries yet.</div>';
  } else {
    _cfMonths.forEach(function(ym){
      _cfTimeline+=`<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:1.5px;padding:14px 0 8px;font-family:'Courier New',monospace">${_cfMonthLabel(ym)}</div>`;
      const items=_cfMonthMap[ym];
      _cfTimeline+='<div>';
      items.forEach(function(d,idx){
        const isLast=idx===items.length-1;
        const isDeposit=d.type==='deposit';
        const amt=parseFloat(d.amount)||0;
        const avatarCol=isDeposit?'#60a5fa':'#c084fc';
        const avatarBg=isDeposit?'#1e3a5f':'#3b0764';
        const avatarLetter=isDeposit?'↑':'↓';
        const {day,mon}=_cfDayLabel(d.date);
        _cfTimeline+=`<div onclick="openDepositModal(${d._oi})"
          style="display:flex;align-items:stretch;gap:0;cursor:pointer;margin-bottom:6px">
          <div style="display:flex;flex-direction:column;align-items:center;width:46px;flex-shrink:0;padding-top:6px">
            <div style="font-size:16px;font-weight:700;color:rgba(255,255,255,0.85);line-height:1">${day}</div>
            <div style="font-size:9px;font-weight:600;color:rgba(255,255,255,0.3);letter-spacing:.5px">${mon}</div>
            ${!isLast?`<div style="flex:1;width:1px;background:rgba(255,255,255,0.08);margin-top:6px;min-height:12px"></div>`:''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:center;width:38px;flex-shrink:0;padding-top:4px">
            <div style="width:32px;height:32px;border-radius:50%;background:${avatarBg};border:1.5px solid ${avatarCol};display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0">${avatarLetter}</div>
          </div>
          <div style="flex:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-top:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;min-width:0;margin-left:4px;margin-bottom:2px">
            <div style="min-width:0;flex:1">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
                <span style="font-size:13px;font-weight:700;color:#fff">${d.note||d.type}</span>
                <span style="font-size:9px;font-weight:600;color:${avatarCol};background:${avatarBg};padding:1px 6px;border-radius:6px;border:1px solid ${avatarCol}55;white-space:nowrap">${isDeposit?'Deposit':'Withdrawal'}</span>
              </div>
              <div style="font-size:10px;color:rgba(255,255,255,0.25)">${d.ccy}</div>
            </div>
            <div style="text-align:right;flex-shrink:0;margin-left:8px">
              <div class="pv-val" style="font-size:13px;font-weight:700;color:#fff;white-space:nowrap">${isDeposit?'+':'-'}${fc(amt,d.ccy)}</div>
              <div class="pv-hide" style="font-size:13px;color:rgba(255,255,255,0.5)">••••</div>
            </div>
          </div>
        </div>`;
      });
      _cfTimeline+='</div>';
    });
  }

  return summary+yearTable+_cfTimeline;
}

// ── Closed trades tab ────────────────────────────────────────────────────────────
function renderClosed(p){
  const all=getHoldings(p,false).filter(h=>(h.realized!==0||h.divs!==0));
  // Overall closed P&L by CCY
  const _clByCcy={};
  all.forEach(h=>{if(!_clByCcy[h.ccy])_clByCcy[h.ccy]={r:0,d:0};_clByCcy[h.ccy].r+=h.realized;_clByCcy[h.ccy].d+=h.divs;});
  // Deduct fees from closed trades summary
  p.transactions.filter(t=>t.type==='Platform Fee').forEach(t=>{if(_clByCcy[t.ccy])_clByCcy[t.ccy].r=Math.round((_clByCcy[t.ccy].r-(+t.amount||0))*100)/100;});
  const _clCards=Object.entries(_clByCcy).map(([c,v])=>{
    return '<div style="display:flex;gap:12px;padding:6px 12px;background:rgba(0,212,255,0.04);border-radius:var(--r);border:1px solid rgba(255,255,255,.15)">'
      +'<div><div style="font-size:10px;color:var(--t2);letter-spacing:.3px;margin-bottom:2px">'+c+' Realized</div>'
      +'<div class="pv-val '+sc(v.r)+'" style="font-size:13px;font-weight:700">'+sgn(v.r,c)+'</div></div>'
      +(v.d>0?'<div><div style="font-size:10px;color:var(--t2);letter-spacing:.3px;margin-bottom:2px">Dividends</div>'
      +'<div class="pv-val" style="font-size:13px;font-weight:700;color:var(--green)">'+fc(v.d,c)+'</div></div>':'')
      +'</div>';
  }).join('');
  const _clSummary=_clCards?`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:.75rem">${_clCards}</div>`:'';
  return _clSummary+`<div class="search-bar"><input id="cl-search" placeholder="Search stock…" oninput="filterClosedTable()" style="max-width:320px"><span class="m" style="font-size:12px" id="cl-count">${all.length} closed position${all.length!==1?'s':''}</span></div>
  ${!all.length?`<div class="card m" style="text-align:center;padding:2rem">No realized P&L yet.</div>`:
  `<div style="overflow-x:auto"><table class="tbl" id="cl-table"><thead><tr>
    <th>Stock</th><th>CCY</th><th class="r">Realized P&L</th><th class="r">Dividends</th><th class="r">Total P&L</th><th class="r">P&L %</th><th>First buy</th>
  </tr></thead><tbody>
  ${all.map(h=>{const tot=h.realized+h.divs;const pct=h.cost>0?tot/h.cost*100:null;return`<tr class="ck" data-search="${h.stock.toLowerCase()} ${h.ccy.toLowerCase()}" onclick="drillStock('${h.stock}','${h.ccy}')">
    <td style="font-weight:600">${h.stock}</td><td><span class="ctag">${h.ccy}</span></td>
    <td class="r ${sc(h.realized)}" style="font-weight:600">${h.realized?sgn(h.realized,h.ccy):'—'}</td>
    <td class="r g">${h.divs>0?fc(h.divs,h.ccy):'—'}</td>
    <td class="r ${sc(tot)}" style="font-weight:600">${tot>=0?'+':''}${fc(Math.abs(tot),h.ccy)}</td>
    <td class="r">${pct!==null?`<span style="color:${pct>=0?'var(--green)':'var(--red)'};font-weight:600">${fp(pct)}</span>`:'—'}</td>
    <td class="m" style="font-size:11px">${h.firstDate||'—'}</td>
  </tr>`;}).join('')}
  </tbody></table></div>`}`;
}
function filterClosedTable(){
  const q=($('cl-search')||{}).value?.toLowerCase()||'';
  const rows=document.querySelectorAll('#cl-table tbody tr');
  let v=0;rows.forEach(r=>{const show=!q||r.dataset.search.includes(q);r.style.display=show?'':'none';if(show)v++;});
  const c=$('cl-count');if(c)c.textContent=v+' closed position'+(v!==1?'s':'');
}

// ── Journey tab ───────────────────────────────────────────────────────────────────
function renderJourney(p){

          style="display:flex;align-items:center;background:${isCur?'rgba(245,158,11,0.06)':'rgba(255,255,255,0.03)'};border:1px solid ${isCur?'rgba(245,158,11,0.25)':'rgba(255,255,255,0.07)'};border-top:1px solid ${isCur?'rgba(245,158,11,0.45)':'rgba(255,255,255,0.12)'};border-radius:10px;padding:10px 14px;cursor:pointer;margin-bottom:8px;gap:12px">
          <div style="width:40px;flex-shrink:0">
            <div style="font-size:15px;font-weight:700;color:${isCur?'#f59e0b':'rgba(255,255,255,0.7)'}">${r.yr}</div>
            ${isCur?`<div style="font-size:8px;color:#f59e0b;letter-spacing:1px">NOW</div>`:''}
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:2px">Dividends received</div>
            <div class="pv-val" style="font-size:13px;font-weight:700;color:#4ade80">+${fc(r.divYr,ccy)}</div>
          </div>
          <div style="color:rgba(255,255,255,0.15);font-size:12px;flex-shrink:0">›</div>
        </div>`;
      }).join('');
      return`<div style="margin-bottom:2rem">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:.75rem;flex-wrap:wrap">
          ${ccyTag(ccy)}
          <span class="pv-num" style="font-size:12px;color:var(--green);font-weight:600">Total: ${fc(totalDiv,ccy)}</span>
        </div>
        ${yrDivCards}
      </div>`;
    } else {
      // PnL tab — realYr is gross realized, pfYr is fees for that year
      const totalGross=Math.round(rows.reduce((s,r)=>s+r.realYr,0)*100)/100;
      const totalPf=Math.round(rows.reduce((s,r)=>s+(r.pfYr||0),0)*100)/100;
      const totalNet=Math.round((totalGross-totalPf)*100)/100;
      const hasReal=rows.some(r=>r.realYr!==0||r.pfYr>0);
      const yrCards=rows.filter(r=>r.realYr!==0||r.pfYr>0).map(r=>{
        const isCur=r.yr===new Date().getFullYear();
        const net=Math.round((r.realYr-(r.pfYr||0))*100)/100;
        const netCol=net>=0?'#4ade80':'#f87171';
        return`<div onclick="jDrill('pnl','${ccy}',${r.yr})"
          style="display:flex;align-items:center;background:${isCur?'rgba(0,212,255,0.05)':'rgba(255,255,255,0.03)'};border:1px solid ${isCur?'rgba(0,212,255,0.2)':'rgba(255,255,255,0.07)'};border-top:1px solid ${isCur?'rgba(0,212,255,0.35)':'rgba(255,255,255,0.12)'};border-radius:10px;padding:10px 14px;cursor:pointer;margin-bottom:8px;gap:12px">
          <div style="width:40px;flex-shrink:0">
            <div style="font-size:15px;font-weight:700;color:${isCur?'#00d4ff':'rgba(255,255,255,0.7)'}">${r.yr}</div>
            ${isCur?`<div style="font-size:8px;color:#00d4ff;letter-spacing:1px">NOW</div>`:''}
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:2px">Realized${r.pfYr>0?' · Fees: −'+fc(r.pfYr,ccy):''}</div>
            <div style="font-size:11px;font-weight:600;color:${r.realYr>=0?'#4ade80':'#f87171'}">${r.realYr!==0?sgn(r.realYr,ccy):'—'}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:2px">Net P&L</div>
            <div class="pv-val" style="font-size:13px;font-weight:700;color:${netCol}">${sgn(net,ccy)}</div>
          </div>
          <div style="color:rgba(255,255,255,0.15);font-size:12px;flex-shrink:0">›</div>
        </div>`;
      }).join('');
      return`<div style="margin-bottom:2rem">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:.75rem;flex-wrap:wrap">
          ${ccyTag(ccy)}
          ${hasReal?`<span style="font-size:12px;font-weight:600" class="${sc(totalNet)}">Net Realized: ${sgn(totalNet,ccy)}</span>`:''}
        </div>
        ${hasReal?yrCards:`<p class="m" style="font-size:12px">No realized P&L yet.</p>`}
      </div>`;
    }
  }).join('');

  return`<div style="background:radial-gradient(ellipse at 25% 58%,rgba(120,80,10,0.06) 0%,transparent 42%),radial-gradient(ellipse at 72% 42%,rgba(8,80,40,0.04) 0%,transparent 38%),#020202;min-height:100vh">${subTabs}${sections}</div>`;
}

// ── Shared timeline helpers ──
const _jMN=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
function _jMonthLabel(ym){const[y,m]=ym.split('-');return _jMN[parseInt(m,10)-1]+' '+y;}
function _jDayLabel(d){if(!d)return{day:'—',mon:''};const dt=new Date(d+'T00:00:00');return{day:dt.getDate(),mon:_jMN[dt.getMonth()]};}
function _jTimeline(items,rowFn){
  const months=[],mmap={};
  items.forEach(function(item){const ym=(item.date||'0000-00').slice(0,7);if(!mmap[ym]){mmap[ym]=[];months.push(ym);}mmap[ym].push(item);});
  let html='';
  months.forEach(function(ym){
    html+=`<div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.35);letter-spacing:1.5px;padding:14px 0 8px;font-family:'Courier New',monospace">${_jMonthLabel(ym)}</div><div>`;
    const its=mmap[ym];
    its.forEach(function(item,idx){html+=rowFn(item,idx===its.length-1);});
    html+='</div>';
  });
  return html||'<p class="m" style="padding:1rem 0;font-size:12px">No transactions found.</p>';
}

function jDrill(mode,ccy,yr){
  const p=pf();
  let txs=[];
  let realizedPnl=0, unrealizedPnl=0;

  if(mode==='div'){
    txs=p.transactions.filter(t=>t.type==='Dividend'&&t.ccy===ccy&&t.date.slice(0,4)===String(yr));
    txs.sort((a,b)=>b.date.localeCompare(a.date));
    const totalDiv=txs.reduce((s,t)=>s+(t.amount!=null?+t.amount:0),0);
    const banner='<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:.75rem;padding:.75rem 1rem;background:rgba(0,230,118,0.06);border-radius:var(--r);border-left:3px solid rgba(0,230,118,0.5)">'
      +'<span style="font-size:13px;font-weight:600;color:var(--green)">Dividends — '+ccy+' '+yr+'</span>'
      +'<span class="pv-val" style="font-size:15px;font-weight:700;color:var(--green)">+'+fc(totalDiv,ccy)+'</span>'
      +'</div>';

    const timelineHtml=_jTimeline(txs,function(t,isLast){
      const amt=t.amount!=null?+t.amount:0;
      const avatarText=(t.stock||'?').slice(0,3).toUpperCase();
      const avatarFontSize=avatarText.length<=2?'12px':'9px';
      const {day,mon}=_jDayLabel(t.date);
      return `<div style="display:flex;align-items:stretch;gap:0;margin-bottom:6px">
        <div style="display:flex;flex-direction:column;align-items:center;width:46px;flex-shrink:0;padding-top:6px">
          <div style="font-size:16px;font-weight:700;color:rgba(255,255,255,0.85);line-height:1">${day}</div>
          <div style="font-size:9px;font-weight:600;color:rgba(255,255,255,0.3);letter-spacing:.5px">${mon}</div>
          ${!isLast?`<div style="flex:1;width:1px;background:rgba(255,255,255,0.08);margin-top:6px;min-height:12px"></div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;width:38px;flex-shrink:0;padding-top:4px">
          <div style="width:32px;height:32px;border-radius:50%;background:#78350f;border:1.5px solid #f59e0b;display:flex;align-items:center;justify-content:center;font-size:${avatarFontSize};font-weight:800;color:#fff;flex-shrink:0;letter-spacing:-0.5px">${avatarText}</div>
        </div>
        <div style="flex:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-top:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;min-width:0;margin-left:4px;margin-bottom:2px">
          <div style="min-width:0;flex:1">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
              <span style="font-size:13px;font-weight:700;color:#fff">${t.stock||'—'}</span>
              <span style="font-size:9px;font-weight:600;color:#f59e0b;background:rgba(245,158,11,0.1);padding:1px 6px;border-radius:6px;border:1px solid rgba(245,158,11,0.3)">Dividend</span>
            </div>
            ${t.note?`<div style="font-size:10px;color:rgba(255,255,255,0.25);font-style:italic">${t.note}</div>`:''}
          </div>
          <div style="text-align:right;flex-shrink:0;margin-left:8px">
            <div class="pv-val" style="font-size:13px;font-weight:700;color:#4ade80;white-space:nowrap">+${fc(amt,ccy)}</div>
          </div>
        </div>
      </div>`;
    });
    TAB='journey';
    if(window.pushNav)window.pushNav(function(){
      // Go back to wherever we came from
      if(window._divDrillFrom==='transactions'){
        TAB='transactions';
        renderContent();
        // Restore Dividend filter
        setTimeout(function(){
          const sel=document.getElementById('tx-type-filter');
          if(sel){sel.value='Dividend';filterTxTable();}
        },50);
      } else {
        window.jSubTab='pnl';renderContent();
      }
    });
    $('ct').innerHTML=banner+timelineHtml;
    document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab==='journey'));
    return;
  }

  // PnL drill
  txs=p.transactions.filter(t=>['Buy','Sell'].includes(t.type)&&t.ccy===ccy&&t.date.slice(0,4)===String(yr));
  txs.sort((a,b)=>b.date.localeCompare(a.date));

  // Compute realized P&L for this year — replay ALL txs chronologically (same logic as journeyData)
  const hh={};
  const allSorted=[...p.transactions].filter(t=>t.ccy===ccy&&t.stock).sort((a,b)=>a.date.localeCompare(b.date));
  realizedPnl=0;
  allSorted.forEach(t=>{
    if(t.type==='Buy'){
      if(!hh[t.stock])hh[t.stock]={qty:0,cost:0};
      hh[t.stock].qty+=+t.qty; hh[t.stock].cost+=(+t.qty)*(+t.price)+(+t.fee||0);
    } else if(t.type==='Sell'){
      const hs=hh[t.stock]||{qty:0,cost:0};
      const avg=hs.qty>0?hs.cost/hs.qty:0;
      const pnl=(+t.qty)*(+t.price)-(+t.fee||0)-avg*(+t.qty);
      if(t.date.slice(0,4)===String(yr)) realizedPnl=Math.round((realizedPnl+pnl)*100)/100;
      if(hh[t.stock]){hh[t.stock].cost-=avg*(+t.qty);hh[t.stock].qty-=+t.qty;}
    }
  });

  const platformFeeYr=Math.round(p.transactions.filter(t=>t.type==='Platform Fee'&&t.ccy===ccy&&t.date.slice(0,4)===String(yr)).reduce((s,t)=>s+(+t.amount||0),0)*100)/100;

  // Summary cards
  const cards='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:1rem">'

    +(platformFeeYr>0?'<div class="kc"><div class="kl">Platform Fees '+yr+'</div><div class="kv rr">−'+fc(platformFeeYr,ccy)+'</div></div>':'')
    +'</div>';

  const banner='<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:.75rem;padding:.75rem 1rem;background:rgba(255,255,255,0.03);border-radius:var(--r);border-left:3px solid var(--blue)">'
    +'<span style="font-size:13px;font-weight:600;color:var(--blue)">Buy &amp; Sell — '+ccy+' '+yr+'</span>'
    +'<span class="m" style="font-size:11px;margin-left:auto">'+txs.length+' transaction'+(txs.length!==1?'s':'')+'</span>'
    +'</div>';

  const TYPE_COL_J={'Buy':'#3b82f6','Sell':'#00e676'};
  const TYPE_AV_J={
    'Buy':{bg:'#1e40af',border:'#3b82f6'},
    'Sell':{bg:'#7f1d1d',border:'#ef4444'}
  };
  const pnlTimelineHtml=_jTimeline(txs,function(t,isLast){
    const amt=t.type==='Sell'?(+t.qty)*(+t.price)-(+t.fee||0):(+t.qty)*(+t.price)+(+t.fee||0);
    const av=TYPE_AV_J[t.type]||{bg:'#1f2937',border:'#6b7280'};
    const col=TYPE_COL_J[t.type]||'#888';
    const avatarText=(t.stock||'?').slice(0,3).toUpperCase();
    const avatarFontSize=avatarText.length<=2?'12px':'9px';
    const {day,mon}=_jDayLabel(t.date);
    return `<div style="display:flex;align-items:stretch;gap:0;margin-bottom:6px">
      <div style="display:flex;flex-direction:column;align-items:center;width:46px;flex-shrink:0;padding-top:6px">
        <div style="font-size:16px;font-weight:700;color:rgba(255,255,255,0.85);line-height:1">${day}</div>
        <div style="font-size:9px;font-weight:600;color:rgba(255,255,255,0.3);letter-spacing:.5px">${mon}</div>
        ${!isLast?`<div style="flex:1;width:1px;background:rgba(255,255,255,0.08);margin-top:6px;min-height:12px"></div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;width:38px;flex-shrink:0;padding-top:4px">
        <div style="width:32px;height:32px;border-radius:50%;background:${av.bg};border:1.5px solid ${av.border};display:flex;align-items:center;justify-content:center;font-size:${avatarFontSize};font-weight:800;color:#fff;flex-shrink:0;letter-spacing:-0.5px">${avatarText}</div>
      </div>
      <div style="flex:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-top:1px solid rgba(255,255,255,0.12);border-radius:10px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;min-width:0;margin-left:4px;margin-bottom:2px">
        <div style="min-width:0;flex:1">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
            <span style="font-size:13px;font-weight:700;color:#fff">${t.stock||'—'}</span>
            <span style="font-size:9px;font-weight:600;color:${col};background:${col}18;padding:1px 6px;border-radius:6px;border:1px solid ${col}33;white-space:nowrap">${t.type}</span>
          </div>
          <div style="font-size:10px;color:rgba(255,255,255,0.25)">Qty: ${(+t.qty).toLocaleString()} · ${fc(+t.price,t.ccy,4)}${t.fee>0?' · Fee: '+fc(+t.fee,t.ccy):''}</div>
          ${t.note?`<div style="font-size:10px;color:rgba(255,255,255,0.2);font-style:italic;margin-top:1px">${t.note}</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:8px">
          <div class="pv-val" style="font-size:13px;font-weight:700;color:#fff;white-space:nowrap">${fc(amt,t.ccy)}</div>
        </div>
      </div>
    </div>`;
  });

  TAB='journey';
  if(window.pushNav)window.pushNav(function(){window.jSubTab='pnl';renderContent();});
  $('ct').innerHTML=banner+cards+pnlTimelineHtml;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab==='journey'));
}

(function(){
  let _mty=0,_mMoved=false;
  const mi=$('mi');
  mi.addEventListener('touchstart',function(e){_mty=e.touches[0].clientY;_mMoved=false;},{passive:true});

      +(usedFxCcys.length?

        +'<div style="font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:.5rem">FX Rates to MYR</div>'

// ── Backup & Restore (separate buttons, no modal) ──────────────────────────────
function doBackup(){
  const d=new Date().toISOString().slice(0,10);
  const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');
  a.href=u;a.download='portfoliox_backup_'+d+'.json';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(u);},100);
  const t=$('toast');t.textContent='Backup downloaded ✓';t.classList.add('show');clearTimeout(TT);TT=setTimeout(()=>{t.classList.remove('show');t.textContent='Saved ✓';},2500);
}
function doRestore(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.portfolios||!Array.isArray(data.portfolios))throw new Error('Invalid format');
      if(!confirm(`Restore backup? This will replace all current data with ${data.portfolios.length} portfolio(s) from the backup.`))return;
      S=data;
      if(!S.pieImages)S.pieImages={};
      // Migrate older backups — add any missing fields, preserve colors
      S.portfolios.forEach(function(pf,idx){
        if(!pf.color)pf.color=PFPAL[idx%PFPAL.length];
        if(!pf.optionTrades)pf.optionTrades=[];
        if(!pf.cashBalances)pf.cashBalances={};
        if(!pf.deposits)pf.deposits=[];
      });
      if(!S.activeId&&S.portfolios.length)S.activeId=S.portfolios[0].id;
      save();
      closeSettings();
      setTimeout(function(){
        TAB='dashboard';VIEW=null;journeyFilter=null;
        render();
        const t=$('toast');t.textContent='Restored ✓';t.classList.add('show');clearTimeout(TT);TT=setTimeout(()=>{t.classList.remove('show');t.textContent='Saved ✓';},2500);
      },100);
    }catch(err){alert('Error: invalid or corrupted backup file. Please use a valid .json backup.');}
    e.target.value='';
  };
  r.readAsText(f);
}

function movePxRow(btn,dir){

  const allRows=[].slice.call(list.querySelectorAll('.px-row'));

      });
      html+='</div>';
    });
    return html;
  }

  const openItems=openT.map((t)=>({t,i:trades.indexOf(t)})).sort((a,b)=>(b.t.openDate||'').localeCompare(a.t.openDate||''));
  const closedItems=closedT.map((t)=>({t,i:trades.indexOf(t)})).sort((a,b)=>(b.t.closeDate||'').localeCompare(a.t.closeDate||''));

  const openSection=openT.length?`
    <div style="font-size:9px;font-weight:700;color:rgba(0,212,255,0.6);letter-spacing:2px;text-transform:uppercase;padding:10px 0 2px;border-top:1px solid rgba(255,255,255,0.06)">Open Positions · ${openT.length}</div>
    ${buildTimeline(openItems,'openDate',0)}`:'';

  const closedSection=closedT.length?`
    <div onclick="(function(el){var b=el.nextElementSibling;var a=el.querySelector('.caret');b.style.display=b.style.display==='none'?'':'none';a.textContent=b.style.display==='none'?'›':'⌄';})(this)"

    </div>
    <div style="display:none">${buildTimeline(closedItems,'closeDate',0)}</div>`:'' ;

  return`${toolbar}${summary}<div id="opt-rows">${openSection}${closedSection}</div>`;
}

// ── Excel Export ─────────────────────────────────────────────────────────────
function doExcel(){
  if(typeof XLSX==='undefined'){alert('SheetJS not loaded.');return;}
  const wb=XLSX.utils.book_new();
  const dt=new Date().toISOString().slice(0,10);

  // ── Style helpers (dark theme matching HTML) ─────────────────────────────
  const BG={bg0:'0F1117',bg2:'161B27',bg3:'1E2538',bg4:'252D3E',b1:'2A3350'};
  const FG={t1:'E8EAF0',t2:'8892AA',t3:'555E78',green:'66BB6A',red:'EF5350',amber:'FFB74D',blue:'4FC3F7'};

  function bd(){return{top:{style:'thin',color:{rgb:BG.b1}},bottom:{style:'thin',color:{rgb:BG.b1}},left:{style:'thin',color:{rgb:BG.b1}},right:{style:'thin',color:{rgb:BG.b1}}};}
  function s(fg,bg,bold,align,fmt){
    var o={s:{font:{color:{rgb:fg||FG.t1},bold:!!bold,name:'Arial',sz:10},fill:{fgColor:{rgb:bg||BG.bg0}},alignment:{horizontal:align||'left',vertical:'center',wrapText:false},border:bd()}};
    if(fmt)o.z=fmt; return o;
  }
  function hdr(v){return Object.assign({t:'s',v:v},s(FG.t1,BG.bg3,true,'center'));}
  function subhdr(v){return Object.assign({t:'s',v:v},s(FG.amber,BG.bg4,true,'left'));}
  function tv(v,fg,bg,bold,align,fmt){// text/value cell
    var base=s(fg,bg,bold,align,fmt);
    if(v===null||v===undefined||v===''){base.t='s';base.v='—';return base;}
    if(typeof v==='number'){base.t='n';base.v=v;return base;}
    base.t='s';base.v=String(v);return base;
  }
  function fv(f,fg,bg,bold,fmt){// formula cell
    return{t:'n',f:f,v:0,z:fmt||'#,##0.00',s:{font:{color:{rgb:fg||FG.t1},bold:!!bold,name:'Arial',sz:10},fill:{fgColor:{rgb:bg||BG.bg0}},alignment:{horizontal:'right',vertical:'center',wrapText:false},border:bd()}};
  }
  function nv(v,fmt,fg,bg,bold){// numeric value cell (right-aligned)
    var base=s(fg||FG.t1,bg||BG.bg0,bold,'right',fmt||'#,##0.00');
    if(v===null||v===undefined){base.t='s';base.v='—';return base;}
    base.t='n';base.v=+v; return base;
  }
  function pnl(v,bg){// P&L coloured cell - red if negative, green if positive
    var fg=(+v>0)?FG.green:(+v<0)?FG.red:FG.t2;
    return nv(v,'#,##0.00',fg,bg||BG.bg0,true);
  }
  function pnlf(f,bg){// P&L formula cell
    return fv(f,null,bg||BG.bg0,true,'#,##0.00');// colour handled by value at open time
  }
  function pct(v,bg){// percentage cell
    var fg=(+v>0)?FG.green:(+v<0)?FG.red:FG.t2;
    return nv(v/100,'0.00%',fg,bg||BG.bg0,true);
  }
  function yel(v,fmt){// yellow editable input
    return{t:'n',v:+v||0,z:fmt||'#,##0.0000',s:{font:{bold:true,name:'Arial',sz:10},fill:{fgColor:{rgb:'FFF176'}},alignment:{horizontal:'right',vertical:'center'},border:bd()}};
  }
  function tot(v,fmt){// total row cell (amber)
    return nv(v,fmt||'#,##0.00',FG.amber,BG.bg3,true);
  }
  function totf(f,fmt){return fv(f,FG.amber,BG.bg3,true,fmt||'#,##0.00');}
  function blank(bg){return Object.assign({t:'s',v:''},s(FG.t1,bg||BG.bg0,false,'left'));}
  function CL(n){var s='';while(n>0){s=String.fromCharCode(65+(n-1)%26)+s;n=Math.floor((n-1)/26);}return s;}
  function setCell(ws,r,c,cell){ws[CL(c+1)+(r+1)]=cell;}
  function setRange(ws,R,C){ws['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:R-1,c:C-1}});}
  function cw(ws,arr){ws['!cols']=arr.map(function(w){return{wch:w};});}
  function freeze(ws,row){ws['!freeze']={xSplit:0,ySplit:row,topLeftCell:'A'+(row+1)};}

  // ─── Compute data using app's own functions ───────────────────────────────
  // For each portfolio, compute everything the same way as getHoldings/getSummary

  // ══════════════════════════════════════════════════════════════════════════
  // SHEET 1: Prices  (one editable table per portfolio — yellow input cells)
  // ══════════════════════════════════════════════════════════════════════════
  (function(){
    var ws={};
    var R=0;
    // Title
    setCell(ws,R,0,Object.assign({t:'s',v:'Market Prices — Update here to recalculate Holdings'},s(FG.blue,BG.bg4,true,'left')));
    setCell(ws,R,1,blank(BG.bg4));setCell(ws,R,2,blank(BG.bg4));setCell(ws,R,3,blank(BG.bg4));
    R++;

    S.portfolios.forEach(function(pf){
      var stocks=Object.keys(pf.prices);
      if(!stocks.length)return;
      // Portfolio label
      setCell(ws,R,0,subhdr(pf.name));
      setCell(ws,R,1,blank(BG.bg4));setCell(ws,R,2,blank(BG.bg4));setCell(ws,R,3,blank(BG.bg4));
      R++;
      // Headers
      [hdr('Stock'),hdr('CCY'),hdr('Current Price'),hdr('As Of')].forEach(function(c,ci){setCell(ws,R,ci,c);});
      R++;
      stocks.forEach(function(stock){
        var mp=pf.prices[stock];
        setCell(ws,R,0,tv(stock,FG.t1,BG.bg2,true,'left'));
        setCell(ws,R,1,tv(mp.ccy||'USD',FG.t2,BG.bg2,false,'center'));
        setCell(ws,R,2,yel(+mp.price||0,'#,##0.0000'));
        setCell(ws,R,3,tv(dt,FG.t2,BG.bg2));
        R++;
      });
      R++;// spacer
    });
    setRange(ws,R,4);
    cw(ws,[24,8,16,14]);
    freeze(ws,1);
    XLSX.utils.book_append_sheet(wb,ws,'Prices');
  })();

  // ══════════════════════════════════════════════════════════════════════════
  // SHEET 2: Transactions  (Date|Type|Stock|CCY|Qty|Price|Fee|Amount|Note)
  //   — mirrors Transactions tab exactly, all portfolios, formula for Amount
  // ══════════════════════════════════════════════════════════════════════════
  (function(){
    var ws={};
    var R=0;
    // Headers
    ['Date','Portfolio','Type','Stock','CCY','Qty','Price','Fee','Amount','Note'].forEach(function(h,ci){
      setCell(ws,R,ci,hdr(h));
    });
    R++;

    // Collect all txs from all portfolios sorted newest first
    var allTxs=[];
    S.portfolios.forEach(function(pf){
      pf.transactions.filter(function(t){return['Buy','Sell','Dividend'].includes(t.type);})
        .forEach(function(t){allTxs.push(Object.assign({},t,{_pf:pf.name}));});
    });
    allTxs.sort(function(a,b){return b.date.localeCompare(a.date);});

    allTxs.forEach(function(t,i){
      var bg=i%2===0?BG.bg0:BG.bg2;
      var excelRow=R+1;// 1-based for formula
      var typeFg=t.type==='Buy'?FG.blue:t.type==='Sell'?FG.red:FG.green;
      // Amount: Buy=Qty*Price+Fee, Sell=Qty*Price-Fee, Dividend=amount field directly
      var amtCell;
      if(t.type==='Dividend'){
        amtCell=nv(t.amount!=null?+t.amount:0,'#,##0.00',FG.green,bg,true);
      } else if(t.type==='Sell'){
        amtCell=fv('F'+excelRow+'*G'+excelRow+'-H'+excelRow,FG.t1,bg,true,'#,##0.00');
      } else {
        amtCell=fv('F'+excelRow+'*G'+excelRow+'+H'+excelRow,FG.t1,bg,true,'#,##0.00');
      }
      setCell(ws,R,0,tv(t.date,FG.t2,bg,false,'left'));
      setCell(ws,R,1,tv(t._pf,FG.t2,bg));
      setCell(ws,R,2,Object.assign(tv(t.type,typeFg,bg,true,'center'),{t:'s',v:t.type}));
      setCell(ws,R,3,tv(t.stock||'',FG.t1,bg,true,'left'));
      setCell(ws,R,4,tv(t.ccy,FG.t2,bg,false,'center'));
      setCell(ws,R,5,t.qty>0?nv(+t.qty,'#,##0',FG.t1,bg):blank(bg));
      setCell(ws,R,6,t.price>0?nv(+t.price,'#,##0.0000',FG.t1,bg):blank(bg));
      setCell(ws,R,7,t.fee>0?nv(+t.fee,'#,##0.00',FG.t2,bg):nv(0,'#,##0.00',FG.t2,bg));
      setCell(ws,R,8,amtCell);

  //   Footer row per CCY with totals (same as HTML tfoot)
  //   Current Price = VLOOKUP from Prices sheet (interactive!)
  //   Holding Value = Qty * Current Price
  //   Unrealized = Holding Value - Cost Basis
  //   Total P&L = Unrealized + Realized + Dividends
  //   P&L % = Total P&L / Cost Basis
  // ══════════════════════════════════════════════════════════════════════════
  (function(){
    var ws={};
    var R=0;
    var HDRS=['Stock','Qty','Avg Cost','Cost Basis','Current Price','Holding Value',
              'Unrealized P&L','Dividends','Realized P&L','Total P&L','P&L %'];

      var h=getHoldings(pf,true);

        setCell(ws,R,0,tv('No active holdings',FG.t2,BG.bg0));
        R++;return;
      }

      // Group by CCY in correct order
      var rawCcys=[...new Set(h.map(function(x){return x.ccy;}))];
      var orderedCcys=[...CCY_ORDER.filter(function(c){return rawCcys.includes(c);}),
                       ...rawCcys.filter(function(c){return!CCY_ORDER.includes(c);})];

      orderedCcys.forEach(function(ccy){
        var rows=h.filter(function(x){return x.ccy===ccy;});
        rows.sort(function(a,b){return b.mktVal-a.mktVal;});// highest alloc first

        // CCY sub-header
        for(var ci3=0;ci3<11;ci3++)setCell(ws,R,ci3,blank(BG.bg4));
        setCell(ws,R,0,Object.assign(tv('  '+ccy,FG.blue,BG.bg4,true),{s:{font:{color:{rgb:FG.blue},bold:true,name:'Arial',sz:10},fill:{fgColor:{rgb:BG.bg4}},alignment:{horizontal:'left'},border:bd()}}));
        R++;

        var dataStart=R+1;// 1-based
        rows.forEach(function(hh,i){
          var bg=i%2===0?BG.bg0:BG.bg2;
          var er=R+1;// excel row (1-based)
          var tot2=hh.unreal+hh.divs+hh.realized;
          var pct2=hh.cost>0?tot2/hh.cost:null;

          // Column C = Qty (col index 1), D=AvgCost(2), E=CostBasis(3),
          // F=CurrentPrice(4) via VLOOKUP, G=HoldingValue(5), H=Unrealized(6),
          // I=Dividends(7), J=Realized(8), K=TotalPnL(9), L=PnL%(10)
          setCell(ws,R,0,tv(hh.stock,FG.t1,bg,true,'left'));
          setCell(ws,R,1,nv(+hh.qty,'#,##0',FG.t1,bg));
          setCell(ws,R,2,nv(hh.avg>0?+hh.avg:null,'#,##0.0000',FG.t2,bg));
          setCell(ws,R,3,nv(+hh.cost,'#,##0.00',FG.t1,bg));
          // Current Price: VLOOKUP from Prices sheet (yellow to show it's live)
          // We look up by stock name. The Prices sheet has Stock in col A, CCY in B, Price in C
          // We need to find the right portfolio's price table.
          // Since Prices sheet has multiple portfolio blocks, use exact match on col A
          setCell(ws,R,4,fv('IFERROR(VLOOKUP(A'+er+',Prices!$A:$C,3,0),0)',FG.blue,bg,false,'#,##0.0000'));
          // Holding Value = Qty * Current Price (formula referencing same row)
          setCell(ws,R,5,fv('IF(B'+er+'>0,B'+er+'*F'+er+',0)',FG.t1,bg,true,'#,##0.00'));
          // Unrealized = Holding Value - Cost Basis
          setCell(ws,R,6,fv('IF(B'+er+'>0,G'+er+'-D'+er+',0)',(+hh.unreal>=0?FG.green:FG.red),bg,true,'#,##0.00'));
          // Dividends
          setCell(ws,R,7,hh.divs>0?nv(+hh.divs,'#,##0.00',FG.green,bg):blank(bg));
          // Realized P&L (computed by app's rolling avg — hardcoded value, correct)
          setCell(ws,R,8,pnl(+hh.realized,bg));
          // Total P&L = Unrealized + Dividends + Realized
          setCell(ws,R,9,fv('H'+er+'+I'+er+'+J'+er,(tot2>=0?FG.green:FG.red),bg,true,'#,##0.00'));
          // P&L % = Total P&L / Cost Basis
          setCell(ws,R,10,fv('IF(D'+er+'>0,K'+er+'/D'+er+',0)',(pct2>=0?FG.green:FG.red),bg,true,'0.00%'));
          R++;
        });
        var dataEnd=R;// last data row (1-based)

        // ── Footer total row (same as HTML tfoot) ─────────────────────────
        var fr=R+1;
        setCell(ws,R,0,Object.assign(tv('Total ('+ccy+')',FG.amber,BG.bg3,true),{s:{font:{color:{rgb:FG.amber},bold:true,name:'Arial',sz:10},fill:{fgColor:{rgb:BG.bg3}},alignment:{horizontal:'left'},border:bd()}}));
        setCell(ws,R,1,blank(BG.bg3));
        setCell(ws,R,2,blank(BG.bg3));
        // Cost Basis total
        setCell(ws,R,3,totf('SUM(D'+dataStart+':D'+dataEnd+')'));
        setCell(ws,R,4,blank(BG.bg3));
        // Holding Value total
        setCell(ws,R,5,totf('SUM(G'+dataStart+':G'+dataEnd+')'));
        // Unrealized total (uses getSummary value for accuracy incl. closed)
        var sum=getSummary(pf);
        setCell(ws,R,6,tot(sum.unreal[ccy]||0));
        // Dividends total
        setCell(ws,R,7,tot(sum.divs[ccy]||0,'#,##0.00'));
        // Realized total
        setCell(ws,R,8,tot(sum.realized[ccy]||0));
        // Total P&L = sum unrealized + dividends + realized (from getSummary, matches mini-cards)
        var totVal=(sum.unreal[ccy]||0)+(sum.divs[ccy]||0)+(sum.realized[ccy]||0);
        setCell(ws,R,9,Object.assign(nv(totVal,'#,##0.00',FG.amber,BG.bg3,true),{t:'n',v:totVal}));
        // P&L % = totVal / cost (totPct from overview)
        var co=sum.cost?.[ccy]||0;
        setCell(ws,R,10,co>0?Object.assign(nv(totVal/co,'0.00%',FG.amber,BG.bg3,true),{t:'n',v:totVal/co}):blank(BG.bg3));
        R++;
        R++;// spacer between CCYs
      });
      R++;// spacer between portfolios
    });
    setRange(ws,R,11);
    cw(ws,[22,8,13,14,15,14,16,12,14,12,8]);
    freeze(ws,1);
    XLSX.utils.book_append_sheet(wb,ws,'Holdings');
  })();

  // ══════════════════════════════════════════════════════════════════════════

  //   Columns: Stock | CCY | Avg Cost | Cost Basis | Realized P&L | Dividends | Total P&L
  // ══════════════════════════════════════════════════════════════════════════
  (function(){

  // SHEET 6: Options  — mirrors Options tab exactly per portfolio

  // ══════════════════════════════════════════════════════════════════════════
  (function(){
    var ws={};
    var R=0;
    ['Portfolio','Ticker','Open Date','Open Value','Open Fee',
     'Close Date','Close Value','Close Fee','Mkt Value (Input)','P&L (USD)','Note']
    .forEach(function(h,ci){setCell(ws,R,ci,hdr(h));});
    R++;
    S.portfolios.forEach(function(pf){

      if(!trades.length)return;

          var o=parseFloat(t.openValue)||0;

function showWelcomeIfFirstLoad(){
  if(!S._isFirstLoad)return;
  delete S._isFirstLoad;
  const ov=document.getElementById('welcome-overlay');
  if(ov)ov.style.display='flex';
}
function dismissWelcome(){
  const ov=document.getElementById('welcome-overlay');
  if(ov)ov.style.display='none';
}
function doWelcomeRestore(e){
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.portfolios||!Array.isArray(data.portfolios))throw new Error('Invalid');
      S=data;
      if(!S.pieImages)S.pieImages={};
      // Migrate older backups — add any missing fields
      S.portfolios.forEach(function(pf,idx){
        pf.color=PFPAL[idx%PFPAL.length];
        if(!pf.optionTrades)pf.optionTrades=[];
        if(!pf.cashBalances)pf.cashBalances={};
        if(!pf.deposits)pf.deposits=[];if(!pf.deposits)pf.deposits=[];
      });
      save();dismissWelcome();render();
      const t=$('toast');t.textContent='Backup restored \u2713';t.classList.add('show');
      clearTimeout(TT);TT=setTimeout(function(){t.classList.remove('show');t.textContent='Saved \u2713';},3000);
    }catch(err){alert('Invalid backup file. Please select a valid PortfolioX .json backup.');}
  };
  rd.readAsText(f);
}

// ── Drag-and-drop: Portfolio chips ────────────────────────────────────────────
var _pfDragSrc=null;
function initPfDrag(){
  const chips=[].slice.call(document.querySelectorAll('#pf-menu-chips .pf-chip[draggable]'));
  chips.forEach(function(chip){
    chip.addEventListener('dragstart',function(e){
      _pfDragSrc=chip;
      e.dataTransfer.effectAllowed='move';
      chip.style.opacity='0.4';
    });
    chip.addEventListener('dragend',function(){
      chip.style.opacity='';
      document.querySelectorAll('#pf-menu-chips .pf-chip').forEach(function(c){
        c.style.background=''; c.style.outline='';
      });
    });
    chip.addEventListener('dragover',function(e){
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      if(chip!==_pfDragSrc)chip.style.outline='2px solid var(--blue)';
    });
    chip.addEventListener('dragleave',function(){chip.style.outline='';});
    chip.addEventListener('drop',function(e){
      e.preventDefault();
      chip.style.outline='';
      if(!_pfDragSrc||_pfDragSrc===chip)return;
      const fromId=_pfDragSrc.dataset.pfid;
      const toId=chip.dataset.pfid;
      const arr=[...S.portfolios];
      const fi=arr.findIndex(function(p){return p.id===fromId;});
      const ti=arr.findIndex(function(p){return p.id===toId;});
      if(fi<0||ti<0)return;
      arr.splice(ti,0,arr.splice(fi,1)[0]);
      S.portfolios=arr;
      save();renderPfTabs();
    });
  });
}

var _pxDragSrc=null;
function initPxDrag(){
  const rows=[].slice.call(document.querySelectorAll('#px-list .px-row[draggable]'));
  rows.forEach(function(row){
    row.addEventListener('dragstart',function(e){
      _pxDragSrc=row;
      e.dataTransfer.effectAllowed='move';
      row.style.opacity='0.4';
    });
    row.addEventListener('dragend',function(){
      row.style.opacity='';
      document.querySelectorAll('#px-list .px-row').forEach(function(r){r.style.outline='';});
    });
    row.addEventListener('dragover',function(e){
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      if(row!==_pxDragSrc&&row.dataset.ccy===_pxDragSrc.dataset.ccy)
        row.style.outline='2px solid var(--blue)';
    });
    row.addEventListener('dragleave',function(){row.style.outline='';});
    row.addEventListener('drop',function(e){
      e.preventDefault();
      row.style.outline='';
      if(!_pxDragSrc||_pxDragSrc===row)return;
      // Only allow drop within same CCY group
      if(row.dataset.ccy!==_pxDragSrc.dataset.ccy)return;
      row.parentNode.insertBefore(_pxDragSrc,row);
    });
  });
}

function renderDeposits(p){

    +'</select>'
    +'<button class="pri sm" onclick="openDepositModal()" style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;padding:0;font-size:18px;line-height:1;border-radius:50%;flex-shrink:0">+</button>'
    +'</div>';

  // ── Year summary cards (shown when a specific year is selected) ──

    const yrDeps=deps.filter(d=>d.date.slice(0,4)===yr);
    const cards=allCcys.map(function(ccy){
      const cd=yrDeps.filter(d=>(d.ccy||'MYR')===ccy);
      if(!cd.length)return'';
      const dep=cd.filter(d=>d.type==='deposit').reduce((s,d)=>s+(+d.amount),0);
      const wit=cd.filter(d=>d.type==='withdrawal').reduce((s,d)=>s+(+d.amount),0);
      const net=dep-wit;
      const CCY_ACCENT=CCY_COLORS;
      const accent=CCY_ACCENT[ccy]||'#4fc3f7';

        +'<div style="font-size:9px;color:var(--t2)">Withdrawn</div><div class="pv-num" style="font-size:12px;font-weight:600;color:'+(wit>0?'var(--red)':'var(--t3)')+';margin-bottom:4px">'+(wit>0?'-'+fc(wit,ccy):'—')+'</div>'
        +'<div style="border-top:1px solid var(--b1);padding-top:4px;margin-top:2px">'
        +'<div style="font-size:9px;color:var(--t2)">Net</div>'
        +'<div class="pv-num" style="font-size:13px;font-weight:700;color:'+(net>=0?'var(--green)':'var(--red)')+'">'+fc(net,ccy)+'</div>'
        +'</div></div>';
    }).filter(Boolean).join('');
    if(!cards)return'';
